<script type="text/babel" data-presets="env,react">
const {useState,useEffect,useRef,useMemo,useCallback}=React;

const AVATAR_COMPAT={chara01:'newcha1',chara02:'newcha2',chara03:'newcha3',chara04:'newcha4',chara05:'newcha5',chara06:'newcha6',chara07:'newcha7',chiika:'newcha1',hachi:'newcha2',usagi:'newcha3'};
const normalizeAvatarId=id=>{const s=String(id||'').trim();if(CHAR_MAP[s])return s;if(AVATAR_COMPAT[s])return AVATAR_COMPAT[s];return DEFAULT_AVATAR;};
const avatarIdxFromId=id=>CHAR_MAP[normalizeAvatarId(id)]?.idx??0;

/* ══ Category colours ════════════════════════════════════ */
const CAT={
  '名詞':'#fb7185','動作':'#38bdf8','形容詞':'#a78bfa',
  '副詞':'#94a3b8','其他':'#94a3b8',
  '動物':'#4CAF82','食物':'#FF9800','物品':'#fb7185',
};

/* ══ Date helpers (Taipei) ═══════════════════════════════ */
function taipeiDateKey(d=new Date()){
  const utc=d.getTime()+d.getTimezoneOffset()*60000;
  const t=new Date(utc+8*60*60*1000);
  const y=t.getFullYear(),m=String(t.getMonth()+1).padStart(2,'0'),dd=String(t.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function dateKeyToUtcMs(k){if(!/^\d{4}-\d{2}-\d{2}$/.test(String(k||'')))return NaN;return Date.UTC(+k.slice(0,4),+k.slice(5,7)-1,+k.slice(8,10));}

/* ══ POS → Category ══════════════════════════════════════ */
const POS_CAT={v:'動作',adj:'形容詞',adv:'副詞',n:'名詞'};
function posToCat(pos){const p=Array.isArray(pos)?pos[0]:pos;return POS_CAT[p]||'名詞';}

/* ══ Vocab shape normalization ═══════════════════════════ */
function normalizeVocab(raw){
  // Accept both prototype shape {word,zh,visual,cat,hint,en,zh2,date}
  // and vocab-data.json shape {word,meaning,example,translation,firstSeen,pos}
  if(raw.meaning!==undefined){
    return{
      word:raw.word,
      zh:raw.meaning,
      visual:raw.visual||null,
      hint:raw.hint||raw.meaning,
      cat:raw.cat||posToCat(raw.pos),
      en:raw.example||'',
      zh2:raw.translation||'',
      date:raw.firstSeen||'',
    };
  }
  return{
    word:raw.word,zh:raw.zh,visual:raw.visual||null,hint:raw.hint||raw.zh,
    cat:raw.cat||'名詞',en:raw.en||'',zh2:raw.zh2||'',date:raw.date||'',
  };
}

/* ══ Fallback tiny dataset (in case vocab-data.json fails) ═ */
const FALLBACK_WORDS=[
  {word:'cat',zh:'貓咪',visual:'🐱',cat:'動物',hint:'貓咪',en:'The cat is sleeping on the sofa.',zh2:'貓咪正在沙發上睡覺。',date:'2026-04-17'},
  {word:'dog',zh:'狗狗',visual:'🐶',cat:'動物',hint:'狗狗',en:'My dog loves to play outside.',zh2:'我的狗狗很喜歡在外面玩。',date:'2026-04-17'},
  {word:'apple',zh:'蘋果',visual:'🍎',cat:'食物',hint:'蘋果',en:'An apple a day keeps the doctor away.',zh2:'每天一顆蘋果，醫生遠離我。',date:'2026-04-17'},
].map(normalizeVocab);

/* ══ LocalStorage ════════════════════════════════════════ */
const LS_PROFILE='epopProfile';
const LS_CLAIMS='epopClaims';
const LS_STATS='epopStats3';
const loadProfile=()=>{try{const p=localStorage.getItem(LS_PROFILE);return p?JSON.parse(p):null;}catch{return null;}};
const saveProfile=p=>{try{localStorage.setItem(LS_PROFILE,JSON.stringify(p));}catch{}};
const loadClaims=()=>{try{return JSON.parse(localStorage.getItem(LS_CLAIMS)||'{}');}catch{return{};}};
const saveClaims=c=>{try{localStorage.setItem(LS_CLAIMS,JSON.stringify(c));}catch{}};
const defaultStats={streak:0,xp:0,avgScore:0,best:0,totalGames:0};
const loadStats=()=>{try{return{...defaultStats,...JSON.parse(localStorage.getItem(LS_STATS)||'{}')};}catch{return{...defaultStats};}};
const saveStats=s=>{try{localStorage.setItem(LS_STATS,JSON.stringify(s));}catch{}};
const genPassword=()=>{const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join('');};

/* ══ Firebase leaderboard (REST, no SDK) ═════════════════ */
const firebaseConfig={
  apiKey:"AIzaSyB1c6yopEMzDxbYBrgkqr_3Rsr9KqKwNbA",
  projectId:"vocab-eng2026",
};
const FS_BASE=`https://firestore.googleapis.com/v1/projects/${firebaseConfig.projectId}/databases/(default)/documents`;
const FS_COMMIT=`https://firestore.googleapis.com/v1/projects/${firebaseConfig.projectId}/databases/(default)/documents:commit`;

function cloudDocId(name){
  const raw=String(name||'').trim();if(!raw)return'_';
  const ascii=raw.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');
  if(ascii&&ascii!=='_')return ascii.slice(0,80);
  try{
    const bytes=new TextEncoder().encode(raw);
    let bin='';for(let i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
    const b64=btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/g,'');
    return('u_'+b64).slice(0,120);
  }catch{return'_';}
}
const fsNum=v=>!v?0:(v.integerValue!=null?parseInt(v.integerValue,10)||0:v.doubleValue!=null?Number(v.doubleValue)||0:0);
const fsStr=v=>(v&&v.stringValue)||'';
const fsArrInt=v=>{const a=v&&v.arrayValue&&v.arrayValue.values;return Array.isArray(a)?a.map(fsNum):[];};
function fsDocToEntry(doc){
  const f=(doc&&doc.fields)||{};
  return{
    name:fsStr(f.name),
    avatarId:normalizeAvatarId(fsStr(f.avatarId)||DEFAULT_AVATAR),
    plays:fsNum(f.plays),
    bestScore:fsNum(f.bestScore),
    recentScores:fsArrInt(f.recentScores),
    streakCur:fsNum(f.streakCur),
    streakBest:fsNum(f.streakBest),
    lastPlayDate:fsStr(f.lastPlayDate),
    updatedAt:fsStr(f.updatedAt),
  };
}
function entryToFsFields(e){
  return{
    name:{stringValue:String(e.name||'')},
    avatarId:{stringValue:e.avatarId||DEFAULT_AVATAR},
    plays:{integerValue:String(e.plays|0)},
    bestScore:{integerValue:String(e.bestScore|0)},
    recentScores:{arrayValue:{values:(e.recentScores||[]).map(n=>({integerValue:String(n|0)}))}},
    streakCur:{integerValue:String((e.streakCur||0)|0)},
    streakBest:{integerValue:String((e.streakBest||0)|0)},
    lastPlayDate:{stringValue:String(e.lastPlayDate||'')},
    updatedAt:{stringValue:e.updatedAt||new Date().toISOString()},
  };
}
async function cloudRunQuery(orderField,limit=80){
  const res=await fetch(`${FS_BASE}:runQuery?key=${firebaseConfig.apiKey}`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({structuredQuery:{from:[{collectionId:'leaderboard'}],orderBy:[{field:{fieldPath:String(orderField)},direction:'DESCENDING'}],limit}}),
  });
  if(!res.ok)throw new Error(`runQuery(${orderField}) ${res.status}`);
  const rows=await res.json();
  const out=[];for(const r of rows)if(r&&r.document)out.push(fsDocToEntry(r.document));
  return out;
}
async function cloudGetEntry(name){
  const id=cloudDocId(name);
  try{
    const res=await fetch(`${FS_BASE}/leaderboard/${encodeURIComponent(id)}?key=${firebaseConfig.apiKey}`);
    if(res.status===404)return null;
    if(!res.ok)throw new Error('HTTP '+res.status);
    return fsDocToEntry(await res.json());
  }catch{return null;}
}
async function cloudUpsertScore(name,avatarId,score){
  const id=cloudDocId(name);if(!id||id==='_')return null;
  const prev=await cloudGetEntry(name);
  const base=prev||{plays:0,bestScore:0,recentScores:[],avatarId:DEFAULT_AVATAR,streakCur:0,streakBest:0,lastPlayDate:''};
  const today=taipeiDateKey();
  const last=String(base.lastPlayDate||'');
  let streakCur=base.streakCur||0,streakBest=base.streakBest||0,lastPlayDate=last;
  if(!last){streakCur=1;lastPlayDate=today;}
  else{
    const a=dateKeyToUtcMs(today),b=dateKeyToUtcMs(last);
    const diff=(Number.isFinite(a)&&Number.isFinite(b))?Math.round((a-b)/86400000):NaN;
    if(diff===0)streakCur=Math.max(streakCur,1);
    else if(diff===1){streakCur=(streakCur||0)+1;lastPlayDate=today;}
    else{streakCur=1;lastPlayDate=today;}
  }
  streakBest=Math.max(streakBest||0,streakCur||0);
  const entry={
    name:String(name||'').trim().slice(0,40),
    avatarId:normalizeAvatarId(avatarId||base.avatarId||DEFAULT_AVATAR),
    plays:(base.plays||0)+1,
    bestScore:Math.max(base.bestScore||0,score|0),
    recentScores:[score|0,...(base.recentScores||[])].slice(0,10),
    streakCur,streakBest,lastPlayDate,updatedAt:new Date().toISOString(),
  };
  try{
    const docName=`projects/${firebaseConfig.projectId}/databases/(default)/documents/leaderboard/${id}`;
    const res=await fetch(`${FS_COMMIT}?key=${firebaseConfig.apiKey}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({writes:[{update:{name:docName,fields:entryToFsFields(entry)}}]}),
    });
    if(!res.ok)throw new Error('HTTP '+res.status);
    return entry;
  }catch(e){console.warn('cloudUpsertScore failed',e);return null;}
}

/* ══ Utils ═══════════════════════════════════════════════ */
function shuffle(a){const x=[...a];for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];}return x;}
function getOptions(correct,pool){
  const others=shuffle(pool.filter(v=>v.word!==correct.word)).slice(0,3);
  return shuffle([correct,...others]);
}
function formatDate(dateKey){
  if(!dateKey)return'';
  const[y,m,d]=dateKey.split('-').map(Number);
  const js=new Date(y,m-1,d);
  return js.toLocaleDateString('zh-TW',{month:'long',day:'numeric',weekday:'short'});
}

/* ══ Shared UI ═══════════════════════════════════════════ */
function Confetti({active}){

  const items=Array.from({length:18},(_,i)=>({id:i,x:5+Math.random()*90,color:['#FFD700','#4CAF82','#40d0e2','#fb7185','#a78bfa','#FF9800'][i%6],delay:i*0.05,size:6+Math.random()*8}));

}

function WordVisual({vocab,size=48}){
  const c=CAT[vocab.cat]||'#94a3b8';
  if(vocab.visual) return <span style={{fontSize:size,lineHeight:1}}>{vocab.visual}</span>;
  return(<div style={{background:`${c}22`,border:`2px dashed ${c}66`,borderRadius:14,padding:'8px 14px',display:'flex',flexDirection:'column',alignItems:'center',gap:2,minWidth:90,maxWidth:'90%'}}>
    <div style={{fontSize:10,fontWeight:800,color:c,opacity:0.8}}>{vocab.cat}</div>
    <div style={{fontSize:14,fontWeight:900,color:c,textAlign:'center',lineHeight:1.3}}>{vocab.hint||vocab.zh}</div>
  </div>);
}

/* ══ ONBOARDING ══════════════════════════════════════════ */
function OnboardingScreen({onDone,pc}){
  const [step,setStep]=useState(1);
  const [name,setName]=useState('');
  const [nameErr,setNameErr]=useState('');
  const [selectedChar,setSel]=useState(null);
  const [pwModal,setPwModal]=useState(null);
  const [pwInput,setPwInput]=useState('');
  const [pwErr,setPwErr]=useState('');
  const [generatedPw,setGenPw]=useState('');
  const claims=useRef(loadClaims());

  const goStep2=()=>{
    if(!name.trim()){setNameErr('請輸入你的名字！');return;}
    if(name.trim().length>10){setNameErr('名字最多10個字喔！');return;}
    setNameErr('');setStep(2);
  };
  const trySelect=(i)=>{
    const claim=claims.current[CHARACTERS[i].id];
    const isMine=claim&&claim.name===name.trim();
    if(!claim||isMine){setSel(i);}
    else{setPwModal({charIdx:i,charName:CHARACTERS[i].name,ownerName:claim.name});setPwInput('');setPwErr('');}
  };
  const verifyPw=()=>{
    const claim=claims.current[CHARACTERS[pwModal.charIdx].id];
    if(pwInput.toUpperCase()===claim.password){setPwModal(null);setSel(pwModal.charIdx);}
    else setPwErr('密碼錯誤，請再試一次！');
  };
  const confirmChar=()=>{
    if(selectedChar===null)return;
    const existing=claims.current[CHARACTERS[selectedChar].id];
    if(existing&&existing.name===name.trim()){
      // Returning owner — reuse existing password
      setGenPw(existing.password);setStep(3);return;
    }
    const pw=genPassword();setGenPw(pw);
    const nc={...claims.current,[CHARACTERS[selectedChar].id]:{name:name.trim(),password:pw}};
    claims.current=nc;saveClaims(nc);setStep(3);
  };
  const finish=()=>{
    const profile={name:name.trim(),charIdx:selectedChar,password:generatedPw};
    saveProfile(profile);onDone(profile);
  };

  return(<div className="screen" style={{background:'linear-gradient(170deg,#fdf6ff 0%,#f0fdf4 100%)'}}>
    {step===1&&<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 28px',gap:22}}>
      <div style={{animation:'float 3s ease-in-out infinite'}}><img src={CHARACTERS[0].img} alt="" style={{width:100,height:100,objectFit:'contain'}}/></div>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:26,fontWeight:900,color:'#1a1a2e'}}>歡迎來到</div>
        <div style={{fontSize:30,fontWeight:900,color:pc}}>CLAW ENG！</div>
        <div style={{fontSize:13,color:'#aaa',marginTop:6}}>先告訴我你的名字吧 😊</div>
      </div>
      <div style={{width:'100%'}}>
        <input type="text" placeholder="輸入你的名字…" value={name} onChange={e=>{setName(e.target.value);setNameErr('');}} onKeyDown={e=>e.key==='Enter'&&goStep2()} maxLength={10}
          style={{width:'100%',padding:'16px 20px',borderRadius:18,border:`2px solid ${nameErr?'#FF4D6D':name?pc:'#e8e0f8'}`,fontSize:18,fontWeight:800,color:'#1a1a2e',outline:'none',fontFamily:'inherit',background:'#fff',boxShadow:`0 2px 12px ${pc}22`,transition:'border 0.2s'}}/>
        {nameErr&&<div style={{fontSize:12,color:'#FF4D6D',fontWeight:700,marginTop:6,paddingLeft:4}}>{nameErr}</div>}
      </div>
      <button onClick={goStep2} style={{width:'100%',padding:17,borderRadius:20,border:'none',cursor:'pointer',background:`linear-gradient(135deg,${pc},${pc}bb)`,fontSize:17,fontWeight:900,color:'#fff',boxShadow:`0 5px 18px ${pc}44`,opacity:name.trim()?1:0.5,transition:'opacity 0.2s',fontFamily:'inherit'}}>下一步 →</button>
    </div>}

    {step===2&&<div className="screen">
      <div style={{padding:'48px 20px 8px',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
        <button onClick={()=>setStep(1)} style={{width:38,height:38,borderRadius:12,border:'none',background:'rgba(0,0,0,0.06)',cursor:'pointer',fontSize:17}}>←</button>
        <div style={{flex:1}}>
          <div style={{fontSize:17,fontWeight:900,color:'#1a1a2e'}}>選一隻寵物，{name}！</div>
          <div style={{fontSize:11,color:'#aaa'}}>🔒 已被其他同學認養的需要密碼</div>
        </div>
      </div>
      <div className="scroll-body" style={{padding:'8px 16px 16px'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
          {CHARACTERS.map((c,i)=>{
            const claim=claims.current[c.id];
            const isMine=claim&&claim.name===name.trim();
            const isClaimed=!!claim&&!isMine;
            const isSel=selectedChar===i;
            return(<button key={c.id} onClick={()=>trySelect(i)} style={{padding:'12px 6px 10px',borderRadius:18,border:`2.5px solid ${isSel?pc:'#f0eaea'}`,background:isSel?`${pc}12`:'#fff',cursor:'pointer',boxShadow:isSel?`0 4px 14px ${pc}33`:'0 2px 6px rgba(0,0,0,0.04)',transition:'all 0.18s',display:'flex',flexDirection:'column',alignItems:'center',gap:3,position:'relative',opacity:isClaimed?0.65:1,fontFamily:'inherit'}}>
              {isSel&&<div style={{position:'absolute',top:5,right:5,width:16,height:16,borderRadius:'50%',background:pc,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:'#fff',fontWeight:900}}>✓</div>}
              {isClaimed&&<div style={{position:'absolute',top:5,right:5,fontSize:14}}>🔒</div>}

/* ══ FLASHCARD ═══════════════════════════════════════════ */
function FlashScreen({charSrc,flashPool,onNav,pc}){
  const cards=useMemo(()=>shuffle(flashPool),[flashPool]);
  const [idx,setIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [known,setKnown]=useState(new Set());

  if(cards.length===0)return(
    <div className="screen" style={{background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)'}}>
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:40,gap:16,textAlign:'center'}}>
        <span style={{fontSize:60}}>📖</span>
        <div style={{fontSize:20,fontWeight:900,color:'#1a1a2e'}}>單字卡還是空的！</div>
        <div style={{fontSize:14,color:'#aaa',lineHeight:1.6}}>每天的新單字，第二天才會加入單字卡喔。先去看首頁的今日新單字吧！</div>
        <button onClick={()=>onNav('home')} style={{padding:'14px 28px',borderRadius:18,border:'none',cursor:'pointer',background:`linear-gradient(135deg,${pc},${pc}bb)`,fontSize:15,fontWeight:900,color:'#fff',fontFamily:'inherit'}}>回首頁</button>
      </div>
      <BottomNav screen="flash" onNav={onNav} pc={pc}/>
    </div>
  );

  const card=cards[idx%cards.length];
  const catColor=CAT[card.cat]||'#94a3b8';
  const progress=(idx+1)/cards.length;
  const goNext=()=>{setFlipped(false);setTimeout(()=>setIdx(i=>Math.min(i+1,cards.length-1)),120);};
  const goPrev=()=>{setFlipped(false);setTimeout(()=>setIdx(i=>Math.max(i-1,0)),120);};
  const markKnown=()=>{setKnown(s=>{const n=new Set(s);n.add(card.word);return n;});goNext();};

  return(<div className="screen" style={{background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)'}}>
    <div style={{padding:'48px 20px 8px',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
      <div style={{flex:1}}>
        <div style={{fontSize:16,fontWeight:900,color:'#1a1a2e'}}>📖 單字卡庫</div>
        <div style={{fontSize:11,color:'#aaa',marginTop:1}}>共 {cards.length} 個學過的單字</div>
      </div>
      <div style={{fontSize:13,fontWeight:800,color:pc,background:`${pc}15`,padding:'5px 12px',borderRadius:16}}>{idx+1}/{cards.length}</div>
    </div>

    <div style={{padding:'0 20px 10px',flexShrink:0}}>
      <div style={{height:7,background:'#e8f8fa',borderRadius:8}}>
        <div style={{height:7,borderRadius:8,background:`linear-gradient(90deg,${pc},${pc}88)`,width:`${progress*100}%`,transition:'width 0.3s ease-out'}}/>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
        <span style={{fontSize:11,color:'#aaa',fontWeight:700}}>✅ 已記住 {known.size} 個</span>
        <span style={{fontSize:11,color:'#aaa',fontWeight:700}}>還剩 {cards.length-idx-1} 張</span>
      </div>
    </div>

    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 22px',gap:16}}>
      <div onClick={()=>setFlipped(f=>!f)} style={{width:'100%',background:'#fff',borderRadius:28,boxShadow:'0 6px 28px rgba(0,0,0,0.09)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'28px 24px',gap:10,cursor:'pointer',minHeight:240,animation:'pop 0.2s ease-out',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:0,left:0,right:0,height:4,background:`linear-gradient(90deg,${catColor},${catColor}66)`,borderRadius:'28px 28px 0 0'}}/>
        <div style={{fontSize:11,fontWeight:800,color:catColor,letterSpacing:1,opacity:0.8}}>{card.cat}</div>
        <WordVisual vocab={card} size={56}/>
        {!flipped?(
          <>
            <div style={{fontSize:30,fontWeight:900,color:'#1a1a2e',letterSpacing:2,textAlign:'center',wordBreak:'break-word'}}>{card.word}</div>
            <div style={{fontSize:12,color:'#ccc',marginTop:4}}>👆 點擊看中文</div>
          </>
        ):(
          <>
            <div style={{fontSize:26,fontWeight:900,color:pc,textAlign:'center',lineHeight:1.3}}>{card.zh}</div>
            <div style={{fontSize:14,color:'#aaa',fontStyle:'italic'}}>{card.word}</div>
            {card.en&&<div style={{fontSize:13,color:'#555',textAlign:'center',lineHeight:1.6,marginTop:4,paddingTop:8,borderTop:'1px dashed #f0eaea',width:'100%',fontStyle:'italic'}}>"{card.en}"</div>}
            {card.zh2&&<div style={{fontSize:12,color:'#888',textAlign:'center'}}>「{card.zh2}」</div>}
          </>
        )}
        {known.has(card.word)&&<div style={{position:'absolute',top:12,right:14,fontSize:16}}>✅</div>}
      </div>

      <div style={{animation:'float 3s ease-in-out infinite'}}>
        <img src={charSrc} alt="" style={{width:60,height:60,objectFit:'contain'}}/>
      </div>
    </div>

    <div style={{padding:'0 20px 10px',display:'flex',gap:10,flexShrink:0}}>
      <button onClick={goPrev} disabled={idx===0} style={{flex:1,padding:13,borderRadius:16,border:'1.5px solid #f0eaea',background:'#fff',fontSize:13,fontWeight:800,color:'#aaa',cursor:'pointer',opacity:idx===0?0.4:1,fontFamily:'inherit'}}>← 上一張</button>
      <button onClick={markKnown} style={{flex:1.4,padding:13,borderRadius:16,border:`1.5px solid ${pc}44`,background:`${pc}12`,fontSize:13,fontWeight:900,color:pc,cursor:'pointer',fontFamily:'inherit'}}>✅ 我會了</button>
      <button onClick={goNext} disabled={idx===cards.length-1} style={{flex:1,padding:13,borderRadius:16,border:'none',background:`linear-gradient(135deg,${pc},${pc}bb)`,fontSize:13,fontWeight:900,color:'#fff',cursor:'pointer',opacity:idx===cards.length-1?0.5:1,fontFamily:'inherit'}}>下一張 →</button>
    </div>
    <BottomNav screen="flash" onNav={onNav} pc={pc}/>
  </div>);
}

/* ══ QUIZ ════════════════════════════════════════════════ */
function QuizScreen({charSrc,quizPool,onFinish,onNav,pc}){
  const TOTAL=Math.min(20,quizPool.length);
  const [questions]=useState(()=>shuffle(quizPool).slice(0,TOTAL).map(v=>({vocab:v,options:getOptions(v,quizPool)})));
  const [idx,setIdx]=useState(0);
  const [selected,setSel]=useState(null);
  const [score,setScore]=useState(0);
  const [xp,setXp]=useState(0);
  const [combo,setCombo]=useState(0);
  const [showConf,setConf]=useState(false);
  const [xpMsg,setXpMsg]=useState(null);
  const [shaking,setShaking]=useState(false);

  if(TOTAL===0)return(
    <div className="screen" style={{background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)'}}>
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:40,gap:16,textAlign:'center'}}>
        <span style={{fontSize:60}}>🎮</span>
        <div style={{fontSize:20,fontWeight:900,color:'#1a1a2e'}}>還沒有可以測驗的單字</div>
        <div style={{fontSize:14,color:'#aaa',lineHeight:1.6}}>先到首頁看看今日新單字，明天就可以測驗了！</div>
        <button onClick={()=>onNav('home')} style={{padding:'14px 28px',borderRadius:18,border:'none',cursor:'pointer',background:`linear-gradient(135deg,${pc},${pc}bb)`,fontSize:15,fontWeight:900,color:'#fff',fontFamily:'inherit'}}>回首頁</button>
      </div>
      <BottomNav screen="quiz" onNav={onNav} pc={pc}/>
    </div>
  );

  const q=questions[idx];
  const correct=q.vocab;
  const catColor=CAT[correct.cat]||'#94a3b8';

  const answer=(opt)=>{
    if(selected)return;
    setSel(opt.word);
    const ok=opt.word===correct.word;
    if(ok){
      const gain=10+combo*3;
      setScore(s=>s+1);setXp(x=>x+gain);setCombo(c=>c+1);
      setConf(true);setXpMsg(`+${gain} XP`);
      setTimeout(()=>setConf(false),1200);setTimeout(()=>setXpMsg(null),900);
    }else{
      setCombo(0);
      setShaking(true);setTimeout(()=>setShaking(false),500);
    }
    setTimeout(()=>{
      setSel(null);
      if(idx+1>=TOTAL) onFinish(ok?score+1:score,ok?xp+10+combo*3:xp,TOTAL);
      else setIdx(i=>i+1);
    },1100);
  };

  const bg=opt=>{if(!selected)return'#fff';if(opt.word===correct.word)return'#4CAF82';if(opt.word===selected)return'#FF4D6D';return'#fff';};
  const col=opt=>{if(!selected)return'#1a1a2e';if(opt.word===correct.word||opt.word===selected)return'#fff';return'#ccc';};
  const bdr=opt=>{if(!selected)return'2px solid #f0eaea';if(opt.word===correct.word)return'2px solid #4CAF82';if(opt.word===selected)return'2px solid #FF4D6D';return'2px solid #f5f5f5';};

  return(<div className="screen" style={{background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)',position:'relative',overflow:'hidden'}}>
    <Confetti active={showConf}/>
    {xpMsg&&<div style={{position:'absolute',top:'22%',left:'50%',fontSize:22,fontWeight:900,color:'#FFB800',textShadow:'0 2px 8px rgba(0,0,0,0.15)',animation:'xpRise 0.9s ease-out forwards',pointerEvents:'none',zIndex:50,whiteSpace:'nowrap'}}>{xpMsg} ⭐</div>}

    <div style={{padding:'46px 20px 6px',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
      <div style={{flex:1,height:9,background:'rgba(0,0,0,0.06)',borderRadius:9}}>
        <div style={{height:9,borderRadius:9,background:`linear-gradient(90deg,${pc},${pc}99)`,width:`${(idx/TOTAL)*100}%`,transition:'width 0.35s ease-out'}}/>
      </div>
      <div style={{fontSize:13,fontWeight:800,color:pc,background:'#fff',padding:'4px 10px',borderRadius:14,boxShadow:'0 2px 6px rgba(0,0,0,0.06)'}}>{idx+1}/{TOTAL}</div>
    </div>

    {combo>=2&&<div style={{textAlign:'center',fontSize:12,fontWeight:800,color:'#FF6B47',marginBottom:2,flexShrink:0}}>🔥 連續答對 {combo} 題！加油！</div>}

    <div style={{flex:1,display:'flex',flexDirection:'column',padding:'4px 20px 0',overflow:'hidden'}}>
      <div style={{display:'flex',justifyContent:'center',marginBottom:4,flexShrink:0}}>
        <img src={charSrc} alt="" style={{width:54,height:54,objectFit:'contain',animation:'float 3s ease-in-out infinite'}}/>
      </div>

      <div style={{background:'#fff',borderRadius:22,padding:'14px 20px',textAlign:'center',boxShadow:'0 4px 18px rgba(0,0,0,0.07)',marginBottom:12,flexShrink:0,animation:shaking?'shake 0.4s ease-in-out':'pop 0.2s ease-out',display:'flex',flexDirection:'column',alignItems:'center',gap:6,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${catColor},${catColor}44)`}}/>
        <div style={{fontSize:11,fontWeight:700,color:'#ddd',letterSpacing:1}}>這個英文單字是什麼意思？</div>
        {correct.visual&&<span style={{fontSize:44,lineHeight:1}}>{correct.visual}</span>}
        <div style={{fontSize:28,fontWeight:900,color:'#1a1a2e',letterSpacing:2,wordBreak:'break-word'}}>{correct.word}</div>
        <div style={{fontSize:10,color:catColor,fontWeight:800,background:`${catColor}18`,padding:'2px 10px',borderRadius:20}}>{correct.cat}</div>
      </div>

      <div className="scroll-body" style={{display:'flex',flexDirection:'column',gap:8,paddingBottom:8}}>
        {q.options.map((opt,i)=>(
          <button key={opt.word+i} onClick={()=>answer(opt)} style={{width:'100%',padding:'12px 16px',borderRadius:16,border:bdr(opt),background:bg(opt),color:col(opt),fontSize:14,fontWeight:800,cursor:'pointer',textAlign:'left',display:'flex',alignItems:'center',gap:10,boxShadow:selected&&opt.word===correct.word?'0 4px 14px #4CAF8244':'0 2px 6px rgba(0,0,0,0.04)',transition:'all 0.15s',animation:`slideUp 0.2s ${i*0.04}s both`,opacity:selected&&opt.word!==correct.word&&opt.word!==selected?0.4:1,fontFamily:'inherit',flexShrink:0}}>
            <span style={{fontSize:16,flexShrink:0}}>{opt.visual||'💬'}</span>
            <span style={{flex:1,lineHeight:1.3,wordBreak:'break-word'}}>{opt.zh}</span>
            {selected&&opt.word===correct.word&&<span style={{fontSize:16,flexShrink:0}}>✓</span>}
            {selected&&opt.word===selected&&opt.word!==correct.word&&<span style={{fontSize:16,flexShrink:0}}>✗</span>}
          </button>
        ))}
      </div>
    </div>
    <div style={{textAlign:'center',padding:'6px 0',flexShrink:0}}>
      <span style={{fontSize:11,color:'#ccc',fontWeight:700}}>⭐ {xp} XP 已獲得</span>
    </div>
    <BottomNav screen="quiz" onNav={onNav} pc={pc}/>
  </div>);
}

/* ══ RESULT ══════════════════════════════════════════════ */
function ResultScreen({score,xp,total,charSrc,charName,onRetry,onHome,pc}){
  const pct=total>0?Math.round((score/total)*100):0;
  const isGreat=pct>=80,isOk=pct>=50;
  const grade=isGreat?'S 🌟':isOk?'B 👍':'C 💪';
  const msg=isGreat?'太厲害了！':isOk?'做得不錯！':'繼續加油！';
  return(<div className="screen" style={{background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)',position:'relative'}}>
    {isGreat&&<Confetti active/>}
    <div className="scroll-body" style={{padding:'52px 22px 28px',display:'flex',flexDirection:'column',alignItems:'center',gap:18}}>
      <div style={{textAlign:'center'}}>
        <div style={{animation:'float 3s ease-in-out infinite',display:'inline-block'}}><img src={charSrc} alt="" style={{width:96,height:96,objectFit:'contain'}}/></div>
        <div style={{fontSize:26,fontWeight:900,color:'#1a1a2e',marginTop:10}}>{msg}</div>
        <div style={{fontSize:13,color:'#aaa',marginTop:4}}>{charName} 在為你加油！</div>
      </div>
      <div style={{width:'100%',background:'#fff',borderRadius:28,padding:24,boxShadow:'0 6px 24px rgba(0,0,0,0.07)',animation:'pop 0.3s ease-out'}}>
        <div style={{display:'flex',justifyContent:'center',marginBottom:18}}>
          <div style={{width:84,height:84,borderRadius:'50%',background:`linear-gradient(135deg,${pc},${pc}88)`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',boxShadow:`0 6px 20px ${pc}44`}}>
            <div style={{fontSize:22,fontWeight:900,color:'#fff',lineHeight:1}}>{pct}%</div>
            <div style={{fontSize:9,color:'rgba(255,255,255,0.8)'}}>正確率</div>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
          {[{icon:'✅',label:'答對題數',val:`${score}/${total}`,color:'#4CAF82'},{icon:'⭐',label:'XP獲得',val:`+${xp}`,color:'#FFB800'},{icon:'🎯',label:'等級',val:grade,color:pc}].map(item=>(
            <div key={item.label} style={{textAlign:'center',background:'#fafeff',borderRadius:14,padding:'12px 6px'}}>
              <div style={{fontSize:20}}>{item.icon}</div>
              <div style={{fontSize:14,fontWeight:900,color:item.color,lineHeight:1.2}}>{item.val}</div>
              <div style={{fontSize:9,color:'#bbb',fontWeight:700,marginTop:2}}>{item.label}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{width:'100%',background:`${pc}10`,borderRadius:18,padding:'14px 18px',display:'flex',alignItems:'center',gap:12}}>
        <span style={{fontSize:22}}>💡</span>
        <div style={{fontSize:12,color:'#555',fontWeight:700,lineHeight:1.6}}>{isGreat?'完美！繼續保持每天複習的好習慣！':'每天複習，進步看得見！繼續努力！'}</div>
      </div>
      <div style={{width:'100%',display:'flex',flexDirection:'column',gap:10}}>
        <button onClick={onRetry} style={{width:'100%',padding:16,borderRadius:20,border:'none',cursor:'pointer',background:`linear-gradient(135deg,${pc},${pc}bb)`,fontSize:16,fontWeight:900,color:'#fff',boxShadow:`0 5px 16px ${pc}44`,fontFamily:'inherit'}}>🔄 再玩一次</button>
        <button onClick={onHome} style={{width:'100%',padding:14,borderRadius:20,border:'2px solid #f0eaea',background:'#fff',fontSize:14,fontWeight:800,color:'#aaa',cursor:'pointer',fontFamily:'inherit'}}>🏠 回首頁</button>
      </div>
    </div>
  </div>);
}

/* ══ LEADERBOARD ═════════════════════════════════════════ */
const PODIUM_H=[110,148,90];
const PODIUM_C=['#C0C0C0','#FFD700','#CD7F32'];
const PODIUM_MEDAL=['🥈','🥇','🥉'];

function RankScreen({studentName,charIdx,stats,onNav,pc,cloudEntries,cloudStreakEntries,cloudStatus,onRefresh}){
  const [tab,setTab]=useState('score');

  const list=useMemo(()=>{
    const cloud=tab==='score'?cloudEntries:cloudStreakEntries;
    const arr=(cloud||[]).map(e=>({
      name:e.name||'(未命名)',
      score:e.bestScore|0,
      streak:e.streakCur|0,
      streakBest:e.streakBest|0,
      charIdx:avatarIdxFromId(e.avatarId),
      isMe:e.name&&studentName&&e.name.trim()===studentName.trim(),
    }));
    // Inject me locally if not in cloud yet
    if(studentName&&!arr.some(r=>r.isMe)){
      arr.push({name:studentName,score:stats.best|0,streak:stats.streak|0,streakBest:stats.streak|0,charIdx,isMe:true});
    }
    const sortKey=tab==='score'?'score':'streak';
    const tieKey=tab==='score'?'streak':'score';
    arr.sort((a,b)=>(b[sortKey]-a[sortKey])||(b[tieKey]-a[tieKey])||(b.streakBest-a.streakBest));
    return arr.map((r,i)=>({...r,rank:i+1}));
  },[tab,cloudEntries,cloudStreakEntries,studentName,charIdx,stats]);

  const top3Src=[list[1],list[0],list[2]]; // left 2nd, center 1st, right 3rd
  const showUnit=tab==='score'?'分':'天';

  return(<div className="screen" style={{background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)'}}>
    <div style={{padding:'48px 20px 6px',flexShrink:0,display:'flex',alignItems:'center',gap:8}}>
      <div style={{fontSize:18,fontWeight:900,color:'#1a1a2e',flex:1}}>🏆 排行榜</div>
      <button onClick={onRefresh} style={{padding:'5px 12px',borderRadius:14,border:'none',background:`${pc}15`,color:pc,fontSize:11,fontWeight:800,cursor:'pointer',fontFamily:'inherit'}}>{cloudStatus==='loading'?'同步中…':'↻ 更新'}</button>
    </div>
    {cloudStatus==='offline'&&<div style={{margin:'0 20px 8px',background:'#fff4e5',color:'#b75d00',fontSize:11,fontWeight:700,padding:'6px 10px',borderRadius:10,textAlign:'center',flexShrink:0}}>雲端連線失敗，目前顯示本地資料</div>}

    <div style={{display:'flex',margin:'4px 20px 14px',background:'#f0f8fa',borderRadius:14,padding:3,flexShrink:0}}>
      {[['score','分數排行'],['streak','連續天數']].map(([id,label])=>(
        <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:'8px',borderRadius:11,border:'none',cursor:'pointer',background:tab===id?'#fff':'transparent',fontSize:13,fontWeight:800,color:tab===id?pc:'#aaa',boxShadow:tab===id?'0 2px 8px rgba(0,0,0,0.08)':'none',transition:'all 0.2s',fontFamily:'inherit'}}>{label}</button>
      ))}
    </div>

    {cloudStatus==='loading'&&list.length===0?(
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}><div className="spinner"/></div>
    ):(
      <>
        <div style={{display:'flex',alignItems:'flex-end',justifyContent:'center',gap:6,padding:'0 20px 14px',flexShrink:0,minHeight:200}}>
          {top3Src.map((r,pi)=>{
            if(!r)return(<div key={'empty-'+pi} style={{flex:1}}/>);
            const val=tab==='score'?r.score:r.streak;
            return(<div key={r.name+pi} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
              {r.isMe&&<div style={{fontSize:9,fontWeight:900,color:pc,background:`${pc}20`,padding:'2px 6px',borderRadius:10}}>你</div>}
              <img src={CHARACTERS[r.charIdx]?.img||CHARACTERS[0].img} alt="" style={{width:pi===1?50:40,height:pi===1?50:40,objectFit:'contain'}}/>
              <div style={{fontSize:10,fontWeight:900,color:r.isMe?pc:'#555',maxWidth:78,textAlign:'center',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name}</div>
              <div style={{fontSize:11,fontWeight:700,color:'#aaa'}}>{val}{showUnit}</div>
              <div style={{width:'100%',height:PODIUM_H[pi],borderRadius:'10px 10px 0 0',background:`linear-gradient(180deg,${PODIUM_C[pi]},${PODIUM_C[pi]}88)`,display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:8,boxShadow:`0 -4px 12px ${PODIUM_C[pi]}44`}}>
                <span style={{fontSize:22}}>{PODIUM_MEDAL[pi]}</span>
              </div>
            </div>);
          })}
        </div>

        <div className="scroll-body" style={{padding:'0 20px 8px'}}>
          {list.slice(3).map(r=>{
            const val=tab==='score'?r.score:r.streak;
            return(<div key={r.name+r.rank} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',background:r.isMe?`${pc}10`:'#fff',borderRadius:16,marginBottom:8,boxShadow:r.isMe?`0 2px 10px ${pc}22`:'0 1px 6px rgba(0,0,0,0.04)',border:r.isMe?`1.5px solid ${pc}33`:'1.5px solid transparent'}}>
              <div style={{width:26,textAlign:'center',fontSize:13,fontWeight:900,color:'#ddd'}}>{r.rank}</div>
              <img src={CHARACTERS[r.charIdx]?.img||CHARACTERS[0].img} alt="" style={{width:36,height:36,objectFit:'contain'}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:900,color:r.isMe?pc:'#1a1a2e',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name}{r.isMe?' (我)':''}</div>
                <div style={{fontSize:10,color:'#aaa',fontWeight:700}}>🔥 連續 {r.streak} 天 · 最高 {r.score} 分</div>
              </div>
              <div style={{fontSize:17,fontWeight:900,color:r.isMe?pc:'#555'}}>{val}<span style={{fontSize:10,color:'#aaa',fontWeight:700}}> {showUnit}</span></div>
            </div>);
          })}
          {list.length<=3&&<div style={{textAlign:'center',color:'#bbb',fontSize:12,padding:20}}>目前還沒有其他玩家資料</div>}
        </div>
      </>
    )}
    <BottomNav screen="rank" onNav={onNav} pc={pc}/>
  </div>);
}

/* ══ APP ═════════════════════════════════════════════════ */
function App(){
  const [profile,setProfile]=useState(()=>loadProfile());
  const [screen,setScreen]=useState('home');
  const [result,setResult]=useState(null);
  const [stats,setStats]=useState(loadStats);
  const [vocabAll,setVocabAll]=useState(null);
  const [loadError,setLoadError]=useState('');
  const [cloudEntries,setCloudEntries]=useState([]);
  const [cloudStreakEntries,setCloudStreakEntries]=useState([]);
  const [cloudStatus,setCloudStatus]=useState('idle');

  const pc='#61c2ff';
  const charIdx=profile?.charIdx??0;
  const charSrc=CHARACTERS[charIdx]?.img||CHARACTERS[0].img;
  const charName=CHARACTERS[charIdx]?.name||'小夥伴';
  const studentName=profile?.name||'同學';
  const today=taipeiDateKey();

  // Load vocab-data.json once
  useEffect(()=>{
    (async()=>{
      try{
        const res=await fetch('vocab-data.json?t='+Date.now(),{cache:'no-store'});
        if(!res.ok)throw new Error('HTTP '+res.status);
        const data=await res.json();
        const words=Array.isArray(data.words)?data.words:Array.isArray(data.vocab)?data.vocab:[];
        if(!words.length)throw new Error('空的 vocab 資料');
        setVocabAll(words.map(normalizeVocab));
      }catch(e){
        console.warn('vocab-data.json 載入失敗，使用 fallback:',e);
        setVocabAll(FALLBACK_WORDS);
        setLoadError(String(e.message||e));
      }
    })();
  },[]);

  const refreshLeaderboard=useCallback(async()=>{
    setCloudStatus('loading');
    try{
      const best=await cloudRunQuery('bestScore',80);
      best.sort((a,b)=>(b.bestScore||0)-(a.bestScore||0)||String(b.updatedAt||'').localeCompare(String(a.updatedAt||'')));
      setCloudEntries(best);
      try{
        const streak=await cloudRunQuery('streakCur',80);
        streak.sort((a,b)=>(b.streakCur||0)-(a.streakCur||0)||(b.bestScore||0)-(a.bestScore||0));
        setCloudStreakEntries(streak);
      }catch{setCloudStreakEntries([]);}
      setCloudStatus('ok');
    }catch(e){
      console.warn('leaderboard fetch failed',e);
      setCloudStatus('offline');
    }
  },[]);

  // Fetch leaderboard when entering rank screen or at startup
  useEffect(()=>{if(screen==='rank')refreshLeaderboard();},[screen,refreshLeaderboard]);

  // Compute today's words / flash pool / quiz pool
  const {todaySet,flashPool,quizPool,dateLabel}=useMemo(()=>{
    if(!vocabAll)return{todaySet:[],flashPool:[],quizPool:[],dateLabel:formatDate(today)};
    const byDate=new Map();
    for(const w of vocabAll){if(!w.date)continue;if(!byDate.has(w.date))byDate.set(w.date,[]);byDate.get(w.date).push(w);}
    const allDates=[...byDate.keys()].sort();
    const latest=allDates[allDates.length-1]||'';
    const todayWords=byDate.get(today)||[];
    const displayDate=todayWords.length?today:latest;
    const displaySet=todayWords.length?todayWords:(byDate.get(latest)||[]).slice(0,3);
    // flashPool = words before today (or all but latest if no today)
    const cutoff=todayWords.length?today:latest;
    const before=vocabAll.filter(w=>w.date&&w.date<cutoff);
    const pool=before.length>=4?before:vocabAll;
    return{
      todaySet:displaySet.slice(0,3),
      flashPool:before,
      quizPool:pool,
      dateLabel:formatDate(displayDate||today),
    };
  },[vocabAll,today]);

  const nav=(s)=>{if(s==='quiz'&&screen!=='quiz')setResult(null);setScreen(s);};

  const handleFinish=async(score,xpGained,total)=>{
    const newAvg=stats.totalGames===0?Math.round(score/total*100):Math.round((stats.avgScore*stats.totalGames+Math.round(score/total*100))/(stats.totalGames+1));
    // Update local stats (streak will be refined when cloud entry returns)
    const ns={...stats,xp:(stats.xp||0)+xpGained,best:Math.max(stats.best,score),totalGames:stats.totalGames+1,avgScore:newAvg};
    saveStats(ns);setStats(ns);
    setResult({score,xp:xpGained,total});setScreen('result');
    // Fire-and-forget cloud sync; update streak when it returns
    if(profile?.name){
      const entry=await cloudUpsertScore(profile.name,CHARACTERS[charIdx]?.id||DEFAULT_AVATAR,score);
      if(entry){
        const ns2={...ns,streak:entry.streakCur};
        saveStats(ns2);setStats(ns2);
        refreshLeaderboard();
      }
    }
  };

  if(!vocabAll){
    return(<div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)'}}>
      <div className="spinner"/>
      <div style={{fontSize:13,color:'#aaa',fontWeight:700}}>單字載入中…</div>
    </div>);
  }

  if(!profile)return(<div style={{width:'100%',height:'100%',position:'relative'}}>
    <OnboardingScreen onDone={p=>{setProfile(p);setScreen('home');}} pc={pc}/>
  </div>);

  return(<div style={{width:'100%',height:'100%',position:'relative'}}>
    {screen==='home'&&<HomeScreen charSrc={charSrc} charName={charName} studentName={studentName} stats={stats} todaySet={todaySet} flashPool={flashPool} dateLabel={dateLabel} onNav={nav} onSelectChar={()=>setScreen('charselect')} pc={pc}/>}
    {screen==='charselect'&&<CharSelectScreen current={charIdx} onSelect={i=>{const p={...profile,charIdx:i};setProfile(p);saveProfile(p);setScreen('home');}} onBack={()=>setScreen('home')} pc={pc}/>}
    {screen==='flash'&&<FlashScreen charSrc={charSrc} flashPool={flashPool.length?flashPool:quizPool} onNav={nav} pc={pc}/>}
    {screen==='quiz'&&<QuizScreen charSrc={charSrc} quizPool={quizPool} onFinish={handleFinish} onNav={nav} pc={pc}/>}
    {screen==='result'&&result&&<ResultScreen {...result} charSrc={charSrc} charName={charName} onRetry={()=>setScreen('quiz')} onHome={()=>setScreen('home')} pc={pc}/>}
    {screen==='rank'&&<RankScreen studentName={studentName} charIdx={charIdx} stats={stats} onNav={nav} pc={pc} cloudEntries={cloudEntries} cloudStreakEntries={cloudStreakEntries} cloudStatus={cloudStatus} onRefresh={refreshLeaderboard}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
