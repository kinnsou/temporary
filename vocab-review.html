function taipeiDateKey(d=new Date()){
  const utc=d.getTime()+d.getTimezoneOffset()*60000;

}

/* ══ POS → Category ══════════════════════════════════════ */
const POS_CAT={v:'動作',adj:'形容詞',adv:'副詞',n:'名詞'};
function posToCat(pos){const p=Array.isArray(pos)?pos[0]:pos;return POS_CAT[p]||'名詞';}
function catLabel(cat){return cat==='動作'?'動詞':(cat||'名詞');}

/* ══ Vocab shape normalization ═══════════════════════════ */
function normalizeVocab(raw){
  // Accept both prototype shape {word,zh,visual,cat,hint,en,zh2,date}
  // and vocab-data.json shape {word,meaning,example,translation,firstSeen,pos}
  if(raw.meaning!==undefined){
    return{
      word:raw.word,
      zh:raw.meaning,
      visual:raw.visual||null,
      hint:raw.hint||raw.meaning,
      cat:raw.cat||posToCat(raw.pos),
      en:raw.example||'',
      zh2:raw.translation||'',
      date:raw.firstSeen||'',
    };
  }
  return{
    word:raw.word,zh:raw.zh,visual:raw.visual||null,hint:raw.hint||raw.zh,
    cat:raw.cat||'名詞',en:raw.en||'',zh2:raw.zh2||'',date:raw.date||'',
  };
}

/* ══ English number words (for food count display) ══════ */
const NUMBER_WORDS=['zero','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen','twenty'];
const TENS_WORDS=['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];
function numToEnglish(n){
  n=n|0; if(n<0)return 'zero'; if(n<=20)return NUMBER_WORDS[n];
  if(n<100){const t=Math.floor(n/10),o=n%10;return o?`${TENS_WORDS[t]}-${NUMBER_WORDS[o]}`:TENS_WORDS[t];}
  return String(n); // ≥100 fallback to digits
}

/* ══ Level / unlock helpers ══════════════════════════════ */
const LV1_SIZE=15;
const LV_INCREMENT=5;
function unlockedCountForLevel(level){
  const lv=Math.max(1,level|0);
  return LV1_SIZE+(lv-1)*LV_INCREMENT;
}
function unlockedWords(allWords,difficultyOrder,level){
  const want=unlockedCountForLevel(level);
  const wordToObj=new Map(allWords.map(w=>[w.word,w]));
  const seen=new Set();
  const out=[];
  for(let i=0;i<difficultyOrder.length&&out.length<want;i++){
    const obj=wordToObj.get(difficultyOrder[i]);
    if(obj){out.push(obj);seen.add(obj.word);}
  }
  if(out.length<want){
    const rest=allWords
      .filter(w=>!seen.has(w.word))
      .sort((a,b)=>String(a.firstSeen||a.date||'').localeCompare(String(b.firstSeen||b.date||'')));
    for(const w of rest){if(out.length>=want)break;out.push(w);seen.add(w.word);}
  }
  return out;
}
function newlyUnlockedWords(difficultyOrder,allWords,oldLevel,newLevel){
  if(newLevel<=oldLevel)return[];
  const oldCount=unlockedCountForLevel(oldLevel);
  const newCount=unlockedCountForLevel(newLevel);
  const all=unlockedWords(allWords,difficultyOrder,newLevel);
  return all.slice(oldCount,newCount);
}
function mergeStudyPool(unlocked,todaySet){
  const map=new Map();
  for(const w of unlocked||[])map.set(w.word,w);
  for(const w of todaySet||[])map.set(w.word,{...w,isDailyFocus:true});
  return [...map.values()];
}
const LEVEL_XP_CAP_UI=536;
function levelXpRequirementUi(level){
  const lv=Math.max(1,level|0);
  let req=100;
  for(let n=2;n<=lv;n++){
    if(req>=LEVEL_XP_CAP_UI)return LEVEL_XP_CAP_UI;
    const mult=1.30+0.05*(n-2);
    req=Math.min(LEVEL_XP_CAP_UI,Math.round(req*mult));
  }
  return req;
}
function estimateTotalExpForLevel(level,exp=0){
  const lv=Math.max(1,level|0);
  let total=Number(exp||0);
  for(let n=1;n<lv;n++)total+=levelXpRequirementUi(n);
  return Math.max(0,Math.round(total));
}

/* ══ Utils ═══════════════════════════════════════════════ */
function shuffle(a){const x=[...a];for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];}return x;}
function getOptions(correct,pool){
  const others=shuffle(pool.filter(v=>v.word!==correct.word)).slice(0,3);
  return shuffle([correct,...others]);
}
function formatDate(dateKey){

/* ══ Verb / tense helpers ════════════════════════════════ */
const IRREGULAR={
  ride:{thirds:'rides',past:'rode',ing:'riding'},leave:{thirds:'leaves',past:'left',ing:'leaving'},
  go:{thirds:'goes',past:'went',ing:'going'},come:{thirds:'comes',past:'came',ing:'coming'},
  have:{thirds:'has',past:'had',ing:'having'},do:{thirds:'does',past:'did',ing:'doing'},
  make:{thirds:'makes',past:'made',ing:'making'},say:{thirds:'says',past:'said',ing:'saying'},
  get:{thirds:'gets',past:'got',ing:'getting'},see:{thirds:'sees',past:'saw',ing:'seeing'},
  eat:{thirds:'eats',past:'ate',ing:'eating'},run:{thirds:'runs',past:'ran',ing:'running'},
  take:{thirds:'takes',past:'took',ing:'taking'},give:{thirds:'gives',past:'gave',ing:'giving'},
  know:{thirds:'knows',past:'knew',ing:'knowing'},think:{thirds:'thinks',past:'thought',ing:'thinking'},
  feel:{thirds:'feels',past:'felt',ing:'feeling'},buy:{thirds:'buys',past:'bought',ing:'buying'},
  bring:{thirds:'brings',past:'brought',ing:'bringing'},catch:{thirds:'catches',past:'caught',ing:'catching'},
  hear:{thirds:'hears',past:'heard',ing:'hearing'},hold:{thirds:'holds',past:'held',ing:'holding'},
  read:{thirds:'reads',past:'read',ing:'reading'},send:{thirds:'sends',past:'sent',ing:'sending'},
  sit:{thirds:'sits',past:'sat',ing:'sitting'},stand:{thirds:'stands',past:'stood',ing:'standing'},
  win:{thirds:'wins',past:'won',ing:'winning'},write:{thirds:'writes',past:'wrote',ing:'writing'},
  meet:{thirds:'meets',past:'met',ing:'meeting'},keep:{thirds:'keeps',past:'kept',ing:'keeping'},
  put:{thirds:'puts',past:'put',ing:'putting'},cut:{thirds:'cuts',past:'cut',ing:'cutting'},
  let:{thirds:'lets',past:'let',ing:'letting'},break:{thirds:'breaks',past:'broke',ing:'breaking'},
  fall:{thirds:'falls',past:'fell',ing:'falling'},fly:{thirds:'flies',past:'flew',ing:'flying'},
  speak:{thirds:'speaks',past:'spoke',ing:'speaking'},sleep:{thirds:'sleeps',past:'slept',ing:'sleeping'},
  forget:{thirds:'forgets',past:'forgot',ing:'forgetting'},lose:{thirds:'loses',past:'lost',ing:'losing'},
  tell:{thirds:'tells',past:'told',ing:'telling'},wear:{thirds:'wears',past:'wore',ing:'wearing'},
  sing:{thirds:'sings',past:'sang',ing:'singing'},swim:{thirds:'swims',past:'swam',ing:'swimming'},
  drink:{thirds:'drinks',past:'drank',ing:'drinking'},begin:{thirds:'begins',past:'began',ing:'beginning'},
  understand:{thirds:'understands',past:'understood',ing:'understanding'},teach:{thirds:'teaches',past:'taught',ing:'teaching'},
  build:{thirds:'builds',past:'built',ing:'building'},lend:{thirds:'lends',past:'lent',ing:'lending'},
  find:{thirds:'finds',past:'found',ing:'finding'},feed:{thirds:'feeds',past:'fed',ing:'feeding'},
  pay:{thirds:'pays',past:'paid',ing:'paying'},is:{thirds:'is',past:'was',ing:'being'},
  are:{thirds:'is',past:'were',ing:'being'},be:{thirds:'is',past:'was',ing:'being'},
};
function toPast(v){v=v.toLowerCase();if(IRREGULAR[v])return IRREGULAR[v].past;if(/[^aeiou]e$/.test(v))return v+'d';if(/e$/.test(v))return v+'d';if(/[^aeiou]y$/.test(v))return v.slice(0,-1)+'ied';if(/[^aeiou][aeiou][^aeiouwxy]$/.test(v)&&v.length<=5)return v+v.slice(-1)+'ed';return v+'ed';}
function toIng(v){v=v.toLowerCase();if(IRREGULAR[v])return IRREGULAR[v].ing;if(/ie$/.test(v))return v.slice(0,-2)+'ying';if(/[^aeiou]e$/.test(v))return v.slice(0,-1)+'ing';if(/[^aeiou][aeiou][^aeiouwxy]$/.test(v)&&v.length<=5)return v+v.slice(-1)+'ing';return v+'ing';}
function toThirdS(v){v=v.toLowerCase();if(IRREGULAR[v])return IRREGULAR[v].thirds;if(/(s|x|z|o)$/.test(v))return v+'es';if(/(ch|sh)$/.test(v))return v+'es';if(/[^aeiou]y$/.test(v))return v.slice(0,-1)+'ies';return v+'s';}

/* Word looks like a verb if ANY conjugated form appears right after a PRONOUN subject. */
function looksLikeVerb(word,example){
  if(!word||!example)return false;
  const base=word.toLowerCase();
  const forms=[...new Set([base,toThirdS(base),toPast(base),toIng(base)])];
  for(const f of forms){
    const safe=f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    // Only safe: subject is a pronoun (I/We/They/You/He/She/It) directly followed by the verb form.
    if(new RegExp('(?:^|[.!?,]\\s+)(?:I|We|They|You|He|She|It)\\s+'+safe+'\\b').test(example))return true;
  }
  return false;
}

/* Find which form of the verb appears in the example. Returns {form, index, length} or null. */
function findVerbForm(base,example){
  const forms=[toPast(base),toIng(base),toThirdS(base),base]; // prefer longer/more-specific first, keep base last
  for(const f of [...new Set(forms)]){
    const safe=f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const m=example.match(new RegExp('\\b'+safe+'\\b','i'));
    if(m)return{form:f,index:m.index,length:m[0].length};
  }
  return null;
}

/* Split a sentence around the target word, case-insensitive, word-boundary preferred. */
function splitAroundWord(sentence,word){
  const safe=word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  let m=sentence.match(new RegExp('\\b'+safe+'\\b','i'));
  if(!m)m=sentence.match(new RegExp(safe,'i'));
  if(!m)return null;
  return{before:sentence.slice(0,m.index),match:m[0],after:sentence.slice(m.index+m[0].length)};
}

/* Build a cloze (type-in) question. Returns {type,correct,hintFirst,before,after,zh2} or null. */
function buildClozeQuestion(w){
  if(!w.en||!w.word)return null;
  const parts=splitAroundWord(w.en,w.word);
  if(!parts)return null;
  return{type:'cloze',correct:w.word,hintFirst:String(w.word).trim().slice(0,1).toLowerCase(),before:parts.before,after:parts.after,zh2:w.zh2||'',zh:w.zh||''};
}

function tenseHintText(form,base){
  if(form===toPast(base))return '這句在講「過去」發生的事 → 用過去式';
  if(form===toIng(base))return '這句在講「正在進行」 → 用 -ing 進行式';
  if(form===toThirdS(base))return '主詞是 He / She / It → 動詞加 -s / -es（第三人稱現在式）';
  return '主詞是 I / We / You / They → 用動詞「原形」';
}

/* Build a tense (4-option) question. Target = whichever form appears in the sentence. Returns {type,correct,options,baseWord,before,after,zh2,tenseHint} or null. */
function buildTenseQuestion(w,_otherVerbs){
  if(!w.en||!w.word)return null;
  const base=w.word.toLowerCase();
  const hit=findVerbForm(base,w.en);
  if(!hit)return null;
  const correct=hit.form.toLowerCase();
  const forms=[...new Set([base,toThirdS(base),toPast(base),toIng(base)])];
  if(forms.length<4)return null; // need 4 distinct forms for a fair MC
  if(!forms.includes(correct))return null;
  const before=w.en.slice(0,hit.index);
  const after=w.en.slice(hit.index+hit.length);
  return{type:'tense',correct,options:shuffle(forms),baseWord:base,before,after,zh2:w.zh2||'',zh:w.zh||'',tenseHint:tenseHintText(correct,base)};
}

/* Build mixed quiz items. Cap cloze at MAX_CLOZE. Prefer tense for detected verbs.
   knownSet: Set of words the player has marked "我會了"; sampled last so unfamiliar words dominate. */
const MAX_CLOZE=3;
function buildQuizItems(pool,total,knownSet=new Set()){
  const verbs=pool.filter(w=>looksLikeVerb(w.word,w.en));
  const focus=shuffle(pool.filter(w=>w.isDailyFocus));
  const focusWords=new Set(focus.map(w=>w.word));
  const unknown=shuffle(pool.filter(w=>!focusWords.has(w.word)&&!knownSet.has(w.word)));
  const known=shuffle(pool.filter(w=>!focusWords.has(w.word)&&knownSet.has(w.word)));
  const chosen=[...focus,...unknown,...known].slice(0,total);
  let clozeBudget=Math.min(MAX_CLOZE,Math.floor(total/4));
  if(clozeBudget<2&&total>=8)clozeBudget=2;
  const items=[];
  for(const w of chosen){
    const isVerb=looksLikeVerb(w.word,w.en);
    let built=null;
    if(isVerb&&Math.random()<0.6){
      built=buildTenseQuestion(w,verbs.filter(v=>v.word!==w.word));
    }
    if(!built&&clozeBudget>0&&w.en&&Math.random()<0.45){
      built=buildClozeQuestion(w);
      if(built)clozeBudget--;
    }
    if(!built){
      built={type:'zh2en',options:getOptions(w,pool)};
    }
    items.push({...built,vocab:w});
  }
  return items;
}

let _voicesCache=null;
function _loadVoices(){
  if(typeof window==='undefined'||!window.speechSynthesis)return [];
  const v=window.speechSynthesis.getVoices();
  if(v&&v.length)_voicesCache=v;
  return _voicesCache||[];
}
if(typeof window!=='undefined'&&window.speechSynthesis){
  _loadVoices();
  try{window.speechSynthesis.onvoiceschanged=_loadVoices;}catch{}
}
// Hard-pinned primary voices (Mark's preference confirmed on Windows + Edge).
// On devices that don't have these, the broader priority list below kicks in.
const FEMALE_VOICE_PIN='google us english';
const MALE_VOICE_PIN='david';
const FEMALE_VOICE_KEYS=['zira','google us english','samantha','allison','google uk english female','victoria','karen','aria','catherine','susan','female'];
const MALE_VOICE_KEYS=['david','alex','mark','google us english male','google uk english male','daniel','tom','guy','fred','aaron','male'];
function pickVoice(gender){
  const list=_loadVoices();if(!list.length)return null;
  const enVoices=list.filter(v=>/^en[-_]/i.test(v.lang||''));
  const pool=enVoices.length?enVoices:list;
  // Prefer local voices to avoid online/streaming TTS dropouts (e.g. Jenny Online stuttering).
  const localPool=pool.filter(v=>v.localService!==false);
  const tryPools=localPool.length?[localPool,pool]:[pool];
  const exclude=gender==='male'?'female':null;
  const primary=gender==='male'?MALE_VOICE_PIN:FEMALE_VOICE_PIN;
  // Hard-pin first across local-then-full pool.
  for(const sub of tryPools){
    const hit=sub.find(v=>{
      const n=(v.name||'').toLowerCase();
      if(!n.includes(primary))return false;
      if(exclude&&n.includes(exclude))return false;
      return true;
    });
    if(hit)return hit;
  }
  // Fallback priority list for devices without the pin (iOS/Android etc).
  const prefs=gender==='male'?MALE_VOICE_KEYS:FEMALE_VOICE_KEYS;
  for(const sub of tryPools){
    for(const key of prefs){
      const hit=sub.find(v=>{
        const n=(v.name||'').toLowerCase();
        if(!n.includes(key))return false;
        if(exclude&&n.includes(exclude))return false;
        return true;
      });
      if(hit)return hit;
    }
  }
  return pool[0]||null;
}
function useVoiceName(gender){
  const[name,setName]=useState(()=>pickVoice(gender)?.name||'');
  useEffect(()=>{
    const tick=()=>setName(pickVoice(gender)?.name||'');
    tick();
    const ts=[setTimeout(tick,400),setTimeout(tick,1200),setTimeout(tick,2500)];
    return()=>ts.forEach(clearTimeout);
  },[gender]);
  return name;
}

function speakText(text,opts={}){
  try{
    if(!text||!window.speechSynthesis)return;

function useFb(){
  const [fb,setFb]=useState(()=>({ready:false,uid:null,profile:null,pet:null}));
  const refresh=useCallback(async()=>{
    if(!window.FB){return;}
    try{
      const profile=await window.FB.ops.refreshProfile(window.FB.uid);
      let pet=null;
      if(profile&&profile.currentPetId){pet=await window.FB.ops.loadPet(profile.currentPetId);}
      setFb({ready:true,uid:window.FB.uid,profile,pet});
    }catch(e){console.warn('[useFb] refresh failed',e);}
  },[]);
  useEffect(()=>{
    if(window.FB){refresh();return;}
    const h=()=>refresh();
    window.addEventListener('fbready',h);
    return()=>window.removeEventListener('fbready',h);
  },[refresh]);
  return[fb,refresh];
}

function OnboardingScreen({onDone,pc}){
  const [step,setStep]=useState(1);
  const [name,setName]=useState('');
  const [nameErr,setNameErr]=useState('');
  const [pets,setPets]=useState([]);
  const [loading,setLoading]=useState(false);

  const [err,setErr]=useState('');

  const loadPets=useCallback(async()=>{
    if(!window.FB?.ops?.listPets)return;
    setLoading(true);setErr('');
    try{setPets(await window.FB.ops.listPets());}
    catch(e){setErr('寵物清單載入失敗，請再試一次');console.warn('[Onboarding] listPets failed',e);}
    finally{setLoading(false);}
  },[]);
  useEffect(()=>{if(step===2)loadPets();},[step,loadPets]);
  useEffect(()=>{if(window.FB&&step===2)loadPets();const h=()=>step===2&&loadPets();window.addEventListener('fbready',h);return()=>window.removeEventListener('fbready',h);},[step,loadPets]);

  const goStep2=async()=>{
    if(!name.trim()){setNameErr('請輸入你的名字！');return;}
    if(name.trim().length>10){setNameErr('名字最多10個字喔！');return;}
    setNameErr('');setErr('');
    try{
      if(window.FB?.ops?.switchPlayerByName) await window.FB.ops.switchPlayerByName(name.trim());
    }catch(e){
      console.warn('[Onboarding] switchPlayerByName failed',e);
      setErr('玩家資料載入失敗，請稍後再試');
      return;
    }
    setStep(2);
  };
  const confirmChar=async()=>{
    if(!selectedPetId||!window.FB?.ops)return;
    setErr('');
    try{
      const switched=await window.FB.ops.switchPlayerByName(name.trim());
      await window.FB.ops.claimPet(switched.uid,selectedPetId);
      const idx=petIdxFromId(selectedPetId)??0;
      const profile={name:name.trim(),charIdx:idx,petId:selectedPetId};
      saveProfile(profile);onDone(profile);setStep(3);
    }catch(e){
      const msgs={'pet-taken':'這隻已經被別人帶走了！','pet-disabled':'這隻寵物餓壞了，不能選 😢','pet-not-found':'找不到這隻寵物'};
      setErr(msgs[e.message]||`選寵失敗：${e.message}`);await loadPets();
    }
  };
  const selectedPet=pets.find(p=>p.id===selectedPetId);

  return(<div className="screen" style={{background:'linear-gradient(170deg,#fdf6ff 0%,#f0fdf4 100%)'}}>
    {step===1&&<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 28px',gap:22}}>
      <div style={{animation:'float 3s ease-in-out infinite'}}><img src={CHARACTERS[0].img} alt="" style={{width:100,height:100,objectFit:'contain'}}/></div>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:26,fontWeight:900,color:'#1a1a2e'}}>歡迎來到</div>
        <div style={{fontSize:30,fontWeight:900,color:pc}}>CLAW ENG！</div>
        <div style={{fontSize:13,color:'#aaa',marginTop:6}}>先告訴我你的名字吧 😊</div>
      </div>
      <div style={{width:'100%'}}>
        <input type="text" placeholder="輸入你的名字…" value={name} onChange={e=>{setName(e.target.value);setNameErr('');}} onKeyDown={e=>e.key==='Enter'&&goStep2()} maxLength={10}
          style={{width:'100%',padding:'16px 20px',borderRadius:18,border:`2px solid ${nameErr?'#FF4D6D':name?pc:'#e8e0f8'}`,fontSize:18,fontWeight:800,color:'#1a1a2e',outline:'none',fontFamily:'inherit',background:'#fff',boxShadow:`0 2px 12px ${pc}22`,transition:'border 0.2s'}}/>
        {nameErr&&<div style={{fontSize:12,color:'#FF4D6D',fontWeight:700,marginTop:6,paddingLeft:4}}>{nameErr}</div>}
      </div>
      <button onClick={goStep2} style={{width:'100%',padding:17,borderRadius:20,border:'none',cursor:'pointer',background:`linear-gradient(135deg,${pc},${pc}bb)`,fontSize:17,fontWeight:900,color:'#fff',boxShadow:`0 5px 18px ${pc}44`,opacity:name.trim()?1:0.5,transition:'opacity 0.2s',fontFamily:'inherit'}}>下一步 →</button>
    </div>}

    {step===2&&<div className="screen">
      <div style={{padding:'48px 20px 8px',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
        <button onClick={()=>setStep(1)} style={{width:38,height:38,borderRadius:12,border:'none',background:'rgba(0,0,0,0.06)',cursor:'pointer',fontSize:17}}>←</button>
        <div style={{flex:1}}>
          <div style={{fontSize:17,fontWeight:900,color:'#1a1a2e'}}>選一隻寵物，{name}！</div>
          <div style={{fontSize:11,color:'#aaa'}}>這裡是公共寵物池，名字大家都看得到</div>
        </div>
        <button onClick={loadPets} style={{border:'none',background:`${pc}15`,color:pc,borderRadius:12,padding:'8px 10px',fontSize:11,fontWeight:900,cursor:'pointer'}}>↻</button>
      </div>
      <div className="scroll-body" style={{padding:'8px 16px 16px'}}>
        {loading&&<div style={{display:'flex',justifyContent:'center',padding:30}}><div className="spinner"/></div>}
        {err&&<div style={{background:'#fff4e5',color:'#b75d00',fontSize:12,fontWeight:800,padding:'8px 12px',borderRadius:12,marginBottom:10,textAlign:'center'}}>{err}</div>}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
          {pets.map(p=>{
            const disabled=p.status==='disabled'||p.hp<=0||(p.ownerUid&&p.ownerUid!==window.FB?.uid);
            const mine=p.ownerUid&&p.ownerUid===window.FB?.uid;
            return <PetGridButton key={p.id} pet={p} pc={pc} selected={selectedPetId===p.id} disabled={disabled&&!mine} tag={mine?'我的':null} onClick={()=>setSelectedPetId(p.id)}/>;
          })}
        </div>
      </div>
      <div style={{padding:'0 16px 28px',flexShrink:0}}>
        <button onClick={confirmChar} disabled={!selectedPetId||loading} style={{width:'100%',padding:17,borderRadius:20,border:'none',cursor:(!selectedPetId||loading)?'not-allowed':'pointer',background:`linear-gradient(135deg,${pc},${pc}bb)`,fontSize:16,fontWeight:900,color:'#fff',boxShadow:`0 5px 18px ${pc}44`,opacity:selectedPetId&&!loading?1:0.4,transition:'opacity 0.2s',fontFamily:'inherit'}}>確認，這是我的寵物！🐾</button>
      </div>
    </div>}

    {step===3&&<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 28px',gap:20}}>
      <Confetti active/>
      <div style={{animation:'float 3s ease-in-out infinite'}}><img src={selectedPet?.img||CHARACTERS[0].img} alt="" style={{width:100,height:100,objectFit:'contain'}}/></div>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:22,fontWeight:900,color:'#1a1a2e'}}>{name}，你的寵物是</div>
        <div style={{fontSize:28,fontWeight:900,color:pc,marginTop:2}}>{selectedPet?.name||'小夥伴'} 🎉</div>
      </div>
    </div>}
  </div>);
}

/* ══ CHAR SELECT ═════════════════════════════════════════ */
function CharSelectScreen({current,onSelect,onBack,pc,fb,refreshFb}){
  const [pets,setPets]=useState([]);
  const [loading,setLoading]=useState(false);
  const [sel,setSel]=useState(fb?.profile?.currentPetId||null);
  const [err,setErr]=useState('');
  const [rename,setRename]=useState('');
  const [voiceGender,setVoiceGender]=useState('female');
  const voiceName=useVoiceName(voiceGender);
  const myPetId=fb?.profile?.currentPetId||null;
  const myPet=pets.find(p=>p.id===myPetId)||fb?.pet||null;

  const loadPets=useCallback(async()=>{
    setLoading(true);setErr('');
    try{
      // Wait for fbready event or up to 12s — mobile cold-start Anonymous Auth + Firestore
      // connection can take 5–10s on cellular, so pure 3s polling under-served mobile.
      if(!window.FB?.ops?.listPets){
        await new Promise(resolve=>{
          let done=false;
          const finish=()=>{if(done)return;done=true;clearTimeout(t);window.removeEventListener('fbready',finish);resolve();};
          window.addEventListener('fbready',finish);
          const t=setTimeout(finish,12000);
          if(window.FB?.ops?.listPets)finish();
        });
      }
      if(!window.FB?.ops?.listPets)throw new Error('firebase-not-ready');
      const list=await window.FB.ops.listPets();
      setPets(list);
      if(!list.length)setErr('目前沒有寵物資料，請按右上角 ↻ 重試');
    }
    catch(e){
      const lineHint='LINE 內建瀏覽器無法登入。請點右上角 ⋯ → 在瀏覽器中開啟';
      const msg=e.message==='firebase-not-ready'?(isLineWebView()?lineHint:'Firebase 還沒連上，請稍後按 ↻ 重試'):'寵物清單載入失敗：'+e.message;
      setErr(msg);
    }
    finally{setLoading(false);}
  },[]);
  useEffect(()=>{loadPets();},[loadPets,fb?.ready]);
  useEffect(()=>{
    const h=()=>loadPets();
    window.addEventListener('fbready',h);
    return()=>window.removeEventListener('fbready',h);
  },[loadPets]);
  useEffect(()=>{setSel(fb?.profile?.currentPetId||null);setRename((fb?.pet?.name)||'');setVoiceGender(fb?.pet?.voiceGender==='male'?'male':'female');},[fb?.profile?.currentPetId,fb?.pet?.name,fb?.pet?.voiceGender]);

  const doRelease=async()=>{
    if(!myPetId||!confirm('要把目前這隻寵物釋放回公共池嗎？'))return;
    try{await window.FB.ops.releasePet(window.FB.uid);await refreshFb();await loadPets();setSel(null);}
    catch(e){setErr('釋放失敗：'+e.message);}
  };
  const doRename=async()=>{
    const v=rename.trim();if(!v)return setErr('名字不可空白');
    try{await window.FB.ops.renameMyPet(window.FB.uid,myPetId,v);await refreshFb();await loadPets();}
    catch(e){const msgs={'bad-name':'名字不可空白','name-too-long':'名字太長囉'};setErr(msgs[e.message]||`改名失敗：${e.message}`);}
  };
  const changeVoice=async(g)=>{
    if(!myPetId||g===voiceGender)return;
    const prev=voiceGender;setVoiceGender(g);setErr('');
    try{speakText(g==='male'?'Boy':'Girl',{gender:g});await window.FB.ops.setPetVoiceGender(window.FB.uid,myPetId,g);await refreshFb();await loadPets();}
    catch(e){setVoiceGender(prev);setErr(`設定發聲失敗：${e.message}`);}
  };

  return(<div className="screen" style={{background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)'}}>
    <div style={{padding:'48px 20px 12px',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
      <button onClick={onBack} style={{width:38,height:38,borderRadius:12,border:'none',background:'rgba(0,0,0,0.06)',cursor:'pointer',fontSize:17}}>←</button>
      <div style={{flex:1}}>
        <div style={{fontSize:17,fontWeight:900,color:'#1a1a2e'}}>更換夥伴</div>
        <div style={{fontSize:11,color:'#aaa'}}>寵物名字是公開的，大家都看得到</div>
      </div>
      <button onClick={loadPets} style={{border:'none',background:`${pc}15`,color:pc,borderRadius:12,padding:'8px 10px',fontSize:11,fontWeight:900,cursor:'pointer'}}>↻</button>
    </div>

    {myPet&&<div style={{margin:'0 18px 12px',background:'#fff',borderRadius:18,padding:12,boxShadow:'0 2px 10px rgba(0,0,0,0.05)'}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8,gap:10}}>
        <div style={{fontSize:12,fontWeight:900,color:'#1a1a2e',paddingTop:5}}>我的寵物名稱</div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3}}>
          <div style={{display:'flex',gap:3,background:'#f1f5f9',borderRadius:10,padding:3}}>
            {[['male','Boy'],['female','Girl']].map(([g,label])=>{
              const active=voiceGender===g;
              return(<button key={g} onClick={()=>changeVoice(g)} style={{padding:'4px 12px',borderRadius:8,border:'none',background:active?pc:'transparent',color:active?'#fff':'#64748b',fontSize:11,fontWeight:900,cursor:'pointer',fontFamily:'inherit',letterSpacing:0.6,transition:'background 0.15s,color 0.15s'}}>{label}</button>);
            })}
          </div>
          {voiceName&&<div style={{fontSize:9,color:'#94a3b8',fontWeight:700,letterSpacing:0.2,maxWidth:160,textAlign:'right',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}} title={voiceName}>🎙 {voiceName}</div>}
        </div>
      </div>
      <div style={{display:'flex',gap:8}}>
        <input value={rename} onChange={e=>setRename(e.target.value)} maxLength={24} placeholder="幫牠取個怪名字…" style={{flex:1,minWidth:0,padding:'10px 12px',borderRadius:12,border:'2px solid #eef2f7',fontSize:14,fontWeight:800,fontFamily:'inherit',outline:'none'}}/>
        <button onClick={doRename} style={{padding:'0 12px',borderRadius:12,border:'none',background:`linear-gradient(135deg,${pc},${pc}bb)`,color:'#fff',fontSize:12,fontWeight:900,fontFamily:'inherit',cursor:'pointer'}}>改名</button>
        <button onClick={doRelease} style={{padding:'0 12px',borderRadius:12,border:'none',background:'linear-gradient(135deg,#fb7185,#fb7185cc)',color:'#fff',fontSize:12,fontWeight:900,fontFamily:'inherit',cursor:'pointer'}}>💔 釋放</button>
      </div>
    </div>}

    {err&&<div style={{margin:'0 18px 10px',background:'#fff4e5',color:'#b75d00',fontSize:12,fontWeight:800,padding:'8px 12px',borderRadius:12,textAlign:'center'}}>{err}</div>}

    <div className="scroll-body" style={{padding:'0 18px 16px'}}>
      {loading&&<div style={{display:'flex',justifyContent:'center',padding:30}}><div className="spinner"/></div>}
      {!loading&&pets.length===0&&<div style={{background:'#fff',borderRadius:18,padding:'22px 16px',textAlign:'center',color:'#94a3b8',fontSize:13,fontWeight:800,boxShadow:'0 2px 10px rgba(0,0,0,0.04)'}}>寵物清單還沒載入，請按右上角 ↻ 重試</div>}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
        {pets.map(p=>{
          const mine=p.ownerUid&&p.ownerUid===fb?.uid;
          const unavailable=(p.status==='disabled'||p.hp<=0)||(p.ownerUid&&!mine);
          return(<PetGridButton key={p.id} pet={p} pc={pc} selected={sel===p.id} disabled={unavailable&&!mine} tag={mine?'我的':null} onClick={()=>setSel(p.id)}/>);
        })}
      </div>
    </div>
    <div style={{padding:'0 18px 28px',flexShrink:0}}>
      <button onClick={()=>onSelect(sel)} disabled={!sel} style={{width:'100%',padding:17,borderRadius:20,border:'none',cursor:sel?'pointer':'not-allowed',background:`linear-gradient(135deg,${pc},${pc}bb)`,fontSize:16,fontWeight:900,color:'#fff',boxShadow:`0 5px 18px ${pc}44`,fontFamily:'inherit',opacity:sel?1:0.4}}>確認選擇 ✓</button>
    </div>
  </div>);
}

/* ══ FLASHCARD ═══════════════════════════════════════════ */
function FlashScreen({charSrc,flashAll,knownWords,refreshFb,onNav,pc,voiceGender='female'}){
  const [tab,setTab]=useState('unfamiliar'); // 'unfamiliar' | 'known'
  const knownSet=useMemo(()=>new Set(knownWords||[]),[knownWords]);
  const unfamiliarPool=useMemo(()=>(flashAll||[]).filter(w=>!knownSet.has(w.word)),[flashAll,knownSet]);
  const knownPool=useMemo(()=>(flashAll||[]).filter(w=>knownSet.has(w.word)),[flashAll,knownSet]);
  const cards=tab==='unfamiliar'?unfamiliarPool:knownPool;
  const [idx,setIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [speakTick,setSpeakTick]=useState(0);
  const [busy,setBusy]=useState(false);

  // Reset index when switching tabs / pool changes
  useEffect(()=>{setIdx(0);setFlipped(false);},[tab]);
  useEffect(()=>{setIdx(i=>Math.min(i,Math.max(0,cards.length-1)));},[cards.length]);

  const tabsHeader=(
    <div style={{display:'flex',margin:'4px 20px 10px',background:'#f0f8fa',borderRadius:14,padding:3,flexShrink:0}}>
      {[['unfamiliar',`未熟練 (${unfamiliarPool.length})`],['known',`已會 (${knownPool.length})`]].map(([id,label])=>(
        <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:'8px',borderRadius:11,border:'none',cursor:'pointer',background:tab===id?'#fff':'transparent',fontSize:13,fontWeight:800,color:tab===id?pc:'#aaa',boxShadow:tab===id?'0 2px 8px rgba(0,0,0,0.08)':'none',transition:'all 0.2s',fontFamily:'inherit'}}>{label}</button>
      ))}
    </div>
  );

  if(cards.length===0)return(
    <div className="screen" style={{background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)'}}>
      <div style={{padding:'48px 20px 8px',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
        <div style={{flex:1,fontSize:16,fontWeight:900,color:'#1a1a2e'}}>📖 單字卡庫</div>
      </div>
      {tabsHeader}
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:40,gap:16,textAlign:'center'}}>
        <span style={{fontSize:60}}>{tab==='unfamiliar'?'🎉':'📖'}</span>
        <div style={{fontSize:18,fontWeight:900,color:'#1a1a2e'}}>{tab==='unfamiliar'?'全部都會了！':'還沒有已會單字'}</div>
        <div style={{fontSize:13,color:'#aaa',lineHeight:1.6}}>{tab==='unfamiliar'?'去做幾題測驗練手感吧～':'在「未熟練」按「我會了」後，單字會搬到這裡。'}</div>
        <button onClick={()=>onNav('home')} style={{padding:'14px 28px',borderRadius:18,border:'none',cursor:'pointer',background:`linear-gradient(135deg,${pc},${pc}bb)`,fontSize:15,fontWeight:900,color:'#fff',fontFamily:'inherit'}}>回首頁</button>
      </div>
      <BottomNav screen="flash" onNav={onNav} pc={pc}/>
    </div>
  );

  const card=cards[Math.min(idx,cards.length-1)];
  const catColor=CAT[card.cat]||'#94a3b8';
  const progress=(idx+1)/cards.length;
  const goNext=()=>{setFlipped(false);setTimeout(()=>setIdx(i=>Math.min(i+1,cards.length-1)),120);};
  const goPrev=()=>{setFlipped(false);setTimeout(()=>setIdx(i=>Math.max(i-1,0)),120);};
  const handleMarkKnown=async()=>{
    if(busy||!card)return;
    setBusy(true);
    try{
      if(window.FB?.ops?.markWordKnown&&window.FB?.uid){
        await window.FB.ops.markWordKnown(window.FB.uid,card.word);
        await refreshFb?.();
      }
    }catch(e){console.warn('markWordKnown failed',e);}
    setBusy(false);
    setFlipped(false);
    // After move, current card index may now point past the new (shorter) unfamiliar list — useEffect will clamp
  };
  const handleMarkUnknown=async()=>{
    if(busy||!card)return;
    setBusy(true);
    try{
      if(window.FB?.ops?.markWordUnknown&&window.FB?.uid){
        await window.FB.ops.markWordUnknown(window.FB.uid,card.word);
        await refreshFb?.();
      }
    }catch(e){console.warn('markWordUnknown failed',e);}
    setBusy(false);
    setFlipped(false);
  };

  return(<div className="screen" style={{background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)'}}>
    <div style={{padding:'48px 20px 6px',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
      <div style={{flex:1}}>
        <div style={{fontSize:16,fontWeight:900,color:'#1a1a2e'}}>📖 單字卡庫</div>
      </div>
      <div style={{fontSize:13,fontWeight:800,color:pc,background:`${pc}15`,padding:'5px 12px',borderRadius:16}}>{idx+1}/{cards.length}</div>
    </div>

    {tabsHeader}

    <div style={{padding:'0 20px 10px',flexShrink:0}}>
      <div style={{height:7,background:'#e8f8fa',borderRadius:8}}>
        <div style={{height:7,borderRadius:8,background:`linear-gradient(90deg,${pc},${pc}88)`,width:`${progress*100}%`,transition:'width 0.3s ease-out'}}/>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
        <span style={{fontSize:11,color:'#aaa',fontWeight:700}}>{tab==='unfamiliar'?`📚 未熟練 ${cards.length} 個`:`✅ 已會 ${cards.length} 個`}</span>
        <span style={{fontSize:11,color:'#aaa',fontWeight:700}}>還剩 {Math.max(0,cards.length-idx-1)} 張</span>
      </div>
    </div>

    <div className="scroll-body" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'14px 22px 12px',gap:16}}>
      <div style={{width:'100%',position:'relative'}}>
      <div onClick={()=>setFlipped(f=>!f)} style={{width:'100%',background:'#fff',borderRadius:28,boxShadow:'0 6px 28px rgba(0,0,0,0.09)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'28px 24px',gap:10,cursor:'pointer',minHeight:240,animation:'pop 0.2s ease-out',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:0,left:0,right:0,height:4,background:`linear-gradient(90deg,${catColor},${catColor}66)`,borderRadius:'28px 28px 0 0'}}/>
        <div style={{fontSize:11,fontWeight:800,color:catColor,letterSpacing:1,opacity:0.8}}>{catLabel(card.cat)}</div>
        {!flipped?(
          <>
            <div style={{border:`1.5px dashed ${catColor}66`,background:`${catColor}10`,borderRadius:18,padding:'10px 18px',fontSize:18,fontWeight:900,color:catColor,lineHeight:1.35,textAlign:'center',maxWidth:'100%'}}>{card.zh}</div>
            <div style={{fontSize:30,fontWeight:900,color:'#1a1a2e',letterSpacing:2,textAlign:'center',wordBreak:'break-word',maxWidth:'100%'}}>{card.word}</div>
            <div style={{fontSize:12,color:'#ccc',marginTop:4}}>👆 點擊看例句</div>
          </>
        ):(()=>{
          const sentence=card.en||'';
          const wIdx=card.word&&sentence?sentence.toLowerCase().indexOf(card.word.toLowerCase()):-1;
          const sentenceNode=sentence?(
            <div style={{width:'100%',padding:'4px 2px'}}>
              <div style={{fontSize:18,color:'#555',textAlign:'center',lineHeight:1.6,fontStyle:'italic'}}>
                {wIdx>=0?(<>"{sentence.slice(0,wIdx)}<span style={{color:catColor,fontWeight:900,fontStyle:'normal'}}>{sentence.slice(wIdx,wIdx+card.word.length)}</span>{sentence.slice(wIdx+card.word.length)}"</>):`"${sentence}"`}
              </div>
            </div>
          ):(
            <div style={{fontSize:22,fontWeight:900,color:catColor,textAlign:'center',lineHeight:1.3}}>{card.zh}</div>
          );
          return(<>
            {sentenceNode}
            {(card.zh2||card.zh)&&<div style={{borderTop:'1px dashed #e8e0e0',width:'100%',marginTop:6,paddingTop:10,fontSize:14,color:'#333',textAlign:'center',fontWeight:700}}>「{card.zh2||card.zh}」</div>}
          </>);
        })()}
      </div>
        <div style={{position:'absolute',top:15,right:12,width:54,height:54,zIndex:5}}>
          {speakTick>0&&(
            <div key={speakTick} style={{position:'absolute',top:'50%',left:'50%',width:0,height:0,pointerEvents:'none'}} aria-hidden>
              {[-150,-120,-90,-60,-30].map((deg,i)=>(
                <span key={i} style={{position:'absolute',top:-1.5,left:0,width:12,height:3,marginLeft:0,borderRadius:2,background:catColor,transformOrigin:'left center',['--ang']:`${deg}deg`,transform:`rotate(${deg}deg) translateX(22px) scaleX(0.35)`,animation:'speakBurst 0.55s ease-out forwards',animationDelay:`${i*40}ms`,opacity:0}}/>
              ))}
            </div>
          )}
          <button onClick={(e)=>{e.stopPropagation();speakText(flipped?(card.en||card.word):card.word,{gender:voiceGender});setSpeakTick(t=>t+1);}} aria-label="播放發音" title="點我發音" style={{border:'none',background:'transparent',padding:0,cursor:'pointer',display:'block',animation:'float 3s ease-in-out infinite',filter:'drop-shadow(0 3px 6px rgba(0,0,0,0.18))'}}>
            <img src={charSrc} alt="" style={{width:54,height:54,objectFit:'contain',display:'block'}}/>
          </button>
        </div>
      </div>
    </div>

    <div style={{padding:'0 16px 6px',display:'flex',gap:8,flexShrink:0}}>
      <button onClick={goPrev} disabled={idx===0} style={{flex:1,padding:'6px 10px',borderRadius:12,border:'1.5px solid #f0eaea',background:'#fff',fontSize:12,fontWeight:800,color:'#aaa',cursor:'pointer',opacity:idx===0?0.4:1,fontFamily:'inherit'}}>← 上一張</button>
      {tab==='unfamiliar'?(
        <button onClick={handleMarkKnown} disabled={busy} style={{flex:1.6,padding:'6px 10px',borderRadius:12,border:`1.5px solid ${pc}44`,background:`${pc}12`,fontSize:12,fontWeight:900,color:pc,cursor:busy?'wait':'pointer',fontFamily:'inherit',opacity:busy?0.6:1}}>{busy?'…':'✅ 我會了'}</button>
      ):(
        <button onClick={handleMarkUnknown} disabled={busy} style={{flex:1.6,padding:'6px 10px',borderRadius:12,border:'1.5px solid #fde2e6',background:'#fff5f7',fontSize:12,fontWeight:900,color:'#fb7185',cursor:busy?'wait':'pointer',fontFamily:'inherit',opacity:busy?0.6:1}}>{busy?'…':'↩ 移回未熟練'}</button>
      )}
      <button onClick={goNext} disabled={idx>=cards.length-1} style={{flex:1,padding:'6px 10px',borderRadius:12,border:'none',background:`linear-gradient(135deg,${pc},${pc}bb)`,fontSize:12,fontWeight:900,color:'#fff',cursor:'pointer',opacity:idx>=cards.length-1?0.5:1,fontFamily:'inherit'}}>下一張 →</button>
    </div>
    <BottomNav screen="flash" onNav={onNav} pc={pc}/>
  </div>);
}

/* ══ QUIZ ════════════════════════════════════════════════ */
// Question-type theme tokens (matches fix1.jpg orange / fix2.jpg cyan)
const Q_THEME={
  zh2en:{color:'#61c2ff',icon:'🎯',label:'選出正確解釋'},
  cloze:{color:'#FF9800',icon:'✏️',label:'填入正確單字'},
  tense:{color:'#38bdf8',icon:'⏱',label:'選出正確時態'},
};

function Blank({width=78,color='#555',filled}){
  return(<span style={{display:'inline-block',minWidth:width,padding:'0 6px',margin:'0 4px',borderBottom:`2px solid ${color}`,textAlign:'center',fontWeight:900,color:filled?color:'transparent',verticalAlign:'baseline',lineHeight:1.2,letterSpacing:1,fontFamily:filled?'monospace':'inherit'}}>{filled||'＿'}</span>);
}

function QuizScreen({charSrc,charName,quizPool,knownWords,onFinish,onNav,pc,refreshFb,voiceGender='female'}){
  const TOTAL=Math.min(15,quizPool.length);
  const knownSet=useMemo(()=>new Set(knownWords||[]),[knownWords]);
  const [questions]=useState(()=>buildQuizItems(quizPool,TOTAL,knownSet));
  const HINT_BUDGET=3;
  const [idx,setIdx]=useState(0);
  const [selected,setSel]=useState(null);   // for zh2en/tense: chosen option string; for cloze: 'submitted' marker
  const [clozeInput,setClozeInput]=useState('');
  const [clozeResult,setClozeResult]=useState(null); // {isCorrect, userAnswer}
  const [score,setScore]=useState(0);
  const [xp,setXp]=useState(0);
  const [combo,setCombo]=useState(0);
  const [showConf,setConf]=useState(false);
  const [xpMsg,setXpMsg]=useState(null);
  const [shaking,setShaking]=useState(false);
  const [hintsLeft,setHintsLeft]=useState(HINT_BUDGET);
  const [hintRevealed,setHintRevealed]=useState(false); // tense hint shown
  const [hiddenOpts,setHiddenOpts]=useState(new Set()); // zh2en eliminated wrong options
  const [hintUsedThisQ,setHintUsedThisQ]=useState(false); // per-question lock — only 1 hint debit per question
  const [hintFx,setHintFx]=useState(0);
  const inputRef=useRef(null);

  useEffect(()=>{
    // Focus input when a cloze question mounts
    if(questions[idx]?.type==='cloze'&&inputRef.current){
      setTimeout(()=>inputRef.current?.focus(),100);
    }
    // Reset per-question hint state
    setHintRevealed(false);
    setHiddenOpts(new Set());
    setHintUsedThisQ(false);
    setHintFx(0);
  },[idx,questions]);

  // Auto-clear the ✨ pop overlay after its animation finishes (~0.4s)
  useEffect(()=>{
    if(hintFx<=0)return;
    const t=setTimeout(()=>setHintFx(0),500);
    return()=>clearTimeout(t);
  },[hintFx]);

  const usePetHint=()=>{
    if(hintsLeft<=0)return;
    if(hintUsedThisQ)return; // already debited this question — additional taps do nothing
    const cur=questions[idx];
    if(!cur||selected||clozeResult)return;
    if(cur.type==='zh2en'){
      const wrongs=cur.options.filter(o=>normalizeAnswer(o.word)!==normalizeAnswer(cur.vocab.word));
      const drop=shuffle(wrongs).slice(0,2).map(o=>o.word);
      if(drop.length===0)return;
      setHiddenOpts(new Set(drop));
    }else if(cur.type==='cloze'){
      try{speakText(cur.correct,{gender:voiceGender});}catch(e){console.warn('speak failed',e);}
    }else if(cur.type==='tense'){
      setHintRevealed(true);
    }else return;
    setHintUsedThisQ(true);
    setHintsLeft(n=>Math.max(0,n-1));
    setHintFx(t=>t+1);
  };

  if(TOTAL===0)return(
    <div className="screen" style={{background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)'}}>
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:40,gap:16,textAlign:'center'}}>
        <span style={{fontSize:60}}>🎮</span>
        <div style={{fontSize:20,fontWeight:900,color:'#1a1a2e'}}>還沒有可以測驗的單字</div>
        <div style={{fontSize:14,color:'#aaa',lineHeight:1.6}}>先到首頁看看今日新單字，明天就可以測驗了！</div>
        <button onClick={()=>onNav('home')} style={{padding:'14px 28px',borderRadius:18,border:'none',cursor:'pointer',background:`linear-gradient(135deg,${pc},${pc}bb)`,fontSize:15,fontWeight:900,color:'#fff',fontFamily:'inherit'}}>回首頁</button>
      </div>
      <BottomNav screen="quiz" onNav={onNav} pc={pc}/>
    </div>
  );

  const q=questions[idx];
  const vocab=q.vocab;
  const theme=Q_THEME[q.type]||Q_THEME.zh2en;

  const afterAnswer=async(ok)=>{
    let gain=0,food=0,nextCombo=0;
    if(ok){
      try{
        if(window.FB?.ops?.answerCorrect){
          const r=await window.FB.ops.answerCorrect(window.FB.uid,q.type==='tense');
          gain=r.gainExp||0;food=r.addFood||0;nextCombo=r.newCombo||0;
          await refreshFb?.();
        }
      }catch(e){console.warn('[Quiz] answerCorrect failed',e);}
      setScore(s=>s+1);setXp(x=>x+gain);setCombo(nextCombo);
      setConf(true);setXpMsg(food>0?`+${gain} EXP　🍖 ×${food}！`:`+${gain} EXP`);
      setTimeout(()=>setConf(false),1200);setTimeout(()=>setXpMsg(null),1000);
    }else{
      try{if(window.FB?.ops?.answerWrong){await window.FB.ops.answerWrong(window.FB.uid);}}catch(e){console.warn('[Quiz] answerWrong failed',e);}
      try{if(window.FB?.ops?.markWordUnknown&&q?.vocab?.word){await window.FB.ops.markWordUnknown(window.FB.uid,q.vocab.word);}}catch(e){console.warn('[Quiz] markWordUnknown failed',e);}
      try{await refreshFb?.();}catch{}
      setCombo(0);
      setShaking(true);setTimeout(()=>setShaking(false),500);
    }
    // For cloze we linger a bit longer so kids can read the correct answer
    const delay=q.type==='cloze'?1600:1100;
    setTimeout(()=>{
      setSel(null);setClozeInput('');setClozeResult(null);
      if(idx+1>=TOTAL) onFinish(ok?score+1:score,ok?xp+gain:xp,TOTAL);
      else setIdx(i=>i+1);
    },delay);
  };

  const answerChoice=(optStr)=>{
    if(selected)return;
    setSel(optStr);
    const correctStr=q.type==='zh2en'?q.vocab.word:q.correct;
    afterAnswer(normalizeAnswer(optStr)===normalizeAnswer(correctStr));
  };
  const submitCloze=()=>{
    if(clozeResult)return;
    const ok=normalizeAnswer(clozeInput)===normalizeAnswer(q.correct);
    setClozeResult({isCorrect:ok,userAnswer:clozeInput});
    afterAnswer(ok);
  };
  const giveUp=()=>{
    if(selected||clozeResult)return;
    if(q.type==='cloze'){
      setClozeInput('');
      setClozeResult({isCorrect:false,userAnswer:''});
    }else{
      // mark a sentinel selection so UI shows correct answer highlight
      setSel('__give_up__');
    }
    afterAnswer(false);
  };

  const bgBtn=(label,correctLabel)=>{if(!selected)return'#fff';if(normalizeAnswer(label)===normalizeAnswer(correctLabel))return'#4CAF82';if(normalizeAnswer(label)===normalizeAnswer(selected))return'#FF4D6D';return'#fff';};
  const colBtn=(label,correctLabel)=>{if(!selected)return'#1a1a2e';if(normalizeAnswer(label)===normalizeAnswer(correctLabel)||normalizeAnswer(label)===normalizeAnswer(selected))return'#fff';return'#ccc';};
  const bdrBtn=(label,correctLabel)=>{if(!selected)return'2px solid #f0eaea';if(normalizeAnswer(label)===normalizeAnswer(correctLabel))return'2px solid #4CAF82';if(normalizeAnswer(label)===normalizeAnswer(selected))return'2px solid #FF4D6D';return'2px solid #f5f5f5';};

  // ─ Render question card per type ─
  const giveUpBtn=(!selected&&!clozeResult)?(
    <div style={{textAlign:'center',paddingTop:6,paddingBottom:4}}>
      <button onClick={giveUp} style={{padding:'7px 16px',borderRadius:14,border:'none',background:'linear-gradient(135deg,#fb7185,#fb7185cc)',fontSize:11,fontWeight:900,color:'#fff',cursor:'pointer',fontFamily:'inherit',boxShadow:'0 3px 10px rgba(251,113,133,0.30)'}}>放棄此題（進未熟練）</button>
    </div>
  ):null;

  let questionCard,answerArea;

  if(q.type==='zh2en'){
    const correct=vocab;
    const catColor=CAT[correct.cat]||'#94a3b8';
    questionCard=(
      <div style={{background:'#fff',borderRadius:22,padding:'14px 20px',textAlign:'center',boxShadow:'0 4px 18px rgba(0,0,0,0.07)',marginBottom:12,flexShrink:0,animation:shaking?'shake 0.4s ease-in-out':'pop 0.2s ease-out',display:'flex',flexDirection:'column',alignItems:'center',gap:6,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${catColor},${catColor}44)`}}/>
        <div style={{fontSize:11,fontWeight:800,color:theme.color,background:`${theme.color}18`,padding:'3px 12px',borderRadius:20,letterSpacing:0.5}}>{theme.icon} {theme.label}</div>
        {correct.visual&&<span style={{fontSize:44,lineHeight:1,marginTop:4}}>{correct.visual}</span>}
        <div style={{fontSize:28,fontWeight:900,color:'#1a1a2e',letterSpacing:2,wordBreak:'break-word'}}>{correct.word}</div>
        <div style={{fontSize:10,color:catColor,fontWeight:800,background:`${catColor}18`,padding:'2px 10px',borderRadius:20}}>{correct.cat}</div>
      </div>
    );
    answerArea=(
      <div className="scroll-body" style={{display:'flex',flexDirection:'column',gap:8,paddingBottom:8}}>
        {q.options.filter(opt=>!hiddenOpts.has(opt.word)).map((opt,i)=>(
          <button key={opt.word+i} onClick={()=>answerChoice(opt.word)} style={{width:'100%',padding:'12px 16px',borderRadius:16,border:bdrBtn(opt.word,correct.word),background:bgBtn(opt.word,correct.word),color:colBtn(opt.word,correct.word),fontSize:14,fontWeight:800,cursor:'pointer',textAlign:'left',display:'flex',alignItems:'center',gap:10,boxShadow:selected&&normalizeAnswer(opt.word)===normalizeAnswer(correct.word)?'0 4px 14px #4CAF8244':'0 2px 6px rgba(0,0,0,0.04)',transition:'all 0.15s',animation:`slideUp 0.2s ${i*0.04}s both`,opacity:selected&&normalizeAnswer(opt.word)!==normalizeAnswer(correct.word)&&normalizeAnswer(opt.word)!==normalizeAnswer(selected)?0.4:1,fontFamily:'inherit',flexShrink:0}}>
            <span style={{fontSize:16,flexShrink:0}}>{opt.visual||'💬'}</span>
            <span style={{flex:1,lineHeight:1.3,wordBreak:'break-word'}}>{opt.zh}</span>
            {selected&&normalizeAnswer(opt.word)===normalizeAnswer(correct.word)&&<span style={{fontSize:16,flexShrink:0}}>✓</span>}
            {selected&&normalizeAnswer(opt.word)===normalizeAnswer(selected)&&normalizeAnswer(opt.word)!==normalizeAnswer(correct.word)&&<span style={{fontSize:16,flexShrink:0}}>✗</span>}
          </button>
        ))}
        {giveUpBtn}
      </div>
    );
  } else if(q.type==='cloze'){
    // Fill-in-the-word with input box
    const hintDisplay=q.hintFirst+('_'.repeat(Math.max(2,String(q.correct).length-1)));
    const locked=!!clozeResult;
    const isCorrect=clozeResult?.isCorrect;
    questionCard=(
      <div style={{background:'#fff',borderRadius:22,padding:'16px 20px',boxShadow:'0 4px 18px rgba(0,0,0,0.07)',marginBottom:12,flexShrink:0,animation:shaking?'shake 0.4s ease-in-out':'pop 0.2s ease-out',display:'flex',flexDirection:'column',gap:10,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${theme.color},${theme.color}44)`}}/>
        <div style={{textAlign:'center'}}>
          <span style={{fontSize:11,fontWeight:800,color:theme.color,background:`${theme.color}18`,padding:'4px 12px',borderRadius:20,letterSpacing:0.5}}>{theme.icon} {theme.label}</span>
        </div>
        <div style={{fontSize:12,color:'#aaa',fontWeight:700,textAlign:'center'}}>提示首字：<span style={{fontFamily:'monospace',color:theme.color,fontWeight:900,fontSize:14}}>{hintDisplay}</span></div>
        <div style={{fontSize:17,fontWeight:700,color:'#1a1a2e',lineHeight:1.8,textAlign:'left',padding:'4px 0'}}>
          <span>{q.before}</span>
          <Blank width={86} color={locked?(isCorrect?'#4CAF82':'#FF4D6D'):theme.color} filled={locked?q.correct:null}/>
          <span>{q.after}</span>
        </div>
        {q.zh2&&<div style={{fontSize:12,color:'#aaa',textAlign:'center',fontStyle:'italic'}}>「{q.zh2}」</div>}
      </div>
    );
    answerArea=(
      <div style={{display:'flex',flexDirection:'column',gap:10,paddingBottom:8}}>
        <input ref={inputRef} type="text" value={clozeInput} placeholder="輸入英文單字…"
          disabled={locked} maxLength={24}
          onChange={e=>setClozeInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!locked)submitCloze();}}
          autoComplete="off" autoCapitalize="none" autoCorrect="off" spellCheck="false"
          style={{width:'100%',padding:'14px 16px',borderRadius:16,border:`2px solid ${locked?(isCorrect?'#4CAF82':'#FF4D6D'):(clozeInput?theme.color:'#f0eaea')}`,background:locked?(isCorrect?'#e9f8ef':'#ffeef0'):'#fff',fontSize:18,fontWeight:800,color:'#1a1a2e',outline:'none',fontFamily:'monospace',textAlign:'center',letterSpacing:1,transition:'all 0.2s'}}/>
        {locked&&<div style={{fontSize:12,fontWeight:800,color:isCorrect?'#4CAF82':'#FF4D6D',textAlign:'center'}}>
          {isCorrect?'✓ 答對了！':`✗ 正確答案：${q.correct}`}
        </div>}
        {!locked&&<button onClick={submitCloze} disabled={!clozeInput.trim()} style={{padding:14,borderRadius:16,border:'none',cursor:'pointer',background:`linear-gradient(135deg,${theme.color},${theme.color}bb)`,fontSize:15,fontWeight:900,color:'#fff',boxShadow:`0 4px 14px ${theme.color}44`,opacity:clozeInput.trim()?1:0.4,transition:'opacity 0.2s',fontFamily:'inherit'}}>送出答案</button>}
        {giveUpBtn}
      </div>
    );
  } else if(q.type==='tense'){
    questionCard=(
      <div style={{background:'#fff',borderRadius:22,padding:'16px 20px',boxShadow:'0 4px 18px rgba(0,0,0,0.07)',marginBottom:12,flexShrink:0,animation:shaking?'shake 0.4s ease-in-out':'pop 0.2s ease-out',display:'flex',flexDirection:'column',gap:10,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${theme.color},${theme.color}44)`}}/>
        <div style={{textAlign:'center'}}>
          <span style={{fontSize:11,fontWeight:800,color:theme.color,background:`${theme.color}18`,padding:'4px 12px',borderRadius:20,letterSpacing:0.5}}>{theme.icon} {theme.label}</span>
        </div>
        <div style={{fontSize:16,fontWeight:700,color:'#1a1a2e',lineHeight:1.8,textAlign:'left',padding:'4px 0'}}>
          <span>{q.before}</span>
          <Blank width={90} color={selected?'#4CAF82':theme.color} filled={selected?q.correct:null}/>
          <span>{q.after}</span>
        </div>
        {hintRevealed&&q.tenseHint&&<div style={{fontSize:12,fontWeight:800,color:theme.color,background:`${theme.color}14`,padding:'7px 12px',borderRadius:14,textAlign:'center',animation:'pop 0.25s ease-out'}}>💡 {q.tenseHint}（原形：<span style={{fontFamily:'monospace',fontWeight:900,letterSpacing:1}}>{q.baseWord}</span>）</div>}
        {q.zh2&&<div style={{fontSize:12,color:'#aaa',textAlign:'center',fontStyle:'italic'}}>「{q.zh2}」</div>}
      </div>
    );
    answerArea=(
      <div className="scroll-body" style={{display:'flex',flexDirection:'column',gap:8,paddingBottom:8}}>
        {q.options.map((opt,i)=>(
          <button key={opt+i} onClick={()=>answerChoice(opt)} style={{width:'100%',padding:'12px 16px',borderRadius:16,border:bdrBtn(opt,q.correct),background:bgBtn(opt,q.correct),color:colBtn(opt,q.correct),fontSize:15,fontWeight:800,cursor:'pointer',textAlign:'center',boxShadow:selected&&normalizeAnswer(opt)===normalizeAnswer(q.correct)?'0 4px 14px #4CAF8244':'0 2px 6px rgba(0,0,0,0.04)',transition:'all 0.15s',animation:`slideUp 0.2s ${i*0.04}s both`,opacity:selected&&normalizeAnswer(opt)!==normalizeAnswer(q.correct)&&normalizeAnswer(opt)!==normalizeAnswer(selected)?0.4:1,fontFamily:'monospace',letterSpacing:1,flexShrink:0}}>
            {opt}
            {selected&&normalizeAnswer(opt)===normalizeAnswer(q.correct)&&<span style={{fontSize:14,marginLeft:8}}>✓</span>}
            {selected&&normalizeAnswer(opt)===normalizeAnswer(selected)&&normalizeAnswer(opt)!==normalizeAnswer(q.correct)&&<span style={{fontSize:14,marginLeft:8}}>✗</span>}
          </button>
        ))}
        {giveUpBtn}
      </div>
    );
  }

  return(<div className="screen" style={{background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)',position:'relative',overflow:'hidden'}}>

    <div style={{padding:'46px 20px 6px',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
      <div style={{flex:1,height:9,background:'rgba(0,0,0,0.06)',borderRadius:9}}>

            <img src={charSrc} alt="" style={{width:48,height:48,objectFit:'contain',filter:(hintsLeft<=0||hintUsedThisQ)?'grayscale(0.7) opacity(0.55)':'none',transition:'filter 0.2s'}}/>
            {hintsLeft>0&&!hintUsedThisQ&&!selected&&!clozeResult&&<span style={{position:'absolute',top:-6,right:-2,fontSize:18,lineHeight:1,filter:'drop-shadow(0 1px 2px rgba(0,0,0,0.18))'}}>💡</span>}

        </button>

/* ══ LEADERBOARD ═════════════════════════════════════════ */
const PODIUM_H=[110,148,90];
const PODIUM_C=['#C0C0C0','#FFD700','#CD7F32'];
const PODIUM_MEDAL=['🥈','🥇','🥉'];

function RankScreen({uid,studentName,charIdx,stats,onNav,pc,cloudEntries,cloudStreakEntries,cloudStatus,onRefresh}){
  const [tab,setTab]=useState('score');

  const todayKey=taipeiDateKey();
  const list=useMemo(()=>{
    const cloud=tab==='score'?cloudEntries:cloudStreakEntries;
    const arr=(cloud||[]).map(e=>({
      name:e.name||'(未命名)',
      avgScore:Number(e.avgScore||0),
      streak:e.streakCur|0,
      streakBest:e.streakBest|0,
      todayQuiz:(e.todayQuizDate===todayKey)?(e.todayQuizCount|0):0,
      level:e.level|0||1,
      charIdx:avatarIdxFromId(e.avatarId),
      uid:e.uid||'',
      isMe:uid&&e.uid===uid,
    }));
    // Inject me locally if not in cloud yet
    if(studentName&&!arr.some(r=>r.isMe)){
      arr.push({uid:uid||'',name:studentName,avgScore:Number(stats.avgScore||0),streak:stats.streak|0,streakBest:stats.streakBest||stats.streak||0,todayQuiz:stats.todayQuiz|0,level:stats.level|0||1,charIdx,isMe:true});
    }
    if(tab==='score'){
      arr.sort((a,b)=>(b.avgScore-a.avgScore)||(b.streak-a.streak)||(b.streakBest-a.streakBest));
    }else{
      arr.sort((a,b)=>(b.streak-a.streak)||(b.avgScore-a.avgScore)||(b.streakBest-a.streakBest));
    }
    return arr.map((r,i)=>({...r,rank:i+1}));
  },[tab,cloudEntries,cloudStreakEntries,studentName,charIdx,stats,uid,todayKey]);

  const top3Src=[list[1],list[0],list[2]]; // left 2nd, center 1st, right 3rd
  const showUnit=tab==='score'?'分':'天';
  const fmtVal=r=>tab==='score'?Number(r.avgScore||0).toFixed(1):r.streak;

  return(<div className="screen" style={{background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)'}}>
    <div style={{padding:'48px 20px 6px',flexShrink:0,display:'flex',alignItems:'center',gap:8}}>
      <div style={{fontSize:18,fontWeight:900,color:'#1a1a2e',flex:1}}>🏆 排行榜</div>
      <button onClick={onRefresh} style={{padding:'5px 12px',borderRadius:14,border:'none',background:`${pc}15`,color:pc,fontSize:11,fontWeight:800,cursor:'pointer',fontFamily:'inherit'}}>{cloudStatus==='loading'?'同步中…':'↻ 更新'}</button>
    </div>
    {cloudStatus==='offline'&&<div style={{margin:'0 20px 8px',background:'#fff4e5',color:'#b75d00',fontSize:11,fontWeight:700,padding:'6px 10px',borderRadius:10,textAlign:'center',flexShrink:0}}>雲端連線失敗，目前顯示本地資料</div>}

    <div style={{display:'flex',margin:'4px 20px 14px',background:'#f0f8fa',borderRadius:14,padding:3,flexShrink:0}}>
      {[['score','分數排行'],['streak','連續天數']].map(([id,label])=>(
        <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:'8px',borderRadius:11,border:'none',cursor:'pointer',background:tab===id?'#fff':'transparent',fontSize:13,fontWeight:800,color:tab===id?pc:'#aaa',boxShadow:tab===id?'0 2px 8px rgba(0,0,0,0.08)':'none',transition:'all 0.2s',fontFamily:'inherit'}}>{label}</button>
      ))}
    </div>

    {cloudStatus==='loading'&&list.length===0?(
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}><div className="spinner"/></div>
    ):(
      <>
        <div style={{display:'flex',alignItems:'flex-end',justifyContent:'center',gap:6,padding:'0 20px 14px',flexShrink:0,minHeight:200}}>
          {top3Src.map((r,pi)=>{
            if(!r)return(<div key={'empty-'+pi} style={{flex:1}}/>);
            const val=fmtVal(r);
            const isFirst=pi===1,isSecond=pi===0;
            const valSize=isFirst?30:isSecond?22:17;
            const unitSize=Math.round(valSize*0.42);
            const medalSize=isFirst?30:24;
            return(<div key={r.name+pi} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
              {r.isMe&&<div style={{fontSize:9,fontWeight:900,color:pc,background:`${pc}20`,padding:'2px 6px',borderRadius:10}}>你</div>}
              <img src={CHARACTERS[r.charIdx]?.img||CHARACTERS[0].img} alt="" style={{width:isFirst?50:40,height:isFirst?50:40,objectFit:'contain'}}/>
              <div style={{fontSize:10,fontWeight:900,color:r.isMe?pc:'#555',maxWidth:84,textAlign:'center',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name} <span style={{color:'#ffb300'}}>LV{r.level}</span></div>
              <div style={{width:'100%',height:PODIUM_H[pi],borderRadius:'10px 10px 0 0',background:`linear-gradient(180deg,${PODIUM_C[pi]},${PODIUM_C[pi]}88)`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'space-between',padding:'10px 0 6px',boxShadow:`0 -4px 12px ${PODIUM_C[pi]}44`}}>
                <span style={{fontSize:valSize,fontWeight:900,color:'#fff',lineHeight:1,textShadow:'0 2px 6px rgba(0,0,0,0.22)'}}>{val}<span style={{fontSize:unitSize,marginLeft:2,opacity:0.92}}>{showUnit}</span></span>
                <span style={{fontSize:medalSize,filter:'drop-shadow(0 2px 4px rgba(0,0,0,0.18))'}}>{PODIUM_MEDAL[pi]}</span>
              </div>
            </div>);
          })}
        </div>

        <div className="scroll-body" style={{padding:'0 20px 8px'}}>
          {list.slice(3).map(r=>{
            const val=fmtVal(r);
            return(<div key={r.name+r.rank} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',background:r.isMe?`${pc}10`:'#fff',borderRadius:16,marginBottom:8,boxShadow:r.isMe?`0 2px 10px ${pc}22`:'0 1px 6px rgba(0,0,0,0.04)',border:r.isMe?`1.5px solid ${pc}33`:'1.5px solid transparent'}}>
              <div style={{width:26,textAlign:'center',fontSize:13,fontWeight:900,color:'#ddd'}}>{r.rank}</div>
              <img src={CHARACTERS[r.charIdx]?.img||CHARACTERS[0].img} alt="" style={{width:36,height:36,objectFit:'contain'}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:900,color:r.isMe?pc:'#1a1a2e',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name} <span style={{color:'#ffb300',fontSize:11}}>LV{r.level}</span>{r.isMe?' (我)':''}</div>
                <div style={{fontSize:10,color:'#aaa',fontWeight:700}}>🔥 連續 {r.streak} 天 · 今日 {r.todayQuiz|0} 題</div>
              </div>
              <div style={{fontSize:17,fontWeight:900,color:r.isMe?pc:'#555'}}>{val}<span style={{fontSize:10,color:'#aaa',fontWeight:700}}> {showUnit}</span></div>
            </div>);
          })}
          {list.length<=3&&<div style={{textAlign:'center',color:'#bbb',fontSize:12,padding:20}}>目前還沒有其他玩家資料</div>}
        </div>
      </>
    )}
    <BottomNav screen="rank" onNav={onNav} pc={pc}/>
  </div>);
}

/* ══ APP ═════════════════════════════════════════════════ */
function App(){
  const [profile,setProfile]=useState(()=>loadProfile());
  const [screen,setScreen]=useState('home');
  const [result,setResult]=useState(null);
  const [stats,setStats]=useState(loadStats);
  const [vocabAll,setVocabAll]=useState(null);
  const [difficultyOrder,setDifficultyOrder]=useState([]);
  const [loadError,setLoadError]=useState('');
  const [levelUpInfo,setLevelUpInfo]=useState(null);
  const [cloudEntries,setCloudEntries]=useState([]);
  const [cloudStreakEntries,setCloudStreakEntries]=useState([]);
  const [cloudStatus,setCloudStatus]=useState('idle');
  const [fb,refreshFb]=useFb();
  const claimAttempted=useRef(false);
  useEffect(()=>{
    if(claimAttempted.current)return;
    if(!fb?.ready||!window.FB)return;
    if(fb.pet)return;
    if(Object.prototype.hasOwnProperty.call(profile||{},'petId'))return; // new-mode profiles may intentionally be visitor after release
    const idx=profile?.charIdx;
    if(typeof idx!=='number')return;
    const targetId=window.FB.config.SEED_PETS[idx]?.id;
    if(!targetId)return;
    claimAttempted.current=true;
    window.FB.ops.claimPet(window.FB.uid,targetId)
      .then(()=>refreshFb())
      .catch(e=>{claimAttempted.current=false;console.warn('[App] auto-claim failed',e.message);});
  },[fb,profile,refreshFb]);

  const pc='#61c2ff';
  const currentPetId=fb?.ready?(fb?.profile?.currentPetId||null):(profile?.petId||null);
  const charIdx=(currentPetId?petIdxFromId(currentPetId):null)??profile?.charIdx??0;
  const charSrc=fb?.pet?.img||CHARACTERS[charIdx]?.img||CHARACTERS[0].img;
  const charName=fb?.pet?.name||CHARACTERS[charIdx]?.name||'小夥伴';
  const studentName=fb?.profile?.name||profile?.name||'同學';
  const today=taipeiDateKey();
  const profileTodayDate=fb?.profile?.todayQuizDate||stats.todayQuizDate||'';
  const profileTodayCount=fb?.profile?.todayQuizCount??stats.todayQuiz??0;
  const displayStats={
    ...stats,
    streak:fb?.profile?.streakCur??stats.streak??0,
    best:fb?.profile?.bestScore??stats.best??0,
    avgScore:fb?.profile?.avgScore??stats.avgScore??0,
    totalGames:fb?.profile?.totalGames??stats.totalGames??0,
    xp:fb?.profile?.exp??stats.xp??0,
    todayQuiz:profileTodayDate===today?(profileTodayCount|0):0,
    level:fb?.profile?.level||1,
    totalExp:fb?.profile?.totalExp??estimateTotalExpForLevel(fb?.profile?.level||1,fb?.profile?.exp??stats.xp??0),
  };

  // Load vocab-data.json + difficulty file once
  useEffect(()=>{
    (async()=>{
      try{
        const res=await fetch('vocab-data.json?t='+Date.now(),{cache:'no-store'});
        if(!res.ok)throw new Error('HTTP '+res.status);
        const data=await res.json();
        const words=Array.isArray(data.words)?data.words:Array.isArray(data.vocab)?data.vocab:[];
        if(!words.length)throw new Error('空的 vocab 資料');
        setVocabAll(words.map(normalizeVocab));
      }catch(e){
        console.warn('vocab-data.json 載入失敗，使用 fallback:',e);
        setVocabAll(FALLBACK_WORDS);
        setLoadError(String(e.message||e));
      }
    })();
    (async()=>{
      try{
        const res=await fetch('vocab-difficulty.json?t='+Date.now(),{cache:'no-store'});
        if(!res.ok)throw new Error('HTTP '+res.status);
        const data=await res.json();
        if(Array.isArray(data.order))setDifficultyOrder(data.order);
      }catch(e){console.warn('vocab-difficulty.json 載入失敗，按日期 fallback:',e);}
    })();
  },[]);

  const refreshLeaderboard=useCallback(async()=>{
    setCloudStatus('loading');
    try{
      const best=await cloudRunQuery('avgScore',80);
      best.sort((a,b)=>(Number(b.avgScore||0))-(Number(a.avgScore||0))||String(b.updatedAt||'').localeCompare(String(a.updatedAt||'')));
      setCloudEntries(best);
      try{
        const streak=await cloudRunQuery('streakCur',80);
        streak.sort((a,b)=>(b.streakCur||0)-(a.streakCur||0)||(Number(b.avgScore||0)-Number(a.avgScore||0)));
        setCloudStreakEntries(streak);
      }catch{setCloudStreakEntries([]);}
      setCloudStatus('ok');
    }catch(e){
      console.warn('leaderboard fetch failed',e);
      setCloudStatus('offline');
    }
  },[]);

  // Fetch leaderboard when entering rank screen or at startup
  useEffect(()=>{if(screen==='rank')refreshLeaderboard();},[screen,refreshLeaderboard]);

  // Today's set + level-based study path: LV1 gets easiest 15 cards + today's 3; each level unlocks 5 more.
  const {todaySet,quizPool,dateLabel}=useMemo(()=>{
    if(!vocabAll)return{todaySet:[],quizPool:[],dateLabel:formatDate(today)};
    const byDate=new Map();
    for(const w of vocabAll){if(!w.date)continue;if(!byDate.has(w.date))byDate.set(w.date,[]);byDate.get(w.date).push(w);}
    const allDates=[...byDate.keys()].sort();
    const latest=allDates[allDates.length-1]||'';
    const todayWords=byDate.get(today)||[];
    const displayDate=todayWords.length?today:latest;
    const displaySet=(todayWords.length?todayWords:(byDate.get(latest)||[])).slice(0,3);
    const focusWords=new Set(displaySet.map(w=>w.word));
    const pathWords=vocabAll.filter(w=>!focusWords.has(w.word));
    const unlocked=unlockedWords(pathWords,difficultyOrder,displayStats.level||1);
    const studyPool=mergeStudyPool(unlocked,displaySet);
    return{
      todaySet:displaySet,
      quizPool:studyPool.length?studyPool:vocabAll,
      dateLabel:formatDate(displayDate||today),
    };
  },[vocabAll,difficultyOrder,today,displayStats.level]);

  const nav=(s)=>{if(s==='quiz'&&screen!=='quiz')setResult(null);setScreen(s);};

  const levelUpAckingRef=useRef(false);
  // Watch pendingLevelUp on home screen → show modal once
  useEffect(()=>{
    if(screen!=='home')return;
    if(levelUpInfo)return;
    if(levelUpAckingRef.current)return; // mid-ack: ignore stale pending value
    const pending=fb?.profile?.pendingLevelUp|0;
    if(pending<=0)return;
    const newLevel=fb?.profile?.level||1;
    const oldLevel=Math.max(1,newLevel-pending);
    const focusWords=new Set((todaySet||[]).map(w=>w.word));
    const pathWords=vocabAll?vocabAll.filter(w=>!focusWords.has(w.word)):[];
    const unlocked=pathWords.length?newlyUnlockedWords(difficultyOrder,pathWords,oldLevel,newLevel):[];
    setLevelUpInfo({level:newLevel,unlocked});
  },[screen,fb?.profile?.pendingLevelUp,fb?.profile?.level,levelUpInfo,vocabAll,difficultyOrder,todaySet]);

  const handleCloseLevelUp=async()=>{
    levelUpAckingRef.current=true;
    try{if(window.FB?.ops?.ackLevelUp&&window.FB?.uid)await window.FB.ops.ackLevelUp(window.FB.uid);}catch(e){console.warn('ackLevelUp failed',e);}
    try{await refreshFb();}catch{}
    setLevelUpInfo(null);
    // Release lock on next tick so the now-zero pending is the value the effect sees
    setTimeout(()=>{levelUpAckingRef.current=false;},0);
  };

  const handleFinish=async(score,xpGained,total)=>{
    const pct=total>0?(score/total*100):0;
    const baseStats=displayStats;
    const baseAvg=Number(baseStats.avgScore||0);
    const games=baseStats.totalGames||0;
    const newAvg=games===0?Math.round(pct*10)/10:Math.round((baseAvg*games+pct)/(games+1)*10)/10;

    if(window.FB?.uid&&studentName){

        saveStats(ns2);setStats(ns2);
        await refreshFb();
        refreshLeaderboard();
      }
    }
  };

  if(!vocabAll){
    return(<div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)'}}>

  if(!profile)return(<div style={{width:'100%',height:'100%',position:'relative'}}>
    <LineWebViewBanner/>
    <OnboardingScreen onDone={p=>{setProfile(p);setScreen('home');}} pc={pc}/>
  </div>);

  return(<div style={{width:'100%',height:'100%',position:'relative'}}>
    <LineWebViewBanner/>
    {screen==='home'&&<HomeScreen charSrc={charSrc} charName={charName} studentName={studentName} stats={displayStats} todaySet={todaySet} dateLabel={dateLabel} onNav={nav} onSelectChar={()=>setScreen('charselect')} pc={pc} fb={fb} refreshFb={refreshFb}/>}
    {screen==='charselect'&&<CharSelectScreen current={charIdx} fb={fb} refreshFb={refreshFb} onSelect={async petId=>{
      if(window.FB&&petId){
        try{await window.FB.ops.claimPet(window.FB.uid,petId);await refreshFb();}
        catch(e){
          const msgs={'pet-taken':'這隻已經被別人帶走了！','pet-disabled':'這隻寵物餓壞了，不能選 😢','pet-not-found':'找不到這隻寵物'};
          alert(msgs[e.message]||`選寵失敗：${e.message}`);
          return;
        }
      }
      const idx=petIdxFromId(petId)??charIdx;
      const p={...profile,charIdx:idx,petId};setProfile(p);saveProfile(p);
      setScreen('home');
    }} onBack={()=>setScreen('home')} pc={pc}/>}
    {screen==='flash'&&<FlashScreen charSrc={charSrc} flashAll={quizPool} knownWords={fb?.profile?.knownWords||[]} refreshFb={refreshFb} onNav={nav} pc={pc} voiceGender={fb?.pet?.voiceGender==='male'?'male':'female'}/>}
    {screen==='quiz'&&<QuizScreen charSrc={charSrc} charName={charName} quizPool={quizPool} knownWords={fb?.profile?.knownWords||[]} onFinish={handleFinish} onNav={nav} pc={pc} refreshFb={refreshFb} voiceGender={fb?.pet?.voiceGender==='male'?'male':'female'}/>}
    {screen==='result'&&result&&<ResultScreen {...result} charSrc={charSrc} charName={charName} onRetry={()=>setScreen('quiz')} onHome={()=>setScreen('home')} pc={pc}/>}
    {screen==='rank'&&<RankScreen uid={fb?.uid} studentName={studentName} charIdx={charIdx} stats={displayStats} onNav={nav} pc={pc} cloudEntries={cloudEntries} cloudStreakEntries={cloudStreakEntries} cloudStatus={cloudStatus} onRefresh={refreshLeaderboard}/>}
    {levelUpInfo&&<LevelUpModal level={levelUpInfo.level} unlocked={levelUpInfo.unlocked||[]} pc={pc} onClose={handleCloseLevelUp}/>}
  </div>);
}

const SEED_PET_MAP = Object.fromEntries(SEED_PETS.map(p => [p.id, p]));
function seedPetDoc(id, now = Date.now()) {
  const p = SEED_PET_MAP[id];
  if (!p) return null;
  return { type:p.type, name:p.name, desc:p.desc, img:p.img, ownerUid:null, ownerName:null, status:'available', hp:100, lastHpUpdate:now, createdAt:now, updatedAt:now };
}
function seedPetList(now = Date.now()) {
  return SEED_PETS.map(p => ({ id:p.id, ...seedPetDoc(p.id, now), fallback:true }));
}

function normalizePlayerName(name) {
  return String(name || '').trim().replace(/\s+/g, ' ').slice(0, 40) || '匿名玩家';
}
function playerIdFromName(name) {
  const clean = normalizePlayerName(name).toLowerCase();
  try {
    const bytes = new TextEncoder().encode(clean);
    let bin = '';
    for (const b of bytes) bin += String.fromCharCode(b);
    return 'name_' + btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '').slice(0, 120);
  } catch {
    return 'name_' + clean.replace(/[^a-z0-9_-]+/g, '_').replace(/^_+|_+$/g, '').slice(0, 80);
  }
}


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function calcCurrentHp(pet, now = Date.now()) {
  if (!pet) return 0;
  const hp = Math.max(0, Number(pet.hp ?? 100));
  if (pet.status === 'disabled') return 0;
  // Only actively adopted pets lose HP over time.
  // Available pool pets are paused so unselected pets don't all starve while a child plays with one companion.
  if (pet.status !== 'owned' || !pet.ownerUid) return hp;
  const last = pet.lastHpUpdate || now;
  const passed = Math.floor((now - last) / HP_DECAY_MS);
  return Math.max(0, hp - passed);
}

async function ensureUserProfile(uid, defaultName, legacyUid = null) {
  const ref = doc(db, 'users', uid);
  const snap = await getDoc(ref);
  if (snap.exists()) {
    const existing = snap.data();
    // Backfill fields for users created before the LV/study-path system shipped.
    const patch = {};
    if (existing.level === undefined || existing.level === null) { patch.level = 1; patch.pendingLevelUp = 0; }
    if (existing.pendingLevelUp === undefined || existing.pendingLevelUp === null) patch.pendingLevelUp = 0;
    if (existing.knownWords === undefined || existing.knownWords === null) patch.knownWords = [];
    const levelForTotal = patch.level || existing.level || 1;
    const expForTotal = existing.exp || 0;
    if (existing.totalExp === undefined || existing.totalExp === null) patch.totalExp = estimateTotalExpForLevelModule(levelForTotal, expForTotal);
    if (Object.keys(patch).length) {
      patch.updatedAt = Date.now();
      try { await updateDoc(ref, patch); } catch (e) { console.warn('[FB] profile backfill failed', e); }
      return { ref, data: { ...existing, ...patch }, created: false };
    }
    return { ref, data: existing, created: false };
  }
  const now = Date.now();
  let data = null;
  if (legacyUid && legacyUid !== uid) {
    try {
      const legacySnap = await getDoc(doc(db, 'users', legacyUid));
      if (legacySnap.exists()) {
        data = { ...legacySnap.data(), name: normalizePlayerName(defaultName), playerId: uid, migratedFromAuthUid: legacyUid, updatedAt: now };
      }
    } catch (e) { console.warn('[FB] legacy profile copy failed', e); }
  }
  if (!data) data = {
    name: normalizePlayerName(defaultName),
    playerId: uid,
    currentPetId: null,
    exp: 0, totalExp: 0, combo: 0, foodCount: 0,
    level: 1, pendingLevelUp: 0,
    totalCorrect: 0, totalGames: 0,
    streakCur: 0, streakBest: 0, bestScore: 0, avgScore: 0,
    todayQuizCount: 0, todayQuizDate: '',
    knownWords: [],
    weekPlayed: [], lastPlayDate: '',
    createdAt: now, updatedAt: now,
  };
  await setDoc(ref, data);
  return { ref, data, created: true };
}

async function migrateLegacyPetOwner(legacyUid, playerId, currentPetId) {
  if (!legacyUid || legacyUid === playerId || !currentPetId) return false;
  try {
    return await runTransaction(db, async (tx) => {
      const petRef = doc(db, 'pets', currentPetId);
      const petSnap = await tx.get(petRef);
      if (!petSnap.exists() || petSnap.data().ownerUid !== legacyUid) return false;
      tx.update(petRef, { ownerUid: playerId, updatedAt: Date.now() });
      return true;
    });
  } catch (e) { console.warn('[FB] legacy pet owner migration failed', e); return false; }
}

async function migrateLocalStats(uid, profile) {
  if (profile?.migratedFromLocalAt) return false;
  let old = null;
  try { old = JSON.parse(localStorage.getItem('epopStats3') || 'null'); } catch {}
  if (!old) return false;
  const patch = {
    streakCur: Number(old.streak || 0),
    streakBest: Math.max(Number(old.streak || 0), Number(old.streakBest || 0)),
    bestScore: Number(old.best || 0),
    avgScore: Number(old.avgScore || 0),
    totalGames: Number(old.totalGames || 0),
    exp: Number(profile?.exp || old.xp || 0) % 200,
    totalExp: Number(profile?.totalExp ?? old.xp ?? 0),
    weekPlayed: Array.isArray(old.weekPlayed) ? old.weekPlayed : [],
    migratedFromLocalAt: Date.now(), updatedAt: Date.now(),
  };
  await setDoc(doc(db, 'users', uid), patch, { merge: true });
  return true;
}

async function seedPets() {
  const created = [];
  for (const p of SEED_PETS) {
    const ref = doc(db, 'pets', p.id);
    const snap = await getDoc(ref);
    if (snap.exists()) continue;
    const now = Date.now();
    await setDoc(ref, {
      type: p.type, name: p.name, desc: p.desc, img: p.img,
      ownerUid: null, ownerName: null, status: 'available',
      hp: 100, lastHpUpdate: now,
      createdAt: now, updatedAt: now,
    });
    created.push(p.id);
  }
  return created;
}

  const snap = await getDoc(ref);

}

async function refreshProfile(uid) {
  const snap = await getDoc(doc(db, 'users', uid));
