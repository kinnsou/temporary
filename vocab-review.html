<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>單字複習小教室</title>
  <style>
    :root {
      --green: #58cc02;
      --green-dark: #58a700;
      --green-light: #d7ffb8;
      --green-bg: #e8fcd0;
      --blue: #1cb0f6;
      --blue-dark: #1899d6;
      --red: #ff4b4b;
      --red-dark: #ea2b2b;
      --red-bg: #ffdfe0;
      --gold: #ffc800;
      --ink: #3c3c3c;
      --ink-soft: #4b4b4b;
      --muted: #777;
      --line: #e5e5e5;
      --line-2: #d0d0d0;
      --bg: #ffffff;
      --paper: #fafafa;
      --shadow: 0 2px 0 rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }

    body {
      font-family: "Nunito", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei",
                   -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 0 1rem 3rem;
    }

    /* Header */
    .header {
      background: #fff;
      border-bottom: 2px solid var(--line);
      padding: 1.2rem 1rem 1rem;
      text-align: center;
    }

    .header-title {
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--green-dark);
      letter-spacing: 0.02em;
    }

    .header-sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 10px;
      margin: 1.1rem 0 1.2rem;
    }

    .tab-btn {
      flex: 1;
      padding: 14px 10px;
      border: 2px solid var(--line);
      border-bottom-width: 4px;
      border-radius: 14px;
      background: #fff;
      color: var(--ink-soft);
      font-size: 0.95rem;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.08s;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .tab-btn:hover:not(.active) { background: var(--paper); }
    .tab-btn:active:not(.active) { transform: translateY(1px); border-bottom-width: 3px; }

    .tab-btn.active {
      background: var(--green);
      color: #fff;
      border-color: var(--green-dark);
    }

    /* Panels */
    .panel { display: none; animation: fadeIn 0.2s ease; }
    .panel.active { display: block; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    /* === Cards tab === */
    .search-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }

    .search-input {
      flex: 1;
      padding: 12px 14px;
      border: 2px solid var(--line);
      border-radius: 12px;
      background: #fff;
      font-size: 1rem;
      font-family: inherit;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input:focus { border-color: var(--blue); }

    .meta-line {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 10px;
      letter-spacing: 0.02em;
    }

    .card-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .vocab-card {
      background: #fff;
      border: 2px solid var(--line);
      border-bottom-width: 4px;
      border-radius: 14px;
      padding: 0.9rem 1.1rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .vocab-card:hover { background: var(--paper); border-color: var(--line-2); }
    .vocab-card.open { border-color: var(--green); background: #f5fff0; }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
    }

    .vocab-word {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--green-dark);
      letter-spacing: 0.01em;
    }

    .vocab-date {
      font-size: 0.74rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .vocab-meaning {
      font-size: 0.98rem;
      color: var(--ink-soft);
      margin-top: 0.15rem;
      font-weight: 600;
    }

    .vocab-detail {
      display: none;
      margin-top: 0.7rem;
      padding-top: 0.7rem;
      border-top: 1px dashed var(--line);
    }

    .vocab-card.open .vocab-detail { display: block; }

    .vocab-example-en {
      font-size: 0.98rem;
      color: var(--ink);
      line-height: 1.55;
    }

    .vocab-example-zh {
      font-size: 0.88rem;
      color: var(--muted);
      margin-top: 0.3rem;
      line-height: 1.55;
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* === Quiz tab - shared === */
    .quiz-box {
      background: #fff;
      border: 2px solid var(--line);
      border-radius: 16px;
      padding: 1.3rem;
    }

    /* Player select */
    .profile-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--ink);
      margin-bottom: 0.9rem;
      text-align: center;
    }

    .profile-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 1rem;
    }

    .profile-chip {
      padding: 14px 10px;
      border: 2px solid var(--line);
      border-bottom-width: 4px;
      border-radius: 14px;
      background: #fff;
      font-size: 1rem;
      font-weight: 800;
      color: var(--ink);
      font-family: inherit;
      cursor: pointer;
      transition: all 0.1s;
      text-align: center;
    }

    .profile-chip:hover { background: var(--paper); }
    .profile-chip:active { transform: translateY(1px); border-bottom-width: 3px; }

    .profile-chip.current {
      background: var(--green-bg);
      border-color: var(--green);
      color: var(--green-dark);
    }

    .profile-chip .chip-stat {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: 0.02em;
    }

    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .add-row input {
      flex: 1;
      padding: 12px 14px;
      border: 2px solid var(--line);
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
    }
    .add-row input:focus { border-color: var(--blue); }

    /* Duolingo-ish primary button */
    .dl-btn {
      padding: 12px 18px;
      border: none;
      border-bottom: 4px solid var(--green-dark);
      border-radius: 14px;
      background: var(--green);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 800;
      font-family: inherit;
      letter-spacing: 0.04em;
      cursor: pointer;
      text-transform: uppercase;
      transition: filter 0.12s, transform 0.08s;
    }
    .dl-btn:hover { filter: brightness(1.04); }
    .dl-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
    .dl-btn[disabled] { opacity: 0.45; cursor: not-allowed; }

    .dl-btn.blue { background: var(--blue); border-bottom-color: var(--blue-dark); }
    .dl-btn.gray { background: #e5e5e5; border-bottom-color: #c8c8c8; color: var(--ink-soft); }
    .dl-btn.red { background: var(--red); border-bottom-color: var(--red-dark); }
    .dl-btn.wide { display: block; width: 100%; }

    .dl-btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Leaderboard */
    .leaderboard {
      margin-top: 1.1rem;
      border-top: 1px solid var(--line);
      padding-top: 1rem;
    }

    .leaderboard h3 {
      font-size: 0.92rem;
      font-weight: 800;
      color: var(--ink);
      margin-bottom: 0.5rem;
      letter-spacing: 0.03em;
    }

    .lb-row {
      display: grid;
      grid-template-columns: 32px 1fr auto auto;
      gap: 10px;
      align-items: center;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 0.92rem;
    }
    .lb-row + .lb-row { margin-top: 4px; }
    .lb-row.me { background: var(--green-bg); font-weight: 800; }
    .lb-rank { font-weight: 800; color: var(--muted); text-align: center; }
    .lb-rank.top { color: var(--gold); }
    .lb-name { font-weight: 700; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-best { font-weight: 800; color: var(--green-dark); }
    .lb-plays { font-size: 0.78rem; color: var(--muted); }

    /* Quiz body */
    .quiz-topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.2rem;
    }

    .close-x {
      border: none;
      background: transparent;
      font-size: 1.4rem;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 8px;
      font-weight: 700;
    }
    .close-x:hover { color: var(--red); }

    .progress-bar-bg {
      flex: 1;
      height: 12px;
      background: #e5e5e5;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 99px;
      transition: width 0.35s ease;
      position: relative;
    }
    .progress-bar-fill::after {
      content: '';
      position: absolute; inset: 2px auto 50% 6px; height: 3px; right: 8px;
      background: rgba(255,255,255,0.5);
      border-radius: 99px;
    }

    .progress-count {
      font-size: 0.82rem;
      font-weight: 800;
      color: var(--muted);
      min-width: 44px;
      text-align: right;
    }

    .q-label {
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .q-prompt {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--ink);
      line-height: 1.45;
      margin-bottom: 0.4rem;
      word-break: break-word;
    }

    .q-hint {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .q-cloze {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.6;
      margin-bottom: 0.5rem;
      word-break: break-word;
    }

    .q-cloze .blank {
      display: inline-block;
      min-width: 60px;
      padding: 0 8px;
      border-bottom: 3px solid var(--ink);
      color: transparent;
      margin: 0 2px;
      user-select: none;
    }

    .answer-input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--line);
      border-radius: 12px;
      font-size: 1.1rem;
      font-family: inherit;
      font-weight: 600;
      color: var(--ink);
      outline: none;
      margin-top: 0.6rem;
      margin-bottom: 0.8rem;
      transition: border-color 0.12s;
    }
    .answer-input:focus { border-color: var(--blue); }
    .answer-input.locked { background: var(--paper); }

    .feedback {
      display: none;
      margin-top: 0.4rem;
      margin-bottom: 0.8rem;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 0.98rem;
      font-weight: 700;
    }
    .feedback.good {
      display: block;
      background: var(--green-bg);
      color: var(--green-dark);
      border: 2px solid var(--green);
    }
    .feedback.bad {
      display: block;
      background: var(--red-bg);
      color: var(--red-dark);
      border: 2px solid var(--red);
    }
    .feedback .fb-title { display: block; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
    .feedback .fb-answer { display: block; font-size: 1.1rem; font-weight: 800; }

    /* Result */
    .result-area {
      text-align: center;
      padding: 0.6rem 0 0;
    }
    .result-big {
      font-size: 3.2rem;
      font-weight: 800;
      color: var(--green-dark);
      margin: 0.4rem 0 0.2rem;
      line-height: 1;
    }
    .result-label {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }
    .result-msg {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 1.1rem;
      line-height: 1.55;
    }
    .result-stars {
      font-size: 1.8rem;
      letter-spacing: 6px;
      margin-bottom: 0.6rem;
    }

    .wrong-list {
      text-align: left;
      background: var(--paper);
      border: 2px solid var(--line);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      margin: 1rem 0;
      max-height: 320px;
      overflow-y: auto;
    }
    .wrong-list h4 {
      font-size: 0.9rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      color: var(--ink);
    }
    .wrong-row {
      padding: 0.5rem 0;
      border-bottom: 1px dashed var(--line);
      font-size: 0.88rem;
    }
    .wrong-row:last-child { border-bottom: none; }
    .wrong-row .wr-q { color: var(--ink-soft); margin-bottom: 2px; }
    .wrong-row .wr-your { color: var(--red-dark); }
    .wrong-row .wr-correct { color: var(--green-dark); font-weight: 800; }

    .page-footer {
      text-align: center;
      padding: 1.2rem 1rem 0.4rem;
      font-size: 0.75rem;
      color: #a0a0a0;
      letter-spacing: 0.04em;
    }

    .loading, .err-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .err-state { color: var(--red-dark); font-weight: 700; }

    @media (max-width: 560px) {
      .header-title { font-size: 1.2rem; }
      .q-prompt { font-size: 1.3rem; }
      .q-cloze { font-size: 1.1rem; }
      .result-big { font-size: 2.6rem; }
      .wrap { padding: 0 0.8rem 2rem; }
      .profile-list { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">🦉 單字複習小教室</div>
    <div class="header-sub">學過的單字 · 每週自動更新</div>
  </div>

  <div class="wrap">
    <div class="tabs">
      <button class="tab-btn active" data-tab="cards" onclick="switchTab('cards')">學習過的單字卡</button>
      <button class="tab-btn" data-tab="quiz" onclick="switchTab('quiz')">複習測驗</button>
    </div>

    <!-- Panel: Cards -->
    <div id="panel-cards" class="panel active">
      <div class="search-bar">
        <input type="text" class="search-input" id="search-input" placeholder="搜尋單字或中文意思…" autocomplete="off" />
      </div>
      <div class="meta-line" id="cards-meta"></div>
      <div class="card-grid" id="card-grid">
        <div class="loading">載入中…</div>
      </div>
    </div>

    <!-- Panel: Quiz -->
    <div id="panel-quiz" class="panel">
      <div class="quiz-box" id="quiz-box">
        <div class="loading">載入中…</div>
      </div>
    </div>

    <div class="page-footer" id="page-footer">單字複習小教室</div>
  </div>

<script>
/* =========================================================================
   Vocab Review — Duolingo-ish UI
   Data: vocab-data.json (built by scripts/build_vocab_data.py)
   localStorage keys:
     vocabReview.v1.players         — array of player objects
     vocabReview.v1.currentPlayerId — string (selected player id)
   Player schema:
     { id, name, createdAt, plays, bestScore, recentScores: number[] (<=10, newest first) }
   ========================================================================= */

const LS_PLAYERS = 'vocabReview.v1.players';
const LS_CURRENT = 'vocabReview.v1.currentPlayerId';
const QUIZ_LEN   = 25;

let VOCAB = [];
let VOCAB_META = null;

/* ---------- Utilities ---------- */

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function formatDate(d) {
  if (!d) return '';
  const m = String(d).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return d;
  return `${parseInt(m[2],10)}/${parseInt(m[3],10)}`;
}

function normalizeAnswer(s) {
  return String(s || '').trim().toLowerCase().replace(/[.,!?;:'"`]/g, '').replace(/\s+/g,' ');
}

function uid() {
  return 'p_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

/* ---------- Data fetch ---------- */

async function loadVocab() {
  try {
    const res = await fetch('vocab-data.json?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    VOCAB = Array.isArray(data.words) ? data.words : [];
    VOCAB_META = data.meta || null;
    renderFooterMeta();
    renderCards();
  } catch (e) {
    document.getElementById('card-grid').innerHTML =
      `<div class="err-state">單字資料載入失敗：${escapeHtml(e.message)}<br>
       <span style="font-size:.85rem;color:var(--muted)">請確認 vocab-data.json 已產生並與本頁同目錄。</span></div>`;
  }
}

function renderFooterMeta() {
  const f = document.getElementById('page-footer');
  if (VOCAB_META && VOCAB_META.updatedAt) {
    const d = VOCAB_META.updatedAt.replace('T',' ').replace('Z',' UTC');
    f.textContent = `單字複習小教室 · 共 ${VOCAB.length} 個單字 · 更新於 ${d}`;
  } else {
    f.textContent = `單字複習小教室 · 共 ${VOCAB.length} 個單字`;
  }
}

/* ---------- Tabs ---------- */

function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === id)
  );
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  if (id === 'quiz') enterQuizTab();
}

/* ---------- Cards tab ---------- */

function renderCards() {
  const grid = document.getElementById('card-grid');
  const meta = document.getElementById('cards-meta');
  const q = normalizeAnswer(document.getElementById('search-input').value);

  if (!VOCAB.length) {
    meta.textContent = '';
    grid.innerHTML = `<div class="empty-state">還沒有單字資料。</div>`;
    return;
  }

  let list = VOCAB;
  if (q) {
    list = VOCAB.filter(v =>
      normalizeAnswer(v.word).includes(q) ||
      (v.meaning || '').toLowerCase().includes(q) ||
      (v.meaning || '').includes(q.trim())
    );
  }
  // Already sorted newest-first in JSON, but be defensive:
  list = list.slice().sort((a, b) => (b.firstSeen || '').localeCompare(a.firstSeen || ''));

  meta.textContent = `共 ${list.length} 張單字卡（共收錄 ${VOCAB.length} 個）`;

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state">找不到符合「${escapeHtml(q)}」的單字。</div>`;
    return;
  }

  grid.innerHTML = list.map((v, i) => `
    <div class="vocab-card" onclick="this.classList.toggle('open')">
      <div class="card-head">
        <div class="vocab-word">${escapeHtml(v.word)}</div>
        <div class="vocab-date">${formatDate(v.firstSeen)} 學過</div>
      </div>
      <div class="vocab-meaning">${escapeHtml(v.meaning)}</div>
      <div class="vocab-detail">
        <div class="vocab-example-en">${escapeHtml(v.example)}</div>
        <div class="vocab-example-zh">${escapeHtml(v.translation)}</div>
      </div>
    </div>
  `).join('');
}

/* ---------- Player store ---------- */

function loadPlayers() {
  try {
    const raw = localStorage.getItem(LS_PLAYERS);
    const arr = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(arr)) return [];
    // Back-compat: ensure every player has the expected shape.
    return arr.map(p => ({
      id: p.id || uid(),
      name: String(p.name || '未命名').slice(0, 20),
      createdAt: p.createdAt || new Date().toISOString(),
      plays: Number.isFinite(p.plays) ? p.plays : 0,
      bestScore: Number.isFinite(p.bestScore) ? p.bestScore : 0,
      recentScores: Array.isArray(p.recentScores) ? p.recentScores.slice(0, 10) : [],
    }));
  } catch (_) { return []; }
}

function savePlayers(players) {
  localStorage.setItem(LS_PLAYERS, JSON.stringify(players));
}

function getCurrentPlayerId() {
  return localStorage.getItem(LS_CURRENT) || '';
}

function setCurrentPlayerId(id) {
  if (id) localStorage.setItem(LS_CURRENT, id);
  else localStorage.removeItem(LS_CURRENT);
}

function findPlayer(id) {
  return loadPlayers().find(p => p.id === id) || null;
}

function addPlayer(name) {
  name = String(name || '').trim().slice(0, 20);
  if (!name) return null;
  const players = loadPlayers();
  if (players.some(p => p.name === name)) {
    const existing = players.find(p => p.name === name);
    setCurrentPlayerId(existing.id);
    return existing;
  }
  const p = { id: uid(), name, createdAt: new Date().toISOString(), plays: 0, bestScore: 0, recentScores: [] };
  players.push(p);
  savePlayers(players);
  setCurrentPlayerId(p.id);
  return p;
}

function recordScore(playerId, score) {
  const players = loadPlayers();
  const p = players.find(x => x.id === playerId);
  if (!p) return;
  p.plays = (p.plays || 0) + 1;
  p.bestScore = Math.max(p.bestScore || 0, score);
  p.recentScores = [score, ...(p.recentScores || [])].slice(0, 10);
  savePlayers(players);
}

function deletePlayer(id) {
  const players = loadPlayers().filter(p => p.id !== id);
  savePlayers(players);
  if (getCurrentPlayerId() === id) setCurrentPlayerId('');
}

/* ---------- Quiz state ---------- */

let quiz = null; // { items: [{type, word, prompt...}], idx, score, wrong, playerId }

function enterQuizTab() {
  const cur = getCurrentPlayerId();
  const p = cur ? findPlayer(cur) : null;
  if (!p) {
    renderProfileSelect();
  } else if (quiz && quiz.playerId === p.id && !quiz.finished) {
    renderQuizQuestion();
  } else {
    renderQuizHome(p);
  }
}

/* ---------- Profile select screen ---------- */

function renderProfileSelect() {
  const box = document.getElementById('quiz-box');
  const players = loadPlayers();
  const curId = getCurrentPlayerId();
  const sorted = players.slice().sort((a,b) => (b.bestScore||0) - (a.bestScore||0));

  box.innerHTML = `
    <div class="profile-title">👋 請選擇玩家</div>
    ${sorted.length ? `
      <div class="profile-list">
        ${sorted.map(p => `
          <button class="profile-chip ${p.id === curId ? 'current' : ''}" onclick="pickPlayer('${p.id}')">
            ${escapeHtml(p.name)}
            <span class="chip-stat">最佳 ${p.bestScore||0} · 共 ${p.plays||0} 次</span>
          </button>
        `).join('')}
      </div>
    ` : `<div class="empty-state">還沒有玩家，先新增一個吧！</div>`}
    <div class="add-row">
      <input id="new-name-input" type="text" placeholder="新增名字…" maxlength="20" />
      <button class="dl-btn" onclick="onAddPlayer()">新增</button>
    </div>
    ${renderLeaderboardHtml(curId)}
  `;
  const inp = document.getElementById('new-name-input');
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') onAddPlayer(); });
}

function pickPlayer(id) {
  setCurrentPlayerId(id);
  const p = findPlayer(id);
  if (p) renderQuizHome(p);
}

function onAddPlayer() {
  const inp = document.getElementById('new-name-input');
  const name = (inp.value || '').trim();
  if (!name) { inp.focus(); return; }
  const p = addPlayer(name);
  if (p) renderQuizHome(p);
}

/* ---------- Quiz home (ready screen) ---------- */

function renderQuizHome(player) {
  const box = document.getElementById('quiz-box');
  const total = VOCAB.length;
  const canPlay = total >= 4;
  box.innerHTML = `
    <div class="profile-title">Hi, ${escapeHtml(player.name)}！</div>
    <div style="text-align:center;color:var(--muted);font-size:.92rem;margin-bottom:1rem;">
      這次會從 ${total} 個單字裡隨機抽 ${Math.min(QUIZ_LEN, total)} 題<br>
      題型會交替出現：<b>中翻英</b> 與 <b>句子填空</b>
    </div>
    <div style="text-align:center;font-size:.9rem;color:var(--ink-soft);margin-bottom:1rem;">
      最佳分數：<b style="color:var(--green-dark)">${player.bestScore||0}</b> ·
      玩過次數：<b>${player.plays||0}</b>
      ${player.recentScores && player.recentScores.length
        ? `<br>最近分數：${player.recentScores.map(s=>`<span style="display:inline-block;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:1px 7px;margin:2px 3px 0;font-weight:700;">${s}</span>`).join('')}`
        : ''}
    </div>
    <div class="dl-btn-row">
      <button class="dl-btn wide" ${canPlay?'':'disabled'} onclick="startQuiz()">開始測驗</button>
    </div>
    <div class="dl-btn-row" style="margin-top:10px">
      <button class="dl-btn gray" onclick="renderProfileSelect()">切換 / 新增玩家</button>
    </div>
    ${renderLeaderboardHtml(player.id)}
  `;
}

/* ---------- Leaderboard ---------- */

function renderLeaderboardHtml(highlightId) {
  const players = loadPlayers().slice().sort((a,b) => (b.bestScore||0) - (a.bestScore||0) || (b.plays||0) - (a.plays||0));
  if (!players.length) return '';
  const rows = players.map((p, i) => `
    <div class="lb-row ${p.id === highlightId ? 'me' : ''}">
      <div class="lb-rank ${i < 3 ? 'top' : ''}">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1)}</div>
      <div class="lb-name">${escapeHtml(p.name)}</div>
      <div class="lb-best">${p.bestScore||0}</div>
      <div class="lb-plays">${p.plays||0} 次</div>
    </div>
  `).join('');
  return `
    <div class="leaderboard">
      <h3>🏆 排行榜</h3>
      ${rows}
    </div>
  `;
}

/* ---------- Quiz: build & play ---------- */

function buildQuizItems(words, n) {
  const pool = shuffle(words).slice(0, Math.min(n, words.length));
  // Half zh2en, half cloze — shuffled so both types mix throughout the quiz.
  const half = Math.ceil(pool.length / 2);
  const types = shuffle(
    pool.map((_, i) => i < half ? 'zh2en' : 'cloze')
  );
  return pool.map((word, i) => ({ type: types[i], word }));
}

function startQuiz() {
  const player = findPlayer(getCurrentPlayerId());
  if (!player) { renderProfileSelect(); return; }
  if (!VOCAB.length) return;
  quiz = {
    items: buildQuizItems(VOCAB, QUIZ_LEN),
    idx: 0,
    score: 0,
    wrong: [],
    playerId: player.id,
    finished: false,
    answered: false,
  };
  renderQuizQuestion();
}

function makeClozeHtml(example, word) {
  const safeWord = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp('\\b' + safeWord + '\\b', 'i');
  const m = example.match(re);
  if (!m) {
    // Fallback: case-insensitive first match, no word boundary
    const re2 = new RegExp(safeWord, 'i');
    const m2 = example.match(re2);
    if (!m2) return escapeHtml(example) + ' <span class="blank">____</span>';
    const idx = m2.index;
    return escapeHtml(example.slice(0, idx)) +
      `<span class="blank">${'_'.repeat(Math.max(4, word.length))}</span>` +
      escapeHtml(example.slice(idx + m2[0].length));
  }
  const idx = m.index;
  return escapeHtml(example.slice(0, idx)) +
    `<span class="blank">${'_'.repeat(Math.max(4, word.length))}</span>` +
    escapeHtml(example.slice(idx + m[0].length));
}

function renderQuizQuestion() {
  if (!quiz) return;
  if (quiz.idx >= quiz.items.length) { finishQuiz(); return; }

  const s = quiz;
  const cur = s.items[s.idx];
  const w = cur.word;
  const pct = Math.round(((s.idx) / s.items.length) * 100);
  const box = document.getElementById('quiz-box');

  let promptHtml, label, hintHtml = '';
  if (cur.type === 'zh2en') {
    label = '中翻英：請輸入英文單字';
    promptHtml = `<div class="q-prompt">${escapeHtml(w.meaning)}</div>`;
  } else {
    label = '句子填空：填入空格裡的英文單字';
    promptHtml = `<div class="q-cloze">${makeClozeHtml(w.example, w.word)}</div>`;
    hintHtml = `<div class="q-hint">提示：${escapeHtml(w.translation)}</div>`;
  }

  box.innerHTML = `
    <div class="quiz-topbar">
      <button class="close-x" title="結束測驗" onclick="abortQuiz()">✕</button>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-count">${s.idx+1}/${s.items.length}</div>
    </div>
    <div class="q-label">${label}</div>
    ${promptHtml}
    ${hintHtml}
    <input id="q-ans" class="answer-input" type="text" autocomplete="off"
           autocapitalize="none" autocorrect="off" spellcheck="false"
           placeholder="輸入英文單字…" />
    <div id="q-fb" class="feedback"></div>
    <button id="q-submit" class="dl-btn wide" onclick="submitAnswer()">送出</button>
  `;

  quiz.answered = false;
  const inp = document.getElementById('q-ans');
  inp.focus();
  inp.addEventListener('keydown', onAnswerKey);
}

function onAnswerKey(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (!quiz.answered) submitAnswer();
    else nextQuestion();
  }
}

function submitAnswer() {
  if (!quiz || quiz.answered) return;
  const cur = quiz.items[quiz.idx];
  const w = cur.word;
  const inp = document.getElementById('q-ans');
  const btn = document.getElementById('q-submit');
  const fb = document.getElementById('q-fb');
  const userRaw = inp.value;
  const user = normalizeAnswer(userRaw);
  const target = normalizeAnswer(w.word);
  const isCorrect = user && user === target;

  inp.classList.add('locked');
  inp.setAttribute('readonly', 'readonly');
  quiz.answered = true;

  if (isCorrect) {
    quiz.score++;
    fb.className = 'feedback good';
    fb.innerHTML = `<span class="fb-title">答對了！</span><span class="fb-answer">${escapeHtml(w.word)}</span>`;
  } else {
    fb.className = 'feedback bad';
    fb.innerHTML = `<span class="fb-title">再加油！正確答案是</span><span class="fb-answer">${escapeHtml(w.word)}</span>`;
    quiz.wrong.push({
      type: cur.type,
      word: w.word,
      meaning: w.meaning,
      example: w.example,
      translation: w.translation,
      userAnswer: userRaw || '(空白)',
    });
  }

  btn.textContent = quiz.idx + 1 >= quiz.items.length ? '看結果' : '下一題';
  btn.className = 'dl-btn wide ' + (isCorrect ? '' : 'blue');
  btn.onclick = nextQuestion;
}

function nextQuestion() {
  quiz.idx++;
  if (quiz.idx >= quiz.items.length) finishQuiz();
  else renderQuizQuestion();
}

function abortQuiz() {
  if (!confirm('確定要結束這次測驗嗎？（分數不會計入）')) return;
  quiz = null;
  const p = findPlayer(getCurrentPlayerId());
  if (p) renderQuizHome(p); else renderProfileSelect();
}

function encouragement(pct) {
  if (pct === 100) return '完美全對！🌟 你根本是單字小天才！';
  if (pct >= 90)  return '太厲害了！再一點點就滿分啦！💪';
  if (pct >= 75)  return '很棒的表現！繼續保持！✨';
  if (pct >= 60)  return '不錯！多練幾次就能衝到 90 分！📚';
  if (pct >= 40)  return '有進步的空間，別放棄！再試一次吧！🔥';
  return '沒關係，先回去看單字卡，再回來挑戰！🌱';
}

function finishQuiz() {
  const s = quiz;
  s.finished = true;
  const total = s.items.length;
  const score = s.score;
  const pct = Math.round((score / total) * 100);

  recordScore(s.playerId, score);

  const stars = pct === 100 ? '⭐⭐⭐' : pct >= 75 ? '⭐⭐☆' : pct >= 50 ? '⭐☆☆' : '☆☆☆';

  const wrongHtml = s.wrong.length ? `
    <div class="wrong-list">
      <h4>需要再複習 (${s.wrong.length})</h4>
      ${s.wrong.map(w => `
        <div class="wrong-row">
          <div class="wr-q">
            ${w.type === 'zh2en'
              ? `中翻英：<b>${escapeHtml(w.meaning)}</b>`
              : `句子填空：<i>${escapeHtml(w.example)}</i><br><span style="color:var(--muted)">(${escapeHtml(w.translation)})</span>`}
          </div>
          <div><span class="wr-your">你的答案：${escapeHtml(w.userAnswer)}</span> →
               <span class="wr-correct">${escapeHtml(w.word)}</span></div>
        </div>
      `).join('')}
    </div>
  ` : `<div style="color:var(--green-dark);font-weight:800;margin:1rem 0;">全部答對，零失誤！🎉</div>`;

  const box = document.getElementById('quiz-box');
  box.innerHTML = `
    <div class="result-area">
      <div class="result-stars">${stars}</div>
      <div class="result-big">${score} / ${total}</div>
      <div class="result-label">答對 ${score} 題（${pct}%）</div>
      <div class="result-msg">${encouragement(pct)}</div>
      ${wrongHtml}
      <div class="dl-btn-row">
        <button class="dl-btn" onclick="startQuiz()">再玩一次</button>
        <button class="dl-btn blue" onclick="switchTab('cards')">去看單字卡</button>
        <button class="dl-btn gray" onclick="renderProfileSelect()">換玩家</button>
      </div>
      ${renderLeaderboardHtml(s.playerId)}
    </div>
  `;
}

/* ---------- Init ---------- */

document.getElementById('search-input').addEventListener('input', renderCards);
loadVocab();
</script>
