/* ══ Date helpers (Taipei) ═══════════════════════════════ */
function taipeiDateKey(d=new Date()){
  const utc=d.getTime()+d.getTimezoneOffset()*60000;
  const t=new Date(utc+8*60*60*1000);
  const y=t.getFullYear(),m=String(t.getMonth()+1).padStart(2,'0'),dd=String(t.getDate()).padStart(2,'0');

}
function dateKeyToUtcMs(k){if(!/^\d{4}-\d{2}-\d{2}$/.test(String(k||'')))return NaN;return Date.UTC(+k.slice(0,4),+k.slice(5,7)-1,+k.slice(8,10));}

/* ══ POS → Category ══════════════════════════════════════ */
const POS_CAT={v:'動作',suru:'動作','adj-i':'形容詞','adj-na':'形容詞',adj:'形容詞',adv:'副詞',n:'名詞'};
function posToCat(pos){const p=Array.isArray(pos)?pos[0]:pos;return POS_CAT[p]||'名詞';}

/* ══ Vocab shape normalization ═══════════════════════════ */
function normalizeVocab(raw){
  // Accept the N4 data contract plus the tiny local fallback shape.
  if(raw.meaning!==undefined||raw.meaning_zh!==undefined){
    const word=raw.word||raw.kanji||raw.kana;
    const reading=raw.kana||raw.reading||word;
    return{
      id:raw.id||word,
      word,
      reading,
      kana:reading,
      kanji:raw.kanji||'',
      zh:raw.meaning_zh||raw.meaning,
      visual:raw.visual||null,
      hint:raw.hint||reading||raw.meaning_zh||raw.meaning,
      cat:raw.cat||posToCat(raw.pos),
      en:raw.example_ja||raw.example||'',
      exampleKana:raw.example_kana||'',
      zh2:raw.translation_zh||raw.translation||'',
      date:raw.firstSeen||'',
      level:raw.level||raw.tier||'',
      tier:raw.tier||raw.level||'',
      pos:raw.pos||'n',
      rank:raw.rank||0,
      chunks:Array.isArray(raw.chunks)?raw.chunks:[],
      particles:Array.isArray(raw.particles)?raw.particles:[],
      grammar:raw.grammar||null,
      distractors:Array.isArray(raw.distractors)?raw.distractors:[],
      synonyms:Array.isArray(raw.synonyms)?raw.synonyms:[],
      audioText:raw.audioText||raw.example_ja||raw.example||word,
    };
  }
  return{
    word:raw.word,reading:raw.reading||raw.word,zh:raw.zh,visual:raw.visual||null,hint:raw.hint||raw.reading||raw.zh,
    cat:raw.cat||'名詞',en:raw.en||'',zh2:raw.zh2||'',date:raw.date||'',level:raw.level||'',tier:raw.tier||'',
  };
}

/* ══ English number words (for food count display) ══════ */
const NUMBER_WORDS=['zero','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen','twenty'];
const TENS_WORDS=['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];
function numToEnglish(n){
  n=n|0; if(n<0)return 'zero'; if(n<=20)return NUMBER_WORDS[n];
  if(n<100){const t=Math.floor(n/10),o=n%10;return o?`${TENS_WORDS[t]}-${NUMBER_WORDS[o]}`:TENS_WORDS[t];}
  return String(n); // ≥100 fallback to digits
}

/* ══ Level / unlock helpers ══════════════════════════════ */
const LV1_SIZE=15;
const LV_INCREMENT=5;
const HOME_FOCUS_COUNT=5;
function unlockedCountForLevel(level){
  const lv=Math.max(1,level|0);
  return LV1_SIZE+(lv-1)*LV_INCREMENT;
}
function unlockedWords(allWords,difficultyOrder,level){
  const want=unlockedCountForLevel(level);
  const wordToObj=new Map(allWords.map(w=>[w.word,w]));
  const seen=new Set();
  const out=[];
  for(let i=0;i<difficultyOrder.length&&out.length<want;i++){
    const obj=wordToObj.get(difficultyOrder[i]);
    if(obj){out.push(obj);seen.add(obj.word);}
  }
  if(out.length<want){
    const rest=allWords
      .filter(w=>!seen.has(w.word))
      .sort((a,b)=>String(a.firstSeen||a.date||'').localeCompare(String(b.firstSeen||b.date||'')));
    for(const w of rest){if(out.length>=want)break;out.push(w);seen.add(w.word);}
  }
  return out;
}
function newlyUnlockedWords(difficultyOrder,allWords,oldLevel,newLevel){
  if(newLevel<=oldLevel)return[];
  const oldCount=unlockedCountForLevel(oldLevel);
  const newCount=unlockedCountForLevel(newLevel);
  const all=unlockedWords(allWords,difficultyOrder,newLevel);
  return all.slice(oldCount,newCount);
}
const BASE_LEVEL_XP_CAP_UI=1072;
const LEVEL_XP_MULTIPLIER=1.5;
function baseLevelXpRequirementUi(level){
  const lv=Math.max(1,level|0);
  let req=100;
  for(let n=2;n<=lv;n++){
    if(req>=BASE_LEVEL_XP_CAP_UI/2)return BASE_LEVEL_XP_CAP_UI;
    const mult=1.30+0.05*(n-2);
    req=Math.min(BASE_LEVEL_XP_CAP_UI/2,Math.round(req*mult));
  }
  return req*2;
}
function levelXpRequirementUi(level){return Math.round(baseLevelXpRequirementUi(level)*LEVEL_XP_MULTIPLIER);}
function estimateTotalExpForLevel(level,exp=0){
  const lv=Math.max(1,level|0);
  let total=Number(exp||0);
  for(let n=1;n<lv;n++)total+=levelXpRequirementUi(n);
  return Math.max(0,Math.round(total));
}

/* ══ Utils ═══════════════════════════════════════════════ */
function shuffle(a){const x=[...a];for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];}return x;}
function getOptions(correct,pool){
  const others=shuffle(pool.filter(v=>v.word!==correct.word)).slice(0,3);
  return shuffle([correct,...others]);
}
function formatDate(dateKey){
  if(!dateKey)return'';
  const[y,m,d]=dateKey.split('-').map(Number);
  const js=new Date(y,m-1,d);
  return js.toLocaleDateString('zh-TW',{month:'long',day:'numeric',weekday:'short'});
}
function normalizeAnswer(s){return String(s||'').trim().toLowerCase().replace(/[.,!?;:'"`。、！？；：「」『』（）()]/g,'').replace(/\s+/g,' ');}

/* ══ N4 question builders ════════════════════════════════ */
function buildKanaTokens(kana){
  const letters=Array.from(String(kana||'').trim()).filter(ch=>ch.trim());
  return letters.map((text,i)=>({id:`${i}:${text}`,text,idx:i}));
}
function shuffledTokens(tokens){
  let out=shuffle(tokens);
  if(out.map(t=>t.id).join('|')===tokens.map(t=>t.id).join('|'))out=shuffle(tokens.slice().reverse());
  return out;
}
function buildWordOrderQuestion(w){
  const kana=w.kana||w.reading||w.word;
  const letterTokens=buildKanaTokens(kana);
  if(letterTokens.length<2)return null;
  const hasKanji=w.word&&kana&&w.word!==kana;
  const prompt=hasKanji?`漢字「${w.word}」，意思為「${w.zh}」的詞：`:`意思為「${w.zh}」：`;
  return{
    type:'cloze',
    n4Kind:'wordOrder',
    correct:kana,
    letterTokens,
    tokens:shuffledTokens(letterTokens),
    prompt,
    displayWord:w.word,
    zh2:w.zh2||'',
    zh:w.zh||'',
  };
}
function buildListeningQuestion(w,pool){
  const options=getOptions(w,pool);
  if(options.length<4)return null;
  return{
    type:'listening',
    correct:w.word,
    options,
    sentence:w.audioText||w.en||w.word,
    zh2:w.zh2||'',
    zh:w.zh||'',
  };
}
function pushJapaneseToken(tokens, token) {
  const t = String(token || '').trim();
  if (!t) return;
  if (/^[。、！？!?]+$/.test(t) && tokens.length) tokens[tokens.length - 1] += t;
  else tokens.push(t);
}
function splitJapaneseChunk(text) {
  const tokens = [];
  let buf = '';
  const suffixes = ['なければなりません','ことがあります','てもいいです','なくてもいいです','すぎます','ください', 'ました', 'ません', 'です', 'ます', 'でした', 'ないで', 'ない', 'たい'];
  const particles = new Set(['は', 'が', 'を', 'に', 'へ', 'と', 'で', 'も']);
  const chars=Array.from(String(text || '').replace(/\s+/g, ''));
  for (let idx=0;idx<chars.length;idx++) {
    const ch=chars[idx], next=chars[idx+1]||'';
    if (/[。、！？!?]/.test(ch)) {
      pushJapaneseToken(tokens, buf);
      buf = '';
      pushJapaneseToken(tokens, ch);
      continue;
    }
    buf += ch;
    if (suffixes.some(s => buf.endsWith(s))) {
      pushJapaneseToken(tokens, buf);
      buf = '';
      continue;
    }
    const prev=chars[idx-1]||'';
    const prev2=chars.slice(Math.max(0,idx-2),idx+1).join('');
    if (
      particles.has(ch) &&
      !(ch==='で'&&/[すし]/.test(next)) &&
      !(ch==='で'&&chars.slice(idx,idx+4).join('')==='でもいい') &&
      !(ch==='に'&&prev==='間'&&next==='合') &&
      !(ch==='と'&&chars.slice(idx,idx+3).join('')==='とても') &&
      !(ch==='と'&&prev==='こ') &&
      !(ch==='と'&&prev==='ほ'&&next==='ん') &&
      !(ch==='も'&&prev2==='とても') &&
      !(ch==='も'&&next==='し'&&!prev)
    ) {
      const content=buf.slice(0,-1);
      pushJapaneseToken(tokens, content);
      pushJapaneseToken(tokens, ch);
      buf = '';
    }
  }
  pushJapaneseToken(tokens, buf);
  return tokens;
}
function sentenceChunks(w){
  const chunks=Array.isArray(w.chunks)?w.chunks.filter(Boolean):[];
  return chunks.length?chunks:splitJapaneseChunk(w.en||'');
}
function buildOrderQuestion(w){
  const answerTokens=sentenceChunks(w);
  if(answerTokens.length<3||answerTokens.length>10)return null;
  const tokens=answerTokens.map((text,i)=>({id:`${i}:${text}`,text,idx:i}));
  return{type:'order',correct:answerTokens.join(' '),sentence:w.en,answerTokens,tokens:shuffledTokens(tokens),zh2:w.zh2||'',zh:w.zh||''};
}
function buildGrammarQuestion(w){
  const g=w.grammar;
  if(!g||!g.answer||!Array.isArray(g.choices))return null;
  const choices=[...new Set([g.answer,...g.choices].filter(Boolean))].slice(0,4);
  if(choices.length<4)return null;
  return{
    type:'particle',
    n4Kind:'grammar',
    correct:g.answer,
    options:shuffle(choices),
    before:g.before||'',
    after:g.after||'',
    sentence:`${g.before||''}${g.answer||''}${g.after||''}`,
    promptZh:g.prompt_zh||'從例句選出最自然的文法形式。',
    explanation:g.explanation||'這個形式讓句子最自然。',
    hintChunks:Array.isArray(g.hintChunks)?g.hintChunks:[],
    zh2:w.zh2||'',
    zh:w.zh||'',
  };
}
function buildSynonymQuestion(w,pool){
  const syn=Array.isArray(w.synonyms)?w.synonyms.find(s=>s&&s.answer):null;
  if(!syn)return null;
  const choices=[...new Set([syn.answer,...(Array.isArray(syn.choices)?syn.choices:[])].filter(Boolean))].slice(0,4);
  if(choices.length<4)return null;
  return{
    type:'synonym',
    n4Kind:'paraphrase',
    correct:syn.answer,
    options:shuffle(choices),
    source:syn.source||w.word,
    promptZh:syn.prompt_zh||`選出和「${syn.source||w.word}」意思最接近的說法。`,
    explanation:syn.explanation||'這兩個說法意思接近。',
    zh2:w.zh2||'',
    zh:w.zh||'',
  };
}
const N4_TYPE_BUILDERS={
  cloze:buildWordOrderQuestion,
  listening:buildListeningQuestion,
  order:buildOrderQuestion,
  particle:buildGrammarQuestion,
  synonym:buildSynonymQuestion,
};
const N4_TYPE_CYCLE=['cloze','listening','order','particle','synonym'];
function buildQuizItems(pool,total,knownSet=new Set(),settings={}){
  const cycle=N4_TYPE_CYCLE.filter(type=>!(settings.disableListening&&type==='listening'));
  const focus=shuffle(pool.filter(w=>w.isDailyFocus));
  const focusWords=new Set(focus.map(w=>w.word));
  const unknown=shuffle(pool.filter(w=>!focusWords.has(w.word)&&!knownSet.has(w.word)));
  const known=shuffle(pool.filter(w=>!focusWords.has(w.word)&&knownSet.has(w.word)));
  const chosen=[...focus,...unknown,...known];
  if(!chosen.length)return[];
  const typePlan=[];
  while(typePlan.length<total)typePlan.push(...shuffle(cycle.length?cycle:N4_TYPE_CYCLE));
  const items=[];
  for(let i=0;i<total;i++){
    const preferred=typePlan[i];
    const word=chosen[i%chosen.length];
    const attempts=[preferred,...shuffle((cycle.length?cycle:N4_TYPE_CYCLE).filter(t=>t!==preferred))];
    let built=null;
    for(const type of attempts){
      built=N4_TYPE_BUILDERS[type]?.(word,pool);
      if(built)break;
    }
    if(!built)built={type:'listening',correct:word.word,options:getOptions(word,pool),sentence:word.audioText||word.en||word.word,zh2:word.zh2||'',zh:word.zh||''};
    items.push({...built,vocab:word});
  }
  return items;
}

let _voicesCache=null;
function _loadVoices(){
  if(typeof window==='undefined'||!window.speechSynthesis)return [];

// Japanese web TTS: prefer local ja-JP voices, then browser fallbacks.
const FEMALE_VOICE_PIN='google 日本語';
const MALE_VOICE_PIN='kyoko';
const FEMALE_VOICE_KEYS=['google 日本語','kyoko','haruka','nanami','ichiro','japanese','日本語','female'];
const MALE_VOICE_KEYS=['ichiro','google 日本語','kyoko','japanese','日本語','male'];
function pickVoice(gender){
  const list=_loadVoices();if(!list.length)return null;
  const jaVoices=list.filter(v=>/^ja[-_]/i.test(v.lang||''));
  const pool=jaVoices.length?jaVoices:list;
  // Prefer local voices to avoid online/streaming TTS dropouts (e.g. Jenny Online stuttering).
  const localPool=pool.filter(v=>v.localService!==false);
  const tryPools=localPool.length?[localPool,pool]:[pool];
  const exclude=gender==='male'?'female':null;
  const primary=gender==='male'?MALE_VOICE_PIN:FEMALE_VOICE_PIN;
  // Hard-pin first across local-then-full pool.
  for(const sub of tryPools){
    const hit=sub.find(v=>{
      const n=(v.name||'').toLowerCase();
      if(!n.includes(primary))return false;
      if(exclude&&n.includes(exclude))return false;
      return true;
    });
    if(hit)return hit;
  }
  // Fallback priority list for devices without the pin (iOS/Android etc).
  const prefs=gender==='male'?MALE_VOICE_KEYS:FEMALE_VOICE_KEYS;
  for(const sub of tryPools){
    for(const key of prefs){
      const hit=sub.find(v=>{
        const n=(v.name||'').toLowerCase();
        if(!n.includes(key))return false;
        if(exclude&&n.includes(exclude))return false;
        return true;
      });
      if(hit)return hit;
    }
  }
  return pool[0]||null;
}
function useVoiceName(gender){
  const[name,setName]=useState(()=>pickVoice(gender)?.name||'');
  useEffect(()=>{
    const tick=()=>setName(pickVoice(gender)?.name||'');

    const ts=[setTimeout(tick,400),setTimeout(tick,1200),setTimeout(tick,2500)];
    return()=>ts.forEach(clearTimeout);
  },[gender]);
  return name;
}

function useFb(){

    if(!window.FB){return;}
    try{

      setFb({ready:true,uid:window.FB.uid,profile,pet});
    }catch(e){console.warn('[useFb] refresh failed',e);}

  useEffect(()=>{
    if(window.FB){refresh();return;}
    const h=()=>refresh();
    window.addEventListener('fbready',h);
    return()=>window.removeEventListener('fbready',h);
  },[refresh]);
  return[fb,refresh];
}

/* ══ ONBOARDING ══════════════════════════════════════════ */
function OnboardingScreen({onDone,pc}){
  const [step,setStep]=useState(1);
  const [name,setName]=useState('');
  const [nameErr,setNameErr]=useState('');
  const [pets,setPets]=useState([]);
  const [loading,setLoading]=useState(false);
  const [selectedPetId,setSelectedPetId]=useState(null);
  const [err,setErr]=useState('');

  const loadPets=useCallback(async()=>{
    if(!window.FB?.ops?.listPets)return;
    setLoading(true);setErr('');
    try{setPets(await window.FB.ops.listPets());}
    catch(e){setErr('寵物清單載入失敗，請再試一次');console.warn('[Onboarding] listPets failed',e);}
    finally{setLoading(false);}
  },[]);
  useEffect(()=>{if(step===2)loadPets();},[step,loadPets]);
  useEffect(()=>{if(window.FB&&step===2)loadPets();const h=()=>step===2&&loadPets();window.addEventListener('fbready',h);return()=>window.removeEventListener('fbready',h);},[step,loadPets]);

  const goStep2=async()=>{
    if(!name.trim()){setNameErr('請輸入你的名字！');return;}
    if(name.trim().length>10){setNameErr('名字最多10個字喔！');return;}
    setNameErr('');setErr('');
    try{
      if(window.FB?.ops?.switchPlayerByName) await window.FB.ops.switchPlayerByName(name.trim());
    }catch(e){
      console.warn('[Onboarding] switchPlayerByName failed',e);
      setErr('玩家資料載入失敗，請稍後再試');
      return;
    }
    setStep(2);
  };
  const confirmChar=async()=>{
    if(!selectedPetId||!window.FB?.ops)return;
    setErr('');
    try{
      const switched=await window.FB.ops.switchPlayerByName(name.trim());
      await window.FB.ops.claimPet(switched.uid,selectedPetId);
      if(window.FB?.ops?.refreshProfile){
        const fresh=await window.FB.ops.refreshProfile(switched.uid);
        window.FB.uid=switched.uid;
        window.FB.playerId=switched.uid;
        window.FB.profile=fresh;
        window.dispatchEvent(new Event('fbready'));
      }
      const idx=petIdxFromId(selectedPetId)??0;
      const profile={name:name.trim(),charIdx:idx,petId:selectedPetId};
      saveProfile(profile);onDone(profile);setStep(3);
    }catch(e){
      const msgs={'pet-taken':'這隻已經被別人帶走了！','pet-disabled':'這隻寵物餓壞了，不能選 😢','pet-not-found':'找不到這隻寵物'};
      setErr(msgs[e.message]||`選寵失敗：${e.message}`);await loadPets();
    }
  };
  const selectedPet=pets.find(p=>p.id===selectedPetId);

  return(<div className="screen" style={{background:'linear-gradient(170deg,#fdf6ff 0%,#f0fdf4 100%)'}}>
    {step===1&&<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 28px',gap:22}}>
      <div style={{animation:'float 3s ease-in-out infinite'}}><img src={CHARACTERS[0].img} alt="" style={{width:100,height:100,objectFit:'contain'}}/></div>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:26,fontWeight:900,color:'#1a1a2e'}}>歡迎來到</div>
        <div style={{fontSize:30,fontWeight:900,color:pc}}>CLAW JP N4！</div>
        <div style={{fontSize:13,color:'#aaa',marginTop:6}}>先告訴我你的名字吧 😊</div>
      </div>
      <div style={{width:'100%'}}>
        <input type="text" placeholder="輸入你的名字…" value={name} onChange={e=>{setName(e.target.value);setNameErr('');}} onKeyDown={e=>e.key==='Enter'&&goStep2()} maxLength={10}
          style={{width:'100%',padding:'16px 20px',borderRadius:18,border:`2px solid ${nameErr?'#FF4D6D':name?pc:'#e8e0f8'}`,fontSize:18,fontWeight:800,color:'#1a1a2e',outline:'none',fontFamily:'inherit',background:'#fff',boxShadow:`0 2px 12px ${pc}22`,transition:'border 0.2s'}}/>
        {nameErr&&<div style={{fontSize:12,color:'#FF4D6D',fontWeight:700,marginTop:6,paddingLeft:4}}>{nameErr}</div>}
      </div>
      <button onClick={goStep2} style={{width:'100%',padding:17,borderRadius:20,border:'none',cursor:'pointer',background:`linear-gradient(135deg,${pc},${pc}bb)`,fontSize:17,fontWeight:900,color:'#fff',boxShadow:`0 5px 18px ${pc}44`,opacity:name.trim()?1:0.5,transition:'opacity 0.2s',fontFamily:'inherit'}}>下一步 →</button>
    </div>}

    {step===2&&<div className="screen">
      <div style={{padding:'48px 20px 8px',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
        <button onClick={()=>setStep(1)} style={{width:38,height:38,borderRadius:12,border:'none',background:'rgba(0,0,0,0.06)',cursor:'pointer',fontSize:17}}>←</button>
        <div style={{flex:1}}>
          <div style={{fontSize:17,fontWeight:900,color:'#1a1a2e'}}>選一隻寵物，{name}！</div>
          <div style={{fontSize:11,color:'#aaa'}}>這裡是公共寵物池，名字大家都看得到</div>
        </div>
        <button onClick={loadPets} style={{border:'none',background:`${pc}15`,color:pc,borderRadius:12,padding:'8px 10px',fontSize:11,fontWeight:900,cursor:'pointer'}}>↻</button>
      </div>
      <div className="scroll-body" style={{padding:'8px 16px 16px'}}>
        {loading&&<div style={{display:'flex',justifyContent:'center',padding:30}}><div className="spinner"/></div>}
        {err&&<div style={{background:'#fff4e5',color:'#b75d00',fontSize:12,fontWeight:800,padding:'8px 12px',borderRadius:12,marginBottom:10,textAlign:'center'}}>{err}</div>}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
          {pets.map(p=>{
            const disabled=p.status==='disabled'||p.hp<=0||(p.ownerUid&&p.ownerUid!==window.FB?.uid);
            const mine=p.ownerUid&&p.ownerUid===window.FB?.uid;
            return <PetGridButton key={p.id} pet={p} pc={pc} selected={selectedPetId===p.id} disabled={disabled&&!mine} tag={mine?'我的':null} onClick={()=>setSelectedPetId(p.id)}/>;
          })}
        </div>
      </div>
      <div style={{padding:'0 16px 28px',flexShrink:0}}>
        <button onClick={confirmChar} disabled={!selectedPetId||loading} style={{width:'100%',padding:17,borderRadius:20,border:'none',cursor:(!selectedPetId||loading)?'not-allowed':'pointer',background:`linear-gradient(135deg,${pc},${pc}bb)`,fontSize:16,fontWeight:900,color:'#fff',boxShadow:`0 5px 18px ${pc}44`,opacity:selectedPetId&&!loading?1:0.4,transition:'opacity 0.2s',fontFamily:'inherit'}}>確認，這是我的寵物！🐾</button>
      </div>
    </div>}

    {step===3&&<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 28px',gap:20}}>
      <Confetti active/>
      <div style={{animation:'float 3s ease-in-out infinite'}}><img src={selectedPet?.img||CHARACTERS[0].img} alt="" style={{width:100,height:100,objectFit:'contain'}}/></div>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:22,fontWeight:900,color:'#1a1a2e'}}>{name}，你的寵物是</div>
        <div style={{fontSize:28,fontWeight:900,color:pc,marginTop:2}}>{selectedPet?.name||'小夥伴'} 🎉</div>
      </div>
    </div>}
  </div>);
}

/* ══ CHAR SELECT ═════════════════════════════════════════ */
function CharSelectScreen({current,onSelect,onBack,pc,fb,refreshFb}){
  const [pets,setPets]=useState([]);
  const [loading,setLoading]=useState(false);
  const [sel,setSel]=useState(fb?.profile?.currentPetId||null);
  const [err,setErr]=useState('');
  const [rename,setRename]=useState('');
  const [voiceGender,setVoiceGender]=useState('female');
  const myPetId=fb?.profile?.currentPetId||null;
  const myPet=pets.find(p=>p.id===myPetId)||fb?.pet||null;

  const loadPets=useCallback(async()=>{
    setLoading(true);setErr('');
    try{
      // Wait for fbready event or up to 12s — mobile cold-start Anonymous Auth + Firestore
      // connection can take 5–10s on cellular, so pure 3s polling under-served mobile.
      if(!window.FB?.ops?.listPets){
        await new Promise(resolve=>{
          let done=false;
          const finish=()=>{if(done)return;done=true;clearTimeout(t);window.removeEventListener('fbready',finish);resolve();};
          window.addEventListener('fbready',finish);
          const t=setTimeout(finish,12000);
          if(window.FB?.ops?.listPets)finish();
        });
      }
      if(!window.FB?.ops?.listPets)throw new Error('firebase-not-ready');
      const list=await window.FB.ops.listPets();
      setPets(list);
      if(!list.length)setErr('目前沒有寵物資料，請按右上角 ↻ 重試');
    }
    catch(e){
      const lineHint='LINE 內建瀏覽器無法登入。請點右上角 ⋯ → 在瀏覽器中開啟';
      const msg=e.message==='firebase-not-ready'?(isLineWebView()?lineHint:'Firebase 還沒連上，請稍後按 ↻ 重試'):'寵物清單載入失敗：'+e.message;
      setErr(msg);
    }
    finally{setLoading(false);}
  },[]);
  useEffect(()=>{loadPets();},[loadPets,fb?.ready]);
  useEffect(()=>{
    const h=()=>loadPets();
    window.addEventListener('fbready',h);
    return()=>window.removeEventListener('fbready',h);
  },[loadPets]);
  useEffect(()=>{setSel(fb?.profile?.currentPetId||null);setRename((fb?.pet?.name)||'');setVoiceGender(fb?.pet?.voiceGender==='male'?'male':'female');},[fb?.profile?.currentPetId,fb?.pet?.name,fb?.pet?.voiceGender]);

  const doRelease=async()=>{
    if(!myPetId||!confirm('要把目前這隻寵物釋放回公共池嗎？'))return;
    try{await window.FB.ops.releasePet(window.FB.uid);await refreshFb();await loadPets();setSel(null);}
    catch(e){setErr('釋放失敗：'+e.message);}
  };
  const doRename=async()=>{
    const v=rename.trim();if(!v)return setErr('名字不可空白');
    try{await window.FB.ops.renameMyPet(window.FB.uid,myPetId,v);await refreshFb();await loadPets();}
    catch(e){const msgs={'bad-name':'名字不可空白','name-too-long':'名字太長囉'};setErr(msgs[e.message]||`改名失敗：${e.message}`);}
  };
  const changeVoice=async(g)=>{
    if(!myPetId||g===voiceGender)return;
    const prev=voiceGender;setVoiceGender(g);setErr('');
    try{speakText(g==='male'?'Boy':'Girl',{gender:g});await window.FB.ops.setPetVoiceGender(window.FB.uid,myPetId,g);await refreshFb();await loadPets();}
    catch(e){setVoiceGender(prev);setErr(`設定發聲失敗：${e.message}`);}
  };

  return(<div className="screen" style={{background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)'}}>
    <div style={{padding:'48px 20px 12px',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
      <button onClick={onBack} style={{width:38,height:38,borderRadius:12,border:'none',background:'rgba(0,0,0,0.06)',cursor:'pointer',fontSize:17}}>←</button>
      <div style={{flex:1}}>
        <div style={{fontSize:17,fontWeight:900,color:'#1a1a2e'}}>更換夥伴</div>
        <div style={{fontSize:11,color:'#aaa'}}>寵物名字是公開的，大家都看得到</div>
      </div>
      <button onClick={loadPets} style={{border:'none',background:`${pc}15`,color:pc,borderRadius:12,padding:'8px 10px',fontSize:11,fontWeight:900,cursor:'pointer'}}>↻</button>
    </div>

    {myPet&&<div style={{margin:'0 18px 12px',background:'#fff',borderRadius:18,padding:12,boxShadow:'0 2px 10px rgba(0,0,0,0.05)'}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8,gap:10}}>
        <div style={{fontSize:12,fontWeight:900,color:'#1a1a2e',paddingTop:5}}>我的寵物名稱</div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3}}>
          <div style={{display:'flex',gap:3,background:'#f1f5f9',borderRadius:10,padding:3}}>
            {[['male','Boy'],['female','Girl']].map(([g,label])=>{
              const active=voiceGender===g;
              return(<button key={g} onClick={()=>changeVoice(g)} style={{padding:'4px 12px',borderRadius:8,border:'none',background:active?pc:'transparent',color:active?'#fff':'#64748b',fontSize:11,fontWeight:900,cursor:'pointer',fontFamily:'inherit',letterSpacing:0.6,transition:'background 0.15s,color 0.15s'}}>{label}</button>);
            })}
          </div>
        </div>
      </div>
      <div style={{display:'flex',gap:8}}>
        <input value={rename} onChange={e=>setRename(e.target.value)} maxLength={24} placeholder="幫牠取個怪名字…" style={{flex:1,minWidth:0,padding:'10px 12px',borderRadius:12,border:'2px solid #eef2f7',fontSize:14,fontWeight:800,fontFamily:'inherit',outline:'none'}}/>
        <button onClick={doRename} style={{padding:'0 12px',borderRadius:12,border:'none',background:`linear-gradient(135deg,${pc},${pc}bb)`,color:'#fff',fontSize:12,fontWeight:900,fontFamily:'inherit',cursor:'pointer'}}>改名</button>
        <button onClick={doRelease} style={{padding:'0 12px',borderRadius:12,border:'none',background:'linear-gradient(135deg,#fb7185,#fb7185cc)',color:'#fff',fontSize:12,fontWeight:900,fontFamily:'inherit',cursor:'pointer'}}>💔 釋放</button>
      </div>
    </div>}

    {err&&<div style={{margin:'0 18px 10px',background:'#fff4e5',color:'#b75d00',fontSize:12,fontWeight:800,padding:'8px 12px',borderRadius:12,textAlign:'center'}}>{err}</div>}

    <div className="scroll-body" style={{padding:'0 18px 16px'}}>
      {loading&&<div style={{display:'flex',justifyContent:'center',padding:30}}><div className="spinner"/></div>}
      {!loading&&pets.length===0&&<div style={{background:'#fff',borderRadius:18,padding:'22px 16px',textAlign:'center',color:'#94a3b8',fontSize:13,fontWeight:800,boxShadow:'0 2px 10px rgba(0,0,0,0.04)'}}>寵物清單還沒載入，請按右上角 ↻ 重試</div>}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
        {pets.map(p=>{
          const mine=p.ownerUid&&p.ownerUid===fb?.uid;
          const unavailable=(p.status==='disabled'||p.hp<=0)||(p.ownerUid&&!mine);
          return(<PetGridButton key={p.id} pet={p} pc={pc} selected={sel===p.id} disabled={unavailable&&!mine} tag={mine?'我的':null} onClick={()=>setSel(p.id)}/>);
        })}
      </div>
    </div>
    <div style={{padding:'0 18px 28px',flexShrink:0}}>
      <button onClick={()=>onSelect(sel)} disabled={!sel} style={{width:'100%',padding:17,borderRadius:20,border:'none',cursor:sel?'pointer':'not-allowed',background:`linear-gradient(135deg,${pc},${pc}bb)`,fontSize:16,fontWeight:900,color:'#fff',boxShadow:`0 5px 18px ${pc}44`,fontFamily:'inherit',opacity:sel?1:0.4}}>確認選擇 ✓</button>
    </div>
  </div>);
}

/* ══ FLASHCARD ═══════════════════════════════════════════ */
function FlashScreen({charSrc,flashAll,knownWords,refreshFb,onNav,pc,voiceGender='female'}){
  const [tab,setTab]=useState('unfamiliar'); // 'unfamiliar' | 'known'
  const knownSet=useMemo(()=>new Set(knownWords||[]),[knownWords]);
  const unfamiliarPool=useMemo(()=>(flashAll||[]).filter(w=>!knownSet.has(w.word)),[flashAll,knownSet]);
  const knownPool=useMemo(()=>(flashAll||[]).filter(w=>knownSet.has(w.word)),[flashAll,knownSet]);
  const cards=tab==='unfamiliar'?unfamiliarPool:knownPool;
  const [idx,setIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [speakTick,setSpeakTick]=useState(0);
  const [busy,setBusy]=useState(false);

  // Reset index when switching tabs / pool changes
  useEffect(()=>{setIdx(0);setFlipped(false);},[tab]);
  useEffect(()=>{setIdx(i=>Math.min(i,Math.max(0,cards.length-1)));},[cards.length]);

  const tabsHeader=(
    <div style={{display:'flex',margin:'4px 20px 10px',background:'#f0f8fa',borderRadius:14,padding:3,flexShrink:0}}>
      {[['unfamiliar',`未熟練 (${unfamiliarPool.length})`],['known',`已會 (${knownPool.length})`]].map(([id,label])=>(
        <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:'8px',borderRadius:11,border:'none',cursor:'pointer',background:tab===id?'#fff':'transparent',fontSize:13,fontWeight:800,color:tab===id?pc:'#aaa',boxShadow:tab===id?'0 2px 8px rgba(0,0,0,0.08)':'none',transition:'all 0.2s',fontFamily:'inherit'}}>{label}</button>
      ))}
    </div>
  );

  if(cards.length===0)return(
    <div className="screen" style={{background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)'}}>
      <div style={{padding:'48px 20px 8px',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
        <div style={{flex:1,fontSize:16,fontWeight:900,color:'#1a1a2e'}}>📖 語彙卡庫</div>
      </div>
      {tabsHeader}
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:40,gap:16,textAlign:'center'}}>
        <span style={{fontSize:60}}>{tab==='unfamiliar'?'🎉':'📖'}</span>
        <div style={{fontSize:18,fontWeight:900,color:'#1a1a2e'}}>{tab==='unfamiliar'?'全部都會了！':'還沒有已會語彙'}</div>
        <div style={{fontSize:13,color:'#aaa',lineHeight:1.6}}>{tab==='unfamiliar'?'去做幾題測驗練手感吧～':'在「未熟練」按「我會了」後，語彙會搬到這裡。'}</div>
        <button onClick={()=>onNav('home')} style={{padding:'14px 28px',borderRadius:18,border:'none',cursor:'pointer',background:`linear-gradient(135deg,${pc},${pc}bb)`,fontSize:15,fontWeight:900,color:'#fff',fontFamily:'inherit'}}>回首頁</button>
      </div>
      <BottomNav screen="flash" onNav={onNav} pc={pc}/>
    </div>
  );

  const card=cards[Math.min(idx,cards.length-1)];
  const catColor=CAT[card.cat]||'#94a3b8';
  const progress=(idx+1)/cards.length;
  const goNext=()=>{setFlipped(false);setTimeout(()=>setIdx(i=>Math.min(i+1,cards.length-1)),120);};
  const goPrev=()=>{setFlipped(false);setTimeout(()=>setIdx(i=>Math.max(i-1,0)),120);};
  const handleMarkKnown=async()=>{
    if(busy||!card)return;
    setBusy(true);
    try{
      if(window.FB?.ops?.markWordKnown&&window.FB?.uid){
        await window.FB.ops.markWordKnown(window.FB.uid,card.word);
        await refreshFb?.();
      }
    }catch(e){console.warn('markWordKnown failed',e);}
    setBusy(false);
    setFlipped(false);
    // After move, current card index may now point past the new (shorter) unfamiliar list — useEffect will clamp
  };
  const handleMarkUnknown=async()=>{
    if(busy||!card)return;
    setBusy(true);
    try{
      if(window.FB?.ops?.markWordUnknown&&window.FB?.uid){
        await window.FB.ops.markWordUnknown(window.FB.uid,card.word);
        await refreshFb?.();
      }
    }catch(e){console.warn('markWordUnknown failed',e);}
    setBusy(false);
    setFlipped(false);
  };

  return(<div className="screen" style={{background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)'}}>
    <div style={{padding:'48px 20px 6px',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
      <div style={{flex:1}}>
        <div style={{fontSize:16,fontWeight:900,color:'#1a1a2e'}}>📖 語彙卡庫</div>
      </div>
      <div style={{fontSize:13,fontWeight:800,color:pc,background:`${pc}15`,padding:'5px 12px',borderRadius:16}}>{idx+1}/{cards.length}</div>
    </div>

    {tabsHeader}

    <div style={{padding:'0 20px 10px',flexShrink:0}}>
      <div style={{height:7,background:'#e8f8fa',borderRadius:8}}>
        <div style={{height:7,borderRadius:8,background:`linear-gradient(90deg,${pc},${pc}88)`,width:`${progress*100}%`,transition:'width 0.3s ease-out'}}/>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
        <span style={{fontSize:11,color:'#aaa',fontWeight:700}}>{tab==='unfamiliar'?`📚 未熟練 ${cards.length} 個`:`✅ 已會 ${cards.length} 個`}</span>
        <span style={{fontSize:11,color:'#aaa',fontWeight:700}}>還剩 {Math.max(0,cards.length-idx-1)} 張</span>
      </div>
    </div>

    <div className="scroll-body" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'14px 22px 12px',gap:16}}>
      <div style={{width:'100%',position:'relative'}}>
      <div onClick={()=>setFlipped(f=>!f)} style={{width:'100%',background:'#fff',borderRadius:28,boxShadow:'0 6px 28px rgba(0,0,0,0.09)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'28px 24px',gap:10,cursor:'pointer',minHeight:240,animation:'pop 0.2s ease-out',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:0,left:0,right:0,height:4,background:`linear-gradient(90deg,${catColor},${catColor}66)`,borderRadius:'28px 28px 0 0'}}/>
        <div style={{fontSize:11,fontWeight:800,color:catColor,letterSpacing:1,opacity:0.8}}>{catLabel(card.cat)}</div>
        {!flipped?(
          <>
            <div style={{fontSize:10,color:'#94a3b8',fontWeight:900,letterSpacing:1}}>平假名讀音</div>
            <div style={{fontSize:36,fontWeight:900,color:'#1a1a2e',letterSpacing:2,textAlign:'center',wordBreak:'break-word',maxWidth:'100%'}}>{card.reading&&card.reading!==card.word?card.reading:card.word}</div>
            {card.reading&&card.reading!==card.word&&<div style={{display:'flex',alignItems:'center',gap:7,background:'#f8fafc',borderRadius:14,padding:'5px 12px',maxWidth:'100%'}}>
              <span style={{fontSize:10,color:'#94a3b8',fontWeight:900,letterSpacing:1,whiteSpace:'nowrap'}}>漢字</span>
              <span style={{fontSize:16,fontWeight:900,color:'#64748b',letterSpacing:1,wordBreak:'break-all'}}>{card.word}</span>
            </div>}
            <div style={{border:`1.5px dashed ${catColor}66`,background:`${catColor}10`,borderRadius:18,padding:'9px 16px',fontSize:17,fontWeight:900,color:catColor,lineHeight:1.35,textAlign:'center',maxWidth:'100%'}}>
              <div style={{fontSize:10,color:'#94a3b8',fontWeight:900,letterSpacing:1,marginBottom:2}}>中文意思</div>
              {card.zh}
            </div>
            <div style={{fontSize:12,color:'#ccc',marginTop:4}}>👆 點擊看例句</div>
          </>
        ):(()=>{
          const sentence=card.en||'';
          const wIdx=card.word&&sentence?sentence.toLowerCase().indexOf(card.word.toLowerCase()):-1;
          const sentenceNode=sentence?(
            <div style={{width:'100%',padding:'4px 2px'}}>
              <div style={{fontSize:10,color:'#94a3b8',fontWeight:900,letterSpacing:1,textAlign:'center',marginBottom:4}}>日文例句</div>
              <div style={{fontSize:18,color:'#555',textAlign:'center',lineHeight:1.6,fontStyle:'italic'}}>
                {wIdx>=0?(<>"{sentence.slice(0,wIdx)}<span style={{color:catColor,fontWeight:900,fontStyle:'normal'}}>{sentence.slice(wIdx,wIdx+card.word.length)}</span>{sentence.slice(wIdx+card.word.length)}"</>):`"${sentence}"`}
              </div>
            </div>
          ):(
            <div style={{fontSize:22,fontWeight:900,color:catColor,textAlign:'center',lineHeight:1.3}}>{card.zh}</div>
          );
          return(<>
            {sentenceNode}
            {(card.zh2||card.zh)&&<div style={{borderTop:'1px dashed #e8e0e0',width:'100%',marginTop:6,paddingTop:10,fontSize:14,color:'#333',textAlign:'center',fontWeight:700}}><span style={{display:'block',fontSize:10,color:'#94a3b8',fontWeight:900,letterSpacing:1,marginBottom:3}}>中文句意</span>「{card.zh2||card.zh}」</div>}
          </>);
        })()}
      </div>
        <div style={{position:'absolute',top:15,right:12,width:54,height:54,zIndex:5}}>
          {speakTick>0&&(
            <div key={speakTick} style={{position:'absolute',top:'50%',left:'50%',width:0,height:0,pointerEvents:'none'}} aria-hidden>
              {[-150,-120,-90,-60,-30].map((deg,i)=>(
                <span key={i} style={{position:'absolute',top:-1.5,left:0,width:12,height:3,marginLeft:0,borderRadius:2,background:catColor,transformOrigin:'left center',['--ang']:`${deg}deg`,transform:`rotate(${deg}deg) translateX(22px) scaleX(0.35)`,animation:'speakBurst 0.55s ease-out forwards',animationDelay:`${i*40}ms`,opacity:0}}/>
              ))}
            </div>
          )}
          <button onClick={(e)=>{e.stopPropagation();speakText(flipped?(card.en||card.word):card.word,{gender:voiceGender});setSpeakTick(t=>t+1);}} aria-label="播放發音" title="點我發音" style={{border:'none',background:'transparent',padding:0,cursor:'pointer',display:'block',animation:'float 3s ease-in-out infinite',filter:'drop-shadow(0 3px 6px rgba(0,0,0,0.18))'}}>
            <img src={charSrc} alt="" style={{width:54,height:54,objectFit:'contain',display:'block'}}/>
          </button>
        </div>
      </div>
    </div>

    <div style={{padding:'0 16px 6px',display:'flex',gap:8,flexShrink:0}}>
      <button onClick={goPrev} disabled={idx===0} style={{flex:1,padding:'6px 10px',borderRadius:12,border:'1.5px solid #f0eaea',background:'#fff',fontSize:12,fontWeight:800,color:'#aaa',cursor:'pointer',opacity:idx===0?0.4:1,fontFamily:'inherit'}}>← 上一張</button>
      {tab==='unfamiliar'?(
        <button onClick={handleMarkKnown} disabled={busy} style={{flex:1.6,padding:'6px 10px',borderRadius:12,border:`1.5px solid ${pc}44`,background:`${pc}12`,fontSize:12,fontWeight:900,color:pc,cursor:busy?'wait':'pointer',fontFamily:'inherit',opacity:busy?0.6:1}}>{busy?'…':'✅ 我會了'}</button>
      ):(
        <button onClick={handleMarkUnknown} disabled={busy} style={{flex:1.6,padding:'6px 10px',borderRadius:12,border:'1.5px solid #fde2e6',background:'#fff5f7',fontSize:12,fontWeight:900,color:'#fb7185',cursor:busy?'wait':'pointer',fontFamily:'inherit',opacity:busy?0.6:1}}>{busy?'…':'↩ 移回未熟練'}</button>
      )}
      <button onClick={goNext} disabled={idx>=cards.length-1} style={{flex:1,padding:'6px 10px',borderRadius:12,border:'none',background:`linear-gradient(135deg,${pc},${pc}bb)`,fontSize:12,fontWeight:900,color:'#fff',cursor:'pointer',opacity:idx>=cards.length-1?0.5:1,fontFamily:'inherit'}}>下一張 →</button>
    </div>
    <BottomNav screen="flash" onNav={onNav} pc={pc}/>
  </div>);
}


/* ══ MAP QUEST ═══════════════════════════════════════════ */
function MapScreen({profile,uid,studentName,charSrc,pc,onNav,onStartStage,cloudEntries,stageRecords,onRefreshMap,silentMode,onToggleSilent}){
  const scrollRef=useRef(null);
  const currentNodeRef=useRef(null);
  const currentStage=Math.min(MAP_STAGE_COUNT,getPlayerMapStage(profile));
  const records=useMemo(()=>{const m=new Map();(stageRecords||[]).forEach(r=>m.set(Number(r.stage||0),r));return m;},[stageRecords]);
  const mapStars=profile?.mapStars||{};
  const friends=useMemo(()=>{const map=new Map();(cloudEntries||[]).filter(e=>String(e.uid||'')!==String(uid||'')&&String(e.name||'')!==String(studentName||'')).slice(0,16).forEach((e,i)=>{const st=Math.min(MAP_STAGE_COUNT,getEntryMapStage(e));if(!map.has(st))map.set(st,[]);map.get(st).push({...e,rank:i+1});});return map;},[cloudEntries,uid,studentName]);
  const boardH=1840;
  const points=useMemo(()=>{
    // Five-stage turn pockets: :>● then ●<: .
    // Boss stages sit on the outer edge; regular stages form the turn shape.
    const groupGap=270;
    const baseY=boardH-180;
    const rightTurn=[
      {x:20,y:0},   // 1: approach
      {x:45,y:0},   // 2: lower colon
      {x:45,y:-110},// 3: upper colon
      {x:64,y:-55}, // 4: arrow neck
      {x:84,y:-55}, // 5: boss dot
    ];
    const leftTurn=[
      {x:80,y:0},   // 6: approach
      {x:55,y:0},   // 7: lower colon
      {x:55,y:-110},// 8: upper colon
      {x:36,y:-55}, // 9: arrow neck
      {x:16,y:-55}, // 10: boss dot
    ];
    return Array.from({length:MAP_STAGE_COUNT},(_,i)=>{
      const stage=i+1;
      const group=Math.floor((stage-1)/5);
      const slot=(stage-1)%5;
      const tpl=group%2===0?rightTurn:leftTurn;
      const pt=tpl[slot];
      return{stage,x:pt.x,y:baseY-group*groupGap+pt.y,biome:biomeForStage(stage),boss:isBossStage(stage)};
    });
  },[]);
  useEffect(()=>{
    const t=setTimeout(()=>{
      const el=scrollRef.current;
      const cur=points.find(p=>p.stage===currentStage);
      if(el&&cur){
        const target=Math.max(0,cur.y-el.clientHeight*0.42);
        try{el.scrollTo({top:target,behavior:'smooth'});}catch{el.scrollTop=target;}
      }else currentNodeRef.current?.scrollIntoView?.({block:'center',behavior:'smooth'});
    },180);
    return()=>clearTimeout(t);
  },[currentStage,points]);
  const cleared=Math.max(0,currentStage-1);
  const nextBoss=Math.ceil(currentStage/BOSS_EVERY)*BOSS_EVERY;
  const pointByStage=new Map(points.map(p=>[p.stage,p]));
  const stageLine=(a,b)=>{
    const pa=pointByStage.get(a),pb=pointByStage.get(b);if(!pa||!pb)return null;
    const color=biomeForStage(a).color;
    return <g key={`line-${a}`}><line x1={`${pa.x}%`} y1={pa.y} x2={`${pb.x}%`} y2={pb.y} stroke="#fff" strokeWidth="18" strokeLinecap="round"/><line x1={`${pa.x}%`} y1={pa.y} x2={`${pb.x}%`} y2={pb.y} stroke={color} strokeWidth="12" strokeLinecap="round" strokeDasharray="9 10"/></g>;
  };
  const renderNode=(p)=>{
    const stage=p.stage,locked=stage>currentStage,done=stage<currentStage,current=stage===currentStage,boss=p.boss,biome=p.biome;
    const rec=records.get(stage)||{};
    const people=friends.get(stage)||[];
    const bossName=rec.firstClearerName||rec.bossName||'等你成為首位通關者';
    const bossClearSec=defaultBossAvgSec(stage);
    const bossChallengeSec=Number(rec.bestBossAvgSec||rec.bossAvgSec||rec.firstClearerAvgSec||bossClearSec);
    const firstAvgSec=Number(rec.firstClearerAvgSec||rec.bestBossAvgSec||0);
    const firstAvatarId=rec.firstClearerAvatarId||rec.bossAvatarId||null;
    const firstAvatarSrc=firstAvatarId?(CHARACTERS[petIdxFromId(firstAvatarId)??avatarIdxFromId(firstAvatarId)]?.img||CHARACTERS[0].img):null;
    const size=boss?62:54;
    return(<div key={stage} ref={current?currentNodeRef:null} style={{position:'absolute',left:`${p.x}%`,top:p.y,transform:'translate(-50%,-50%)',zIndex:locked?2:5,width:110,height:96,display:'flex',alignItems:'center',justifyContent:'center'}}>
      {boss&&firstAvatarSrc&&<img src={firstAvatarSrc} alt="首位通關寵物" style={{position:'absolute',top:-36,left:'50%',transform:'translateX(-50%)',width:32,height:32,objectFit:'contain',filter:'drop-shadow(0 3px 4px rgba(0,0,0,.22))',zIndex:4}}/>}
      {boss&&<div style={{position:'absolute',top:firstAvatarSrc?-17:-18,left:'50%',transform:'translateX(-50%)',fontSize:23,filter:'drop-shadow(0 2px 2px rgba(0,0,0,0.18))',zIndex:3}}>👑</div>}
      <button onClick={()=>!locked&&onStartStage({stage,isBoss:boss,biome,bossName,bossClearSec,bossChallengeSec})} disabled={locked} style={{position:'relative',width:size,height:size,border:'none',borderRadius:'50%',background:locked?'linear-gradient(145deg,#e5e7eb,#cbd5e1)':done?'linear-gradient(145deg,#75e49a,#22c55e)':current?'linear-gradient(145deg,#ffe680,#ffb703)':'linear-gradient(145deg,#74d7ff,#2797ff)',boxShadow:locked?'inset 0 3px 8px rgba(255,255,255,.7),0 5px 12px rgba(15,23,42,.12)':current?'0 0 0 5px rgba(255,183,3,.22),0 10px 24px rgba(255,183,3,.42),inset 0 4px 7px rgba(255,255,255,.72)':'0 8px 18px rgba(39,151,255,.28),inset 0 4px 7px rgba(255,255,255,.70)',cursor:locked?'not-allowed':'pointer',fontFamily:'inherit',animation:current?'float 2.2s ease-in-out infinite':'none'}}>
        <span style={{position:'absolute',inset:9,borderRadius:'50%',background:locked?'rgba(255,255,255,.65)':'rgba(255,255,255,.88)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:boss?17:18,fontWeight:900,color:locked?'#94a3b8':done?'#15803d':'#1a1a2e',boxShadow:'inset 0 2px 5px rgba(255,255,255,.9)'}}>{locked?'🔒':stage}</span>
      </button>
      <div style={{position:'absolute',left:'50%',bottom:-2,transform:'translateX(-50%)',display:'flex',gap:0,letterSpacing:-2,fontSize:15,lineHeight:1,textShadow:'0 1px 2px rgba(255,255,255,.85)'}}>
        {[0,1,2].map(i=><span key={i} style={{opacity:i<(Number(mapStars[stage]||0))?1:0.30,filter:i<(Number(mapStars[stage]||0))?'saturate(1.2)':'grayscale(1)'}}> {i<(Number(mapStars[stage]||0))?'⭐':'☆'} </span>)}
      </div>
      {current&&<img src={charSrc} alt="目前寵物" style={{position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-62%)',width:40,height:40,objectFit:'contain',filter:'drop-shadow(0 4px 5px rgba(0,0,0,.24))',zIndex:8,pointerEvents:'none'}}/>}
      {boss&&<div style={{position:'absolute',left:'50%',top:firstAvatarSrc?-86:-62,transform:'translateX(-50%)',width:112,background:'#fff',border:`2px solid ${biome.color}55`,borderRadius:14,padding:'5px 7px',boxShadow:'0 4px 13px rgba(0,0,0,.10)',fontSize:9,color:'#334155',fontWeight:900,lineHeight:1.25,textAlign:'center',zIndex:6}}><div style={{color:'#fb7185',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{rec.firstClearerName?(<>{rec.firstClearerName}{firstAvgSec>0&&<span style={{color:'#64748b'}}> (AVG {formatSec(firstAvgSec)})</span>}</>):'首位通關者'}</div><div style={{color:'#94a3b8'}}>每題限{formatSec(bossClearSec)}</div></div>}
      {people.length>0&&<div style={{position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-62%)',display:'flex',pointerEvents:'none',zIndex:7}}>{people.slice(0,3).map((e,i)=>{const idx=petIdxFromId(e.avatarId)??avatarIdxFromId(e.avatarId);const src=CHARACTERS[idx]?.img||CHARACTERS[0].img;return <img key={(e.uid||e.name||i)+i} src={src} title={e.name||'玩家'} style={{width:40,height:40,objectFit:'contain',filter:'drop-shadow(0 3px 4px rgba(0,0,0,.22))',marginLeft:i?-24:0}}/>;})}</div>}
    </div>);
  };
  const foodBonuses=MAP_FOOD_BONUS_STAGES.map(stage=>{const p=pointByStage.get(stage);if(!p)return null;const side=p.x>50?-1:1;const got=stage<currentStage;return(<div key={`food-${stage}`} style={{position:'absolute',left:`${p.x+side*30}%`,top:p.y-78,transform:'translate(-50%,-50%)',zIndex:3,textAlign:'center',opacity:got?0.42:1}}><div title={`通過第 ${stage} 關獲得肉塊 ×${MAP_FOOD_BONUS}`} style={{width:38,height:38,borderRadius:13,background:'#fff8',border:'2px dashed #fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,boxShadow:'0 3px 10px rgba(0,0,0,.09)'}}>🍖</div><div style={{fontSize:9,fontWeight:900,color:'#111827',textShadow:'0 1px 2px rgba(255,255,255,.75)',marginTop:1}}>+{MAP_FOOD_BONUS}</div><div style={{height:2,width:34,background:'repeating-linear-gradient(90deg,#fff 0 5px,transparent 5px 10px)',transform:`translate(${side*-12}px,22px) rotate(${side*24}deg)`}}/></div>);});
  return(<div className="screen" style={{background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)'}}>
    <div style={{padding:'42px 18px 10px',background:'linear-gradient(180deg,#ffffff,#f8fdff)',boxShadow:'0 2px 12px rgba(0,0,0,.04)',zIndex:10}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:50,height:50,borderRadius:18,background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 3px 12px rgba(0,0,0,0.07)'}}><img src={charSrc} alt="" style={{width:43,height:43,objectFit:'contain'}}/></div>
        <div style={{flex:1,minWidth:0}}><div style={{fontSize:20,fontWeight:900,color:'#1a1a2e'}}>世界地圖闖關</div><div style={{fontSize:12,color:'#94a3b8',fontWeight:800}}>{studentName}：第 {currentStage} 關・下一魔王第 {nextBoss} 關</div></div>
        <button onClick={onToggleSilent} aria-pressed={!!silentMode} title={silentMode?'靜音模式：不出聽力題':'聽力題開啟'} style={{border:'none',background:silentMode?'#1a1a2e':'#fff',color:silentMode?'#fff':'#1a1a2e',borderRadius:14,padding:'9px 10px',fontSize:12,cursor:'pointer',boxShadow:'0 2px 10px rgba(0,0,0,0.06)',fontWeight:900,fontFamily:'inherit',minWidth:48}}>{silentMode?'靜音':'聽力'}</button>
        <button onClick={onRefreshMap} style={{border:'none',background:'#fff',borderRadius:14,padding:'10px 12px',fontSize:16,cursor:'pointer',boxShadow:'0 2px 10px rgba(0,0,0,0.06)'}}>↻</button>
      </div>
      <div style={{height:9,background:'#eef2f7',borderRadius:999,overflow:'hidden',marginTop:12}}><div style={{height:'100%',width:`${Math.min(100,cleared/MAP_STAGE_COUNT*100)}%`,background:'linear-gradient(90deg,#61c2ff,#22c55e,#ffb703)',borderRadius:999}}/></div>
    </div>
    <div ref={scrollRef} className="scroll-body" style={{padding:'10px 14px 14px',background:'#7c4a24'}}>
      <div style={{position:'relative',height:boardH,border:'5px solid #fff',borderRadius:30,overflow:'hidden',boxShadow:'inset 0 0 0 2px rgba(255,255,255,.45),0 8px 28px rgba(0,0,0,.24)',background:'linear-gradient(180deg,#f8ffff 0%,#dff8f6 31%,#fff7c2 55%,#fff0a3 72%,#d8f8a8 100%)'}}>
        <svg viewBox="0 0 390 1360" preserveAspectRatio="none" style={{position:'absolute',inset:0,width:'100%',height:'100%',zIndex:0,pointerEvents:'none'}}>
          <path d="M0 115 C70 55 135 170 205 92 S330 25 390 92 V360 H0 Z" fill="#9ceee7" opacity="0.32"/>
          <path d="M0 190 C88 120 142 250 225 168 S330 112 390 176 V430 H0 Z" fill="#69d9d6" opacity="0.30"/>
          <path d="M0 280 C70 210 155 330 235 252 S330 215 390 260 V520 H0 Z" fill="#4ccfd0" opacity="0.22"/>
          <path d="M0 500 C86 430 135 560 218 486 S326 425 390 488 V755 H0 Z" fill="#fff3a2" opacity="0.64"/>
          <path d="M0 590 C72 535 150 640 226 574 S325 532 390 590 V825 H0 Z" fill="#ffd976" opacity="0.36"/>
          <path d="M0 835 C72 775 155 910 235 826 S325 765 390 825 V1085 H0 Z" fill="#b9ef8f" opacity="0.55"/>
          <path d="M0 940 C88 860 145 1015 230 925 S330 850 390 930 V1225 H0 Z" fill="#7edb72" opacity="0.30"/>
        </svg>
        <div style={{position:'absolute',left:-30,top:75,width:145,height:62,borderRadius:'50%',background:'#fff8',filter:'blur(.2px)'}}/><div style={{position:'absolute',right:-35,top:230,width:130,height:55,borderRadius:'50%',background:'#fff7'}}/>
        <div style={{position:'absolute',left:18,top:290,fontSize:34}}>🏜️</div><div style={{position:'absolute',right:18,top:610,fontSize:34}}>🌾</div><div style={{position:'absolute',left:18,bottom:40,fontSize:34}}>🚩</div><div style={{position:'absolute',right:18,bottom:115,fontSize:38}}>🌲</div>
        <svg width="100%" height="100%" style={{position:'absolute',inset:0,zIndex:1,overflow:'visible'}}>{Array.from({length:MAP_STAGE_COUNT-1},(_,i)=>stageLine(i+1,i+2))}</svg>
        {foodBonuses}
        {points.map(renderNode)}
      </div>
    </div>
    <BottomNav screen="map" onNav={onNav} pc={pc}/>
  </div>);
}

/* ══ QUIZ ════════════════════════════════════════════════ */
// Question-type theme tokens (matches fix1.jpg orange / fix2.jpg cyan)
const Q_THEME={
  zh2en:{color:'#61c2ff',icon:'🎯',label:'選出正確解釋'},
  listening:{color:'#22c55e',icon:'🔊',label:'聽例句選單字'},
  particle:{color:'#f472b6',icon:'文',label:'文法形式選擇'},
  synonym:{color:'#14b8a6',icon:'≈',label:'同義替換'},
  cloze:{color:'#FF9800',icon:'✏️',label:'單字重排'},
  order:{color:'#a78bfa',icon:'🧩',label:'排出完整句子'},
};
const QUIZ_ZH_SENTENCE_STYLE={fontSize:14,color:'#333',textAlign:'center',fontWeight:800,lineHeight:1.55};

function Blank({width=78,color='#555',filled}){
  return(<span style={{display:'inline-block',minWidth:width,padding:'0 6px',margin:'0 4px',borderBottom:`2px solid ${color}`,textAlign:'center',fontWeight:900,color:filled?color:'transparent',verticalAlign:'baseline',lineHeight:1.2,letterSpacing:1,fontFamily:filled?'monospace':'inherit'}}>{filled||'＿'}</span>);
}

function QuizScreen({charSrc,charName,quizPool,knownWords,onFinish,onNav,onAnsweredChange,pc,refreshFb,voiceGender='female',quest=null}){
  const TOTAL=Math.min(15,quizPool.length);
  const knownSet=useMemo(()=>new Set(knownWords||[]),[knownWords]);
  const [questions]=useState(()=>buildQuizItems(quizPool,TOTAL,knownSet,{disableListening:!!quest?.silentMode}));
  const HINT_BUDGET=3;
  const [idx,setIdx]=useState(0);
  const [selected,setSel]=useState(null);   // chosen option string
  const [clozePicked,setClozePicked]=useState([]); // token ids picked for spelling questions
  const [clozeResult,setClozeResult]=useState(null); // {isCorrect, userAnswer}
  const [orderPicked,setOrderPicked]=useState([]); // token ids picked for sentence-order questions
  const [orderResult,setOrderResult]=useState(null); // {isCorrect}
  const [score,setScore]=useState(0);
  const [xp,setXp]=useState(0);
  const [combo,setCombo]=useState(0);
  const [showConf,setConf]=useState(false);
  const [xpMsg,setXpMsg]=useState(null);
  const [shaking,setShaking]=useState(false);
  const [hintsLeft,setHintsLeft]=useState(HINT_BUDGET);
  const [hintRevealed,setHintRevealed]=useState(false);
  const [hiddenOpts,setHiddenOpts]=useState(new Set()); // zh2en eliminated wrong options
  const [hintUsedThisQ,setHintUsedThisQ]=useState(false); // per-question lock — only 1 hint debit per question
  const [hintFx,setHintFx]=useState(0);
  const answeredRef=useRef(0);
  const dragTokenRef=useRef(null);
  const questionStartRef=useRef(Date.now());
  const answerTimesRef=useRef([]);
  const speedWinsRef=useRef(0);
  const clearWinsRef=useRef(0);
  const clearScoreRef=useRef(0);
  const [speedWins,setSpeedWins]=useState(0);
  const [clearScore,setClearScore]=useState(0);
  const clearTarget=quest?.isBoss?bossPassTarget(TOTAL):clearPassTarget(TOTAL);
  const bossTimeLimit=Math.max(1,Math.round(Number(quest?.bossClearSec||defaultBossAvgSec(quest?.stage||1))));
  const [timeLeft,setTimeLeft]=useState(bossTimeLimit);

  useEffect(()=>{
    // Reset per-question hint state
    questionStartRef.current=Date.now();
    setTimeLeft(bossTimeLimit);
    setHintRevealed(false);
    setHiddenOpts(new Set());
    setHintUsedThisQ(false);
    setHintFx(0);
    setClozePicked([]);
    setOrderPicked([]);
    setOrderResult(null);
  },[idx,questions,bossTimeLimit]);

  // Auto-clear the ✨ pop overlay after its animation finishes (~0.4s)
  useEffect(()=>{
    if(hintFx<=0)return;
    const t=setTimeout(()=>setHintFx(0),500);
    return()=>clearTimeout(t);
  },[hintFx]);

  useEffect(()=>{
    if(!quest?.isBoss||selected||clozeResult||orderResult)return;
    const tick=()=>{
      const elapsed=(Date.now()-questionStartRef.current)/1000;
      setTimeLeft(Math.max(0,bossTimeLimit-elapsed));
    };
    tick();
    const t=setInterval(tick,250);
    return()=>clearInterval(t);
  },[idx,quest?.isBoss,bossTimeLimit,selected,clozeResult,orderResult]);

  useEffect(()=>{
    const cur=questions[idx];
    if(!cur||quest?.silentMode||cur.type!=='listening'||selected||clozeResult||orderResult)return;
    const t=setTimeout(()=>speakText(cur.sentence||cur.vocab?.audioText||cur.vocab?.en,{gender:voiceGender}),320);
    return()=>clearTimeout(t);
  },[idx,questions,voiceGender,selected,clozeResult,orderResult]);

  const advanceClearScore=(ok)=>{
    const prev=clearScoreRef.current;
    const next=ok?Math.min(TOTAL,prev+1):(prev>=clearTarget?Math.max(0,prev-1):prev);
    clearScoreRef.current=next;
    setClearScore(next);
    return next;
  };

  const usePetHint=()=>{
    if(hintsLeft<=0)return;
    if(hintUsedThisQ)return; // already debited this question — additional taps do nothing
    const cur=questions[idx];
    if(!cur||selected||clozeResult||orderResult)return;
    if(cur.type==='listening'){
      const wrongs=cur.options.filter(o=>normalizeAnswer(o.word)!==normalizeAnswer(cur.correct));
      const drop=shuffle(wrongs).slice(0,2).map(o=>o.word);
      if(drop.length===0)return;
      setHiddenOpts(new Set(drop));
    }else if(cur.type==='particle'||cur.type==='synonym'){
      const wrongs=cur.options.filter(o=>normalizeAnswer(o)!==normalizeAnswer(cur.correct));
      const drop=shuffle(wrongs).slice(0,2);
      if(drop.length===0)return;
      setHiddenOpts(new Set(drop));
      if(cur.type==='particle'&&cur.hintChunks?.length)setHintRevealed(true);
    }else if(cur.type==='cloze'){
      const first3=(cur.letterTokens||[]).filter(t=>t.idx<3).sort((a,b)=>a.idx-b.idx).map(t=>t.id);
      if(first3.length===0)return;
      setClozePicked(prev=>[...first3,...prev.filter(id=>!first3.includes(id))]);
    }else if(cur.type==='order'){
      const first3=cur.tokens.filter(t=>t.idx<3).sort((a,b)=>a.idx-b.idx).map(t=>t.id);
      setOrderPicked(prev=>[...first3,...prev.filter(id=>!first3.includes(id))]);
    }else return;
    setHintUsedThisQ(true);
    setHintsLeft(n=>Math.max(0,n-1));
    setHintFx(t=>t+1);
  };

  if(TOTAL===0)return(
    <div className="screen" style={{background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)'}}>
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:40,gap:16,textAlign:'center'}}>
        <span style={{fontSize:60}}>🎮</span>
        <div style={{fontSize:20,fontWeight:900,color:'#1a1a2e'}}>還沒有可以測驗的語彙</div>
        <div style={{fontSize:14,color:'#aaa',lineHeight:1.6}}>先到首頁看看目前等級解鎖的 N4 語彙，再進來測驗！</div>
        <button onClick={()=>onNav('home')} style={{padding:'14px 28px',borderRadius:18,border:'none',cursor:'pointer',background:`linear-gradient(135deg,${pc},${pc}bb)`,fontSize:15,fontWeight:900,color:'#fff',fontFamily:'inherit'}}>回首頁</button>
      </div>
      <BottomNav screen="map" onNav={onNav} pc={pc}/>
    </div>
  );

  const q=questions[idx];
  const vocab=q.vocab;
  const theme=Q_THEME[q.type]||Q_THEME.zh2en;

  const sentenceForQuestion=(qq)=>{
    if(!qq)return '';
    if(qq.type==='listening')return qq.sentence||qq.vocab?.audioText||qq.vocab?.en||'';
    if(qq.type==='order')return qq.sentence||qq.correct||qq.vocab?.en||'';
    if(qq.type==='cloze')return qq.vocab?.word||qq.correct||'';
    if(qq.type==='particle')return `${qq.before||''}${qq.correct||''}${qq.after||''}`.trim();
    if(qq.type==='synonym')return qq.source||qq.vocab?.word||qq.correct||'';
    return qq.vocab?.word||qq.correct||'';
  };
  const speakAfterAnswer=(qq)=>{
    if(quest?.silentMode)return;
    const text=sentenceForQuestion(qq);
    if(text)try{speakText(text,{gender:voiceGender});}catch(e){console.warn('speak failed',e);}
  };

  const afterAnswer=async(ok)=>{
    answeredRef.current+=1;
    onAnsweredChange?.(answeredRef.current);
    const elapsedSec=Math.max(0.2,(Date.now()-questionStartRef.current)/1000);
    answerTimesRef.current=[...answerTimesRef.current,elapsedSec];
    const finalClearScore=advanceClearScore(ok);
    if(quest?.isBoss&&ok&&elapsedSec<=Number(quest.bossClearSec||defaultBossAvgSec(quest.stage))){
      clearWinsRef.current+=1;
    }
    if(quest?.isBoss&&ok&&elapsedSec<Number(quest.bossChallengeSec||quest.bossClearSec||defaultBossAvgSec(quest.stage))){
      speedWinsRef.current+=1;
      setSpeedWins(speedWinsRef.current);
    }
    let gain=0,food=0,nextCombo=0;
    if(ok){
      try{
        if(window.FB?.ops?.answerCorrect){
          const r=await window.FB.ops.answerCorrect(window.FB.uid,false);
          gain=r.gainExp||0;food=r.addFood||0;nextCombo=r.newCombo||0;
          await refreshFb?.();
        }
      }catch(e){console.warn('[Quiz] answerCorrect failed',e);}
      setScore(s=>s+1);setXp(x=>x+gain);setCombo(nextCombo);
      setConf(true);setXpMsg(food>0?`+${gain} EXP　🍖 ×${food}！`:`+${gain} EXP`);
      setTimeout(()=>setConf(false),1200);setTimeout(()=>setXpMsg(null),1000);
    }else{
      try{if(window.FB?.ops?.answerWrong){await window.FB.ops.answerWrong(window.FB.uid);}}catch(e){console.warn('[Quiz] answerWrong failed',e);}
      try{if(window.FB?.ops?.markWordUnknown&&q?.vocab?.word){await window.FB.ops.markWordUnknown(window.FB.uid,q.vocab.word);}}catch(e){console.warn('[Quiz] markWordUnknown failed',e);}
      try{await refreshFb?.();}catch{}
      setCombo(0);
      setShaking(true);setTimeout(()=>setShaking(false),500);
    }
    // Sentence-based questions linger a bit longer so kids can read the answer.
    const delay=(q.type==='cloze'||q.type==='listening'||q.type==='order'||q.type==='particle'||q.type==='synonym')?1700:1100;
    setTimeout(()=>{
      setSel(null);setClozePicked([]);setClozeResult(null);setOrderPicked([]);setOrderResult(null);
      if(idx+1>=TOTAL){
        const times=answerTimesRef.current;
        const avgSec=times.length?times.reduce((a,b)=>a+b,0)/times.length:0;
        const rawScore=ok?score+1:score;
        onFinish(rawScore,ok?xp+gain:xp,TOTAL,quest?{...quest,avgSec,clearScore:finalClearScore,rawScore,clearWins:clearWinsRef.current,speedWins:speedWinsRef.current,bossClearSec:Number(quest.bossClearSec||defaultBossAvgSec(quest.stage)),bossTargetSec:Number(quest.bossChallengeSec||quest.bossClearSec||defaultBossAvgSec(quest.stage))}:null);
      }
      else setIdx(i=>i+1);
    },delay);
  };

  const answerChoice=(optStr)=>{
    if(selected)return;
    setSel(optStr);
    speakAfterAnswer(q);
    const correctStr=q.type==='zh2en'?q.vocab.word:q.correct;
    afterAnswer(normalizeAnswer(optStr)===normalizeAnswer(correctStr));
  };
  const addClozeLetter=(id)=>{
    if(clozeResult||clozePicked.includes(id))return;
    setClozePicked(prev=>[...prev,id]);
  };
  const removeClozeLetter=(id)=>{
    if(clozeResult)return;
    setClozePicked(prev=>prev.filter(x=>x!==id));
  };
  const submitCloze=()=>{
    if(clozeResult||clozePicked.length!==(q.letterTokens||[]).length)return;
    const byId=new Map((q.letterTokens||[]).map(t=>[t.id,t]));
    const userAnswer=clozePicked.map(id=>byId.get(id)?.text||'').join('');
    const ok=normalizeAnswer(userAnswer)===normalizeAnswer(q.correct);
    setClozeResult({isCorrect:ok,userAnswer});
    speakAfterAnswer(q);
    afterAnswer(ok);
  };
  const addOrderToken=(id)=>{
    if(orderResult||orderPicked.includes(id))return;
    setOrderPicked(prev=>[...prev,id]);
  };
  const removeOrderToken=(id)=>{
    if(orderResult)return;
    setOrderPicked(prev=>prev.filter(x=>x!==id));
  };
  const submitOrder=()=>{
    if(orderResult||orderPicked.length!==q.tokens.length)return;
    const byId=new Map(q.tokens.map(t=>[t.id,t]));
    const text=orderPicked.map(id=>byId.get(id)?.text||'').join(' ');
    const ok=normalizeAnswer(text)===normalizeAnswer(q.correct);
    setOrderResult({isCorrect:ok});
    speakAfterAnswer(q);
    afterAnswer(ok);
  };
  const giveUp=()=>{
    if(selected||clozeResult||orderResult)return;
    speakAfterAnswer(q);
    if(q.type==='cloze'){
      setClozePicked((q.letterTokens||[]).slice().sort((a,b)=>a.idx-b.idx).map(t=>t.id));
      setClozeResult({isCorrect:false,userAnswer:''});
    }else if(q.type==='order'){
      setOrderResult({isCorrect:false});
      setOrderPicked(q.tokens.slice().sort((a,b)=>a.idx-b.idx).map(t=>t.id));
    }else{
      // mark a sentinel selection so UI shows correct answer highlight
      setSel('__give_up__');
    }
    afterAnswer(false);
  };

  const bgBtn=(label,correctLabel)=>{if(!selected)return'#fff';if(normalizeAnswer(label)===normalizeAnswer(correctLabel))return'#4CAF82';if(normalizeAnswer(label)===normalizeAnswer(selected))return'#FF4D6D';return'#fff';};
  const colBtn=(label,correctLabel)=>{if(!selected)return'#1a1a2e';if(normalizeAnswer(label)===normalizeAnswer(correctLabel)||normalizeAnswer(label)===normalizeAnswer(selected))return'#fff';return'#ccc';};
  const bdrBtn=(label,correctLabel)=>{if(!selected)return'2px solid #f0eaea';if(normalizeAnswer(label)===normalizeAnswer(correctLabel))return'2px solid #4CAF82';if(normalizeAnswer(label)===normalizeAnswer(selected))return'2px solid #FF4D6D';return'2px solid #f5f5f5';};

  // ─ Render question card per type ─
  const giveUpBtn=(!selected&&!clozeResult&&!orderResult)?(
    <div style={{textAlign:'center',paddingTop:6,paddingBottom:4}}>
      <button onClick={giveUp} style={{padding:'7px 16px',borderRadius:14,border:'none',background:'linear-gradient(135deg,#fb7185,#fb7185cc)',fontSize:11,fontWeight:900,color:'#fff',cursor:'pointer',fontFamily:'inherit',boxShadow:'0 3px 10px rgba(251,113,133,0.30)'}}>放棄此題（進未熟練）</button>
    </div>
  ):null;

  let questionCard,answerArea;

  if(q.type==='zh2en'){
    const correct=vocab;
    const catColor=CAT[correct.cat]||'#94a3b8';
    const primaryText=correct.reading&&correct.reading!==correct.word?correct.reading:correct.word;
    const hasKanji=correct.reading&&correct.reading!==correct.word;
    questionCard=(
      <div style={{background:'#fff',borderRadius:22,padding:'14px 20px',textAlign:'center',boxShadow:'0 4px 18px rgba(0,0,0,0.07)',marginBottom:12,flexShrink:0,animation:shaking?'shake 0.4s ease-in-out':'pop 0.2s ease-out',display:'flex',flexDirection:'column',alignItems:'center',gap:6,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${catColor},${catColor}44)`}}/>
        <div style={{fontSize:11,fontWeight:800,color:theme.color,background:`${theme.color}18`,padding:'3px 12px',borderRadius:20,letterSpacing:0.5}}>{theme.icon} {theme.label}</div>
        {correct.visual&&<span style={{fontSize:44,lineHeight:1,marginTop:4}}>{correct.visual}</span>}

function ResultStars({stars,pc}){
  const got=Math.max(0,Math.min(3,Number(stars||0)));
  const shine=got===3;
  return(
    <div style={{width:'100%',margin:'-4px 0 18px',padding:'14px 14px 13px',borderRadius:22,background:'linear-gradient(180deg,#fff8df 0%,#fff 100%)',border:'1.5px solid rgba(255,197,61,0.34)',boxShadow:'inset 0 1px 0 rgba(255,255,255,.9),0 6px 18px rgba(255,184,0,.13)',textAlign:'center',overflow:'hidden',position:'relative'}}>
      <div style={{fontSize:11,fontWeight:900,color:'#b7791f',letterSpacing:1,marginBottom:5}}>本關獲得</div>
      <div style={{height:48,display:'flex',justifyContent:'center',alignItems:'center',gap:10,position:'relative'}}>
        {[0,1,2].map(i=>{
          const active=i<got;
          const landDelay=0.12+i*0.22;
          const anim=active?`resultStarLand 0.72s cubic-bezier(.18,1.16,.32,1) ${landDelay}s both${shine?', resultStarShine 0.72s ease-out 1.36s forwards':''}`:'none';
          return(
            <span key={i} aria-hidden="true" style={{width:46,height:46,display:'inline-flex',alignItems:'center',justifyContent:'center',position:'relative',fontSize:active?39:31,lineHeight:1,color:active?'#ffc53d':'#e5e7eb',textShadow:active?'0 2px 0 #fff,0 5px 10px rgba(255,184,0,.35)':'none',opacity:active?1:.9,animation:anim}}>
              {active?'★':'☆'}
              {shine&&active&&<span style={{position:'absolute',left:'50%',top:'48%',fontSize:31,color:'#fff',textShadow:'0 0 8px rgba(255,255,255,.95),0 0 16px rgba(255,197,61,.9)',animation:'resultGlint 0.74s ease-out 1.39s both',pointerEvents:'none'}}>✦</span>}
            </span>
          );
        })}
      </div>
      <div style={{fontSize:13,fontWeight:900,color:'#333',marginTop:3}}>得了 <span style={{fontSize:18,color:pc}}>{got}</span> 顆星</div>
    </div>
  );
}

function ResultScreen({score,xp,total,questRun,charSrc,charName,onRetry,onHome,pc}){
  const pct=total>0?Math.round((score/total)*100):0;
  const isGreat=pct>=80,isOk=pct>=50;
  const grade=isGreat?'S 🌟':isOk?'B 👍':'C 💪';
  const msg=isGreat?'太厲害了！':isOk?'做得不錯！':'繼續加油！';
  const questTarget=questRun?(questRun.isBoss?bossPassTarget(total):clearPassTarget(total)):0;
  const questClearScore=Number(questRun?.clearScore??score??0);
  const resultStars=questRun?.passed?Math.max(0,Math.min(3,Number.isFinite(Number(questRun.stars))?Number(questRun.stars):mapStarsForScore(questClearScore,total))):0;
  const questFailText=questRun?.isBoss
    ?(questClearScore<questTarget?`魔王關還差一點：通關血條 ${questClearScore}/${questTarget}。`:`魔王關還差一點：限時答對 ${questRun.clearWins||0}/${questTarget}。`)
    :`第 ${questRun?.stage} 關需要通關血條達到 ${questTarget}。`;
  return(<div className="screen" style={{background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)',position:'relative'}}>
    {isGreat&&<Confetti active/>}
    <div className="scroll-body" style={{padding:'52px 22px 28px',display:'flex',flexDirection:'column',alignItems:'center',gap:18}}>
      <div style={{textAlign:'center'}}>
        <div style={{animation:'float 3s ease-in-out infinite',display:'inline-block'}}><img src={charSrc} alt="" style={{width:96,height:96,objectFit:'contain'}}/></div>
        <div style={{fontSize:26,fontWeight:900,color:'#1a1a2e',marginTop:10}}>{msg}</div>
        <div style={{fontSize:13,color:'#aaa',marginTop:4}}>{charName} 在為你加油！</div>
      </div>
      <div style={{width:'100%',background:'#fff',borderRadius:28,padding:24,boxShadow:'0 6px 24px rgba(0,0,0,0.07)',animation:'pop 0.3s ease-out'}}>
        <div style={{display:'flex',justifyContent:'center',marginBottom:18}}>
          <div style={{width:84,height:84,borderRadius:'50%',background:`linear-gradient(135deg,${pc},${pc}88)`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',boxShadow:`0 6px 20px ${pc}44`}}>
            <div style={{fontSize:22,fontWeight:900,color:'#fff',lineHeight:1}}>{pct}%</div>
            <div style={{fontSize:9,color:'rgba(255,255,255,0.8)'}}>正確率</div>
          </div>
        </div>
        {questRun?.passed&&<ResultStars stars={resultStars} pc={pc}/>}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
          {[{icon:'✅',label:'答對題數',val:`${score}/${total}`,color:'#4CAF82'},{icon:'⭐',label:'XP獲得',val:`+${xp}`,color:'#FFB800'},{icon:'🎯',label:'等級',val:grade,color:pc}].map(item=>(
            <div key={item.label} style={{textAlign:'center',background:'#fafeff',borderRadius:14,padding:'12px 6px'}}>
              <div style={{fontSize:20}}>{item.icon}</div>
              <div style={{fontSize:14,fontWeight:900,color:item.color,lineHeight:1.2}}>{item.val}</div>
              <div style={{fontSize:9,color:'#bbb',fontWeight:700,marginTop:2}}>{item.label}</div>
            </div>
          ))}
        </div>
      </div>
      {questRun&&<div style={{width:'100%',background:questRun.passed?'#ecfdf5':'#fff7ed',borderRadius:18,padding:'14px 18px',display:'flex',alignItems:'center',gap:12,border:`1.5px solid ${questRun.passed?'#86efac':'#fed7aa'}`}}>
        <span style={{fontSize:24}}>{questRun.passed?'🗺️':'👑'}</span>
        <div style={{fontSize:12,color:questRun.passed?'#166534':'#9a3412',fontWeight:800,lineHeight:1.55}}>

        </div>
      </div>}
      <div style={{width:'100%',background:`${pc}10`,borderRadius:18,padding:'14px 18px',display:'flex',alignItems:'center',gap:12}}>
        <span style={{fontSize:22}}>💡</span>

const PODIUM_H=[110,148,90];
const PODIUM_C=['#C0C0C0','#FFD700','#CD7F32'];
const PODIUM_MEDAL=['🥈','🥇','🥉'];

function RankScreen({uid,studentName,charIdx,stats,onNav,pc,cloudEntries,cloudStreakEntries,cloudStatus,onRefresh}){
  const [tab,setTab]=useState('score');

  const todayKey=taipeiDateKey();
  const list=useMemo(()=>{
    const cloud=tab==='score'?cloudEntries:cloudStreakEntries;
    let arr=(cloud||[]).map(e=>({
      name:e.name||'(未命名)',
      avgScore:Number(e.avgScore||0),
      streak:e.streakCur|0,
      streakBest:e.streakBest|0,
      todayQuiz:(e.todayQuizDate===todayKey)?(e.todayQuizCount|0):0,
      level:e.level|0||1,
      charIdx:avatarIdxFromId(e.avatarId),
      uid:e.uid||'',
      isMe:uid&&e.uid===uid,
    }));
    // Inject me locally if not in cloud yet
    if(studentName&&!arr.some(r=>r.isMe)){
      arr.push({uid:uid||'',name:studentName,avgScore:Number(stats.avgScore||0),streak:stats.streak|0,streakBest:stats.streakBest||stats.streak||0,todayQuiz:stats.todayQuiz|0,level:stats.level|0||1,charIdx,isMe:true});
    }
    arr=arr.filter(r=>isRankEligible(r.streak,r.todayQuiz,r.level));
    if(tab==='score'){
      arr.sort((a,b)=>(b.level-a.level)||(b.avgScore-a.avgScore)||(b.streak-a.streak));
    }else{
      arr.sort((a,b)=>(b.streak-a.streak)||(b.streakBest-a.streakBest)||(b.level-a.level));
    }
    return arr.map((r,i)=>({...r,rank:i+1}));
  },[tab,cloudEntries,cloudStreakEntries,studentName,charIdx,stats,uid,todayKey]);

  const top3Src=[list[1],list[0],list[2]]; // left 2nd, center 1st, right 3rd

  return(<div className="screen" style={{background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)'}}>
    <div style={{padding:'48px 20px 6px',flexShrink:0,display:'flex',alignItems:'center',gap:8}}>
      <div style={{fontSize:18,fontWeight:900,color:'#1a1a2e',flex:1}}>🏆 排行榜</div>
      <button onClick={onRefresh} style={{padding:'5px 12px',borderRadius:14,border:'none',background:`${pc}15`,color:pc,fontSize:11,fontWeight:800,cursor:'pointer',fontFamily:'inherit'}}>{cloudStatus==='loading'?'同步中…':'↻ 更新'}</button>
    </div>
    {cloudStatus==='offline'&&<div style={{margin:'0 20px 8px',background:'#fff4e5',color:'#b75d00',fontSize:11,fontWeight:700,padding:'6px 10px',borderRadius:10,textAlign:'center',flexShrink:0}}>雲端連線失敗，目前顯示本地資料</div>}

    <div style={{display:'flex',margin:'4px 20px 14px',background:'#f0f8fa',borderRadius:14,padding:3,flexShrink:0}}>
      {[['score','等級排行'],['streak','連續天數']].map(([id,label])=>(
        <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:'8px',borderRadius:11,border:'none',cursor:'pointer',background:tab===id?'#fff':'transparent',fontSize:13,fontWeight:800,color:tab===id?pc:'#aaa',boxShadow:tab===id?'0 2px 8px rgba(0,0,0,0.08)':'none',transition:'all 0.2s',fontFamily:'inherit'}}>{label}</button>
      ))}
    </div>

    {cloudStatus==='loading'&&list.length===0?(
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}><div className="spinner"/></div>
    ):(
      <>
        <div style={{display:'flex',alignItems:'flex-end',justifyContent:'center',gap:6,padding:'0 20px 14px',flexShrink:0,minHeight:200}}>
          {top3Src.map((r,pi)=>{
            if(!r)return(<div key={'empty-'+pi} style={{flex:1}}/>);
            const isFirst=pi===1,isSecond=pi===0;
            const valSize=isFirst?30:isSecond?22:17;
            const unitSize=Math.round(valSize*0.42);
            const medalSize=isFirst?24:18;
            const nameSuffix=tab==='score'
              ?(<><span style={{color:'#ffb300'}}>平均</span> <span style={{color:'#1a1a2e'}}>{Number(r.avgScore||0).toFixed(1)}</span></>)
              :(<span style={{color:'#ffb300'}}>LV{r.level}</span>);
            const valNode=tab==='score'
              ?(<span style={{fontSize:valSize,fontWeight:900,color:'#fff',lineHeight:1,textShadow:'0 2px 6px rgba(0,0,0,0.22)'}}><span style={{fontSize:unitSize,marginRight:2,opacity:0.92}}>LV</span>{r.level}</span>)
              :(<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                  <span style={{fontSize:valSize,fontWeight:900,color:'#fff',lineHeight:1,textShadow:'0 2px 6px rgba(0,0,0,0.22)'}}>{r.streak}<span style={{fontSize:unitSize,marginLeft:2,opacity:0.92}}>天</span></span>
                  <span style={{fontSize:11,fontWeight:800,color:'#fff',opacity:0.92,textShadow:'0 1px 3px rgba(0,0,0,0.18)',whiteSpace:'nowrap'}}>今日{r.todayQuiz|0}題</span>
                </div>);
            return(<div key={r.name+pi} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
              {r.isMe&&<div style={{fontSize:9,fontWeight:900,color:pc,background:`${pc}20`,padding:'2px 6px',borderRadius:10}}>你</div>}
              <img src={CHARACTERS[r.charIdx]?.img||CHARACTERS[0].img} alt="" style={{width:isFirst?50:40,height:isFirst?50:40,objectFit:'contain'}}/>
              <div style={{fontSize:10,fontWeight:900,color:r.isMe?pc:'#555',maxWidth:84,textAlign:'center',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name} {nameSuffix}</div>
              <div style={{width:'100%',height:PODIUM_H[pi],borderRadius:'10px 10px 0 0',background:`linear-gradient(180deg,${PODIUM_C[pi]},${PODIUM_C[pi]}88)`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'space-between',padding:'10px 0 6px',boxShadow:`0 -4px 12px ${PODIUM_C[pi]}44`}}>
                {valNode}
                <span style={{fontSize:medalSize,filter:'drop-shadow(0 2px 4px rgba(0,0,0,0.18))'}}>{PODIUM_MEDAL[pi]}</span>
              </div>
            </div>);
          })}
        </div>

        <div className="scroll-body" style={{padding:'0 20px 8px'}}>
          {list.slice(3).map(r=>{
            const nameSuffix=tab==='score'
              ?(<><span style={{color:'#ffb300',fontSize:11}}>平均</span> <span style={{color:'#1a1a2e',fontSize:11}}>{Number(r.avgScore||0).toFixed(1)}</span></>)
              :(<span style={{color:'#ffb300',fontSize:11}}>LV{r.level}</span>);
            const rightVal=tab==='score'
              ?(<><span style={{fontSize:10,color:'#aaa',fontWeight:700}}>LV </span>{r.level}</>)
              :(<>{r.streak}<span style={{fontSize:10,color:'#aaa',fontWeight:700}}> 天</span></>);
            return(<div key={r.name+r.rank} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',background:r.isMe?`${pc}10`:'#fff',borderRadius:16,marginBottom:8,boxShadow:r.isMe?`0 2px 10px ${pc}22`:'0 1px 6px rgba(0,0,0,0.04)',border:r.isMe?`1.5px solid ${pc}33`:'1.5px solid transparent'}}>
              <div style={{width:26,textAlign:'center',fontSize:13,fontWeight:900,color:'#ddd'}}>{r.rank}</div>
              <img src={CHARACTERS[r.charIdx]?.img||CHARACTERS[0].img} alt="" style={{width:36,height:36,objectFit:'contain'}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:900,color:r.isMe?pc:'#1a1a2e',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name} {nameSuffix}{r.isMe?' (我)':''}</div>
                <div style={{fontSize:10,color:'#aaa',fontWeight:700}}>🔥 連續 {r.streak} 天 · 今日 {r.todayQuiz|0} 題</div>
              </div>
              <div style={{fontSize:17,fontWeight:900,color:r.isMe?pc:'#555'}}>{rightVal}</div>
            </div>);
          })}
          {list.length<=3&&<div style={{textAlign:'center',color:'#bbb',fontSize:12,padding:20}}>目前還沒有其他玩家資料</div>}
        </div>
      </>
    )}
    <BottomNav screen="rank" onNav={onNav} pc={pc}/>
  </div>);
}
