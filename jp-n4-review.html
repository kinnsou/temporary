/* ══ APP ═════════════════════════════════════════════════ */
function App(){
  const [profile,setProfile]=useState(()=>loadProfile());
  const [screen,setScreen]=useState('home');
  const [result,setResult]=useState(null);
  const [stats,setStats]=useState(loadStats);
  const [vocabAll,setVocabAll]=useState(null);
  const [difficultyOrder,setDifficultyOrder]=useState([]);
  const [loadError,setLoadError]=useState('');
  const [levelUpInfo,setLevelUpInfo]=useState(null);
  const [cloudEntries,setCloudEntries]=useState([]);
  const [cloudStreakEntries,setCloudStreakEntries]=useState([]);
  const [cloudStatus,setCloudStatus]=useState('idle');
  const [stageRecords,setStageRecords]=useState([]);
  const [activeQuest,setActiveQuest]=useState(null);
  const [quizAnswered,setQuizAnswered]=useState(0);
  const [pendingNav,setPendingNav]=useState(null);
  const [mapSilentMode,setMapSilentMode]=useState(loadMapSilent);
  const [fb,refreshFb]=useFb();
  const claimAttempted=useRef(false);
  useEffect(()=>{
    if(claimAttempted.current)return;
    if(!fb?.ready||!window.FB)return;
    if(fb.pet)return;
    if(Object.prototype.hasOwnProperty.call(profile||{},'petId'))return; // new-mode profiles may intentionally be visitor after release
    const idx=profile?.charIdx;
    if(typeof idx!=='number')return;
    const targetId=window.FB.config.SEED_PETS[idx]?.id;
    if(!targetId)return;
    claimAttempted.current=true;
    window.FB.ops.claimPet(window.FB.uid,targetId)
      .then(()=>refreshFb())
      .catch(e=>{claimAttempted.current=false;console.warn('[App] auto-claim failed',e.message);});
  },[fb,profile,refreshFb]);

  const pc='#61c2ff';
  const currentPetId=fb?.ready?(fb?.profile?.currentPetId||null):(profile?.petId||null);
  const charIdx=(currentPetId?petIdxFromId(currentPetId):null)??profile?.charIdx??0;
  const charSrc=fb?.pet?.img||CHARACTERS[charIdx]?.img||CHARACTERS[0].img;
  const charName=fb?.pet?.name||CHARACTERS[charIdx]?.name||'小夥伴';
  const studentName=fb?.profile?.name||profile?.name||'同學';
  const today=taipeiDateKey();
  const profileTodayDate=fb?.profile?.todayQuizDate||stats.todayQuizDate||'';
  const profileTodayCount=fb?.profile?.todayQuizCount??stats.todayQuiz??0;
  const displayStats={
    ...stats,
    streak:fb?.profile?.streakCur??stats.streak??0,
    best:fb?.profile?.bestScore??stats.best??0,
    avgScore:fb?.profile?.avgScore??stats.avgScore??0,
    totalGames:fb?.profile?.totalGames??stats.totalGames??0,
    xp:fb?.profile?.exp??stats.xp??0,
    todayQuiz:profileTodayDate===today?(profileTodayCount|0):0,
    level:fb?.profile?.level||1,
    totalExp:fb?.profile?.totalExp??estimateTotalExpForLevel(fb?.profile?.level||1,fb?.profile?.exp??stats.xp??0),
  };

  // Load jp-n4-data.json + difficulty file once
  useEffect(()=>{
    (async()=>{
      try{
        const res=await fetch('jp-n4-data.json?t='+Date.now(),{cache:'no-store'});
        if(!res.ok)throw new Error('HTTP '+res.status);
        const data=await res.json();
        const words=Array.isArray(data.words)?data.words:Array.isArray(data.vocab)?data.vocab:[];
        if(!words.length)throw new Error('空的 vocab 資料');
        setVocabAll(words.map(normalizeVocab));
      }catch(e){
        console.warn('jp-n4-data.json 載入失敗，使用 fallback:',e);
        setVocabAll(FALLBACK_WORDS);
        setLoadError(String(e.message||e));
      }
    })();
    (async()=>{
      try{
        const res=await fetch('jp-n4-difficulty.json?t='+Date.now(),{cache:'no-store'});
        if(!res.ok)throw new Error('HTTP '+res.status);
        const data=await res.json();
        if(Array.isArray(data.order))setDifficultyOrder(data.order);
      }catch(e){console.warn('jp-n4-difficulty.json 載入失敗，按日期 fallback:',e);}
    })();
  },[]);

  const refreshLeaderboard=useCallback(async()=>{
    setCloudStatus('loading');
    try{
      const todayKey=taipeiDateKey();
      const best=await cloudRunQuery('avgScore',80);
      const eligibleBest=best.filter(e=>isRankEligible(e.streakCur,e.todayQuizDate===todayKey?(e.todayQuizCount|0):0,e.level||1));
      eligibleBest.sort((a,b)=>(Number(b.avgScore||0))-(Number(a.avgScore||0))||String(b.updatedAt||'').localeCompare(String(a.updatedAt||'')));
      setCloudEntries(eligibleBest);
      try{
        const streak=await cloudRunQuery('streakCur',80);
        const eligibleStreak=streak.filter(e=>isRankEligible(e.streakCur,e.todayQuizDate===todayKey?(e.todayQuizCount|0):0,e.level||1));
        eligibleStreak.sort((a,b)=>(b.streakCur||0)-(a.streakCur||0)||(Number(b.avgScore||0)-Number(a.avgScore||0)));
        setCloudStreakEntries(eligibleStreak);
      }catch{setCloudStreakEntries([]);}
      setCloudStatus('ok');
    }catch(e){
      console.warn('leaderboard fetch failed',e);
      setCloudStatus('offline');
    }
  },[]);

  const refreshMapStages=useCallback(async()=>{
    try{
      if(window.FB?.ops?.listMapStages){
        const rows=await window.FB.ops.listMapStages(MAP_STAGE_COUNT);
        setStageRecords(rows||[]);
      }
    }catch(e){console.warn('map stages fetch failed',e);}
  },[]);

  // Fetch leaderboard/map markers when entering rank or map screen
  useEffect(()=>{if(screen==='rank'||screen==='map')refreshLeaderboard();},[screen,refreshLeaderboard]);
  useEffect(()=>{if(screen==='map')refreshMapStages();},[screen,refreshMapStages]);

  // Level-based study path: LV1 gets 5 N4 cards; each level unlocks 5 more.
  const {focusSet,quizPool,dateLabel}=useMemo(()=>{
    if(!vocabAll)return{focusSet:[],quizPool:[],dateLabel:'N4 載入中'};
    const level=displayStats.level||1;
    const unlocked=unlockedWords(vocabAll,difficultyOrder,level);
    const displaySet=unlocked.slice(Math.max(0,unlocked.length-HOME_FOCUS_COUNT)).map(w=>({...w,isDailyFocus:true}));
    const focusWords=new Set(displaySet.map(w=>w.word));
    const studyPool=unlocked.map(w=>focusWords.has(w.word)?{...w,isDailyFocus:true}:w);
    return{
      focusSet:displaySet,
      quizPool:studyPool.length?studyPool:vocabAll,
      dateLabel:`N4 LV ${level}・已解鎖 ${unlocked.length} 語`,
    };
  },[vocabAll,difficultyOrder,displayStats.level]);

  const goScreen=(s)=>{
    if(s==='quiz'&&screen!=='quiz'){setResult(null);setQuizAnswered(0);}
    if(s==='map'){setResult(null);setQuizAnswered(0);}
    setScreen(s);
  };
  const nav=(s)=>{
    if(screen==='quiz'&&s!=='quiz'&&quizAnswered>0){setPendingNav(s);return;}
    goScreen(s);
  };
  const toggleMapSilent=useCallback(()=>{
    setMapSilentMode(v=>{const next=!v;saveMapSilent(next);return next;});
  },[]);
  const confirmExitQuiz=()=>{
    const s=pendingNav||'home';
    setPendingNav(null);
    setQuizAnswered(0);
    goScreen(s);
  };

  const levelUpAckingRef=useRef(false);
  // Watch pendingLevelUp on home screen → show modal once
  useEffect(()=>{
    if(screen!=='home')return;
    if(levelUpInfo)return;
    if(levelUpAckingRef.current)return; // mid-ack: ignore stale pending value
    const pending=fb?.profile?.pendingLevelUp|0;
    if(pending<=0)return;
    const newLevel=fb?.profile?.level||1;
    const oldLevel=Math.max(1,newLevel-pending);
    const unlocked=vocabAll?newlyUnlockedWords(difficultyOrder,vocabAll,oldLevel,newLevel):[];
    setLevelUpInfo({level:newLevel,unlocked});
  },[screen,fb?.profile?.pendingLevelUp,fb?.profile?.level,levelUpInfo,vocabAll,difficultyOrder]);

  const handleCloseLevelUp=async()=>{
    levelUpAckingRef.current=true;
    try{if(window.FB?.ops?.ackLevelUp&&window.FB?.uid)await window.FB.ops.ackLevelUp(window.FB.uid);}catch(e){console.warn('ackLevelUp failed',e);}
    try{await refreshFb();}catch{}
    setLevelUpInfo(null);
    // Release lock on next tick so the now-zero pending is the value the effect sees
    setTimeout(()=>{levelUpAckingRef.current=false;},0);
  };

  const handleFinish=async(score,xpGained,total,questRun=null)=>{
    const pct=total>0?(score/total*100):0;
    const passed=questRun?stagePass(score,total,questRun):true;
    let finalQuestRun=questRun?{...questRun,passed}:null;
    const baseStats=displayStats;
    const baseAvg=Number(baseStats.avgScore||0);
    const games=baseStats.totalGames||0;
    const newAvg=games===0?Math.round(pct*10)/10:Math.round((baseAvg*games+pct)/(games+1)*10)/10;
    const todayCount=(baseStats.todayQuizDate===today?(baseStats.todayQuiz||0):0)+(total|0);
    const ns={...baseStats,xp:(baseStats.xp||0)+xpGained,best:Math.max(baseStats.best||0,score),totalGames:games+1,avgScore:newAvg,todayQuiz:todayCount,todayQuizDate:today};
    saveStats(ns);setStats(ns);
    setQuizAnswered(0);
    if(window.FB?.uid&&studentName&&finalQuestRun){
      try{
        const mapResult=await window.FB.ops.clearMapStage?.(window.FB.uid,{...finalQuestRun,score,total,pct,name:studentName,avatarId:currentPetId||CHARACTERS[charIdx]?.id||DEFAULT_AVATAR});
        if(mapResult)finalQuestRun={...finalQuestRun,...mapResult};
        await refreshFb();
        refreshMapStages();
      }catch(e){console.warn('clearMapStage failed',e);}
    }
    setResult({score,xp:xpGained,total,questRun:finalQuestRun});setScreen('result');
    if(window.FB?.uid&&studentName){
      const entry=await cloudUpsertScore(window.FB.uid,studentName,currentPetId||CHARACTERS[charIdx]?.id||DEFAULT_AVATAR,score,total);
      if(entry){
        const ns2={...ns,streak:entry.streakCur,best:entry.bestScore,avgScore:entry.avgScore??ns.avgScore,todayQuiz:entry.todayQuizCount??ns.todayQuiz,todayQuizDate:entry.todayQuizDate??ns.todayQuizDate};
        saveStats(ns2);setStats(ns2);
        await refreshFb();
        refreshLeaderboard();
      }
    }
  };

  if(!vocabAll){
    return(<div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,background:'linear-gradient(170deg,#fafeff 0%,#f0fdf8 100%)'}}>
      <div className="spinner"/>
      <div style={{fontSize:13,color:'#aaa',fontWeight:700}}>日語資料載入中…</div>
    </div>);
  }

  if(!profile)return(<div style={{width:'100%',height:'100%',position:'relative'}}>
    <LineWebViewBanner/>
    <OnboardingScreen onDone={p=>{setProfile(p);setScreen('home');}} pc={pc}/>
  </div>);

  return(<div style={{width:'100%',height:'100%',position:'relative'}}>
    <LineWebViewBanner/>
    {screen==='home'&&<HomeScreen charSrc={charSrc} charName={charName} studentName={studentName} stats={displayStats} focusSet={focusSet} dateLabel={dateLabel} onNav={nav} onSelectChar={()=>setScreen('charselect')} pc={pc} fb={fb} refreshFb={refreshFb}/>}
    {screen==='charselect'&&<CharSelectScreen current={charIdx} fb={fb} refreshFb={refreshFb} onSelect={async petId=>{
      if(window.FB&&petId){
        try{await window.FB.ops.claimPet(window.FB.uid,petId);await refreshFb();}
        catch(e){
          const msgs={'pet-taken':'這隻已經被別人帶走了！','pet-disabled':'這隻寵物餓壞了，不能選 😢','pet-not-found':'找不到這隻寵物'};
          alert(msgs[e.message]||`選寵失敗：${e.message}`);
          return;
        }
      }
      const idx=petIdxFromId(petId)??charIdx;
      const p={...profile,charIdx:idx,petId};setProfile(p);saveProfile(p);
      setScreen('home');
    }} onBack={()=>setScreen('home')} pc={pc}/>}
    {screen==='flash'&&<FlashScreen charSrc={charSrc} flashAll={quizPool} knownWords={fb?.profile?.knownWords||[]} refreshFb={refreshFb} onNav={nav} pc={pc} voiceGender={fb?.pet?.voiceGender==='male'?'male':'female'}/>}
    {screen==='map'&&<MapScreen profile={fb?.profile||displayStats} uid={fb?.uid} studentName={studentName} charSrc={charSrc} pc={pc} onNav={nav} cloudEntries={cloudEntries} stageRecords={stageRecords} onRefreshMap={()=>{refreshLeaderboard();refreshMapStages();}} silentMode={mapSilentMode} onToggleSilent={toggleMapSilent} onStartStage={q=>{setActiveQuest({...q,silentMode:mapSilentMode});setResult(null);setQuizAnswered(0);setScreen('quiz');}}/>}
    {screen==='quiz'&&<QuizScreen charSrc={charSrc} charName={charName} quizPool={quizPool} knownWords={fb?.profile?.knownWords||[]} onFinish={handleFinish} onNav={nav} onAnsweredChange={setQuizAnswered} pc={pc} refreshFb={refreshFb} voiceGender={fb?.pet?.voiceGender==='male'?'male':'female'} quest={activeQuest}/>}
    {screen==='result'&&result&&<ResultScreen {...result} charSrc={charSrc} charName={charName} onRetry={()=>setScreen('map')} onHome={()=>setScreen('home')} pc={pc}/>}
    {screen==='rank'&&<RankScreen uid={fb?.uid} studentName={studentName} charIdx={charIdx} stats={displayStats} onNav={nav} pc={pc} cloudEntries={cloudEntries} cloudStreakEntries={cloudStreakEntries} cloudStatus={cloudStatus} onRefresh={refreshLeaderboard}/>}
    {pendingNav&&<ConfirmExitQuizModal onYes={confirmExitQuiz} onNo={()=>setPendingNav(null)}/>}
    {levelUpInfo&&<LevelUpModal level={levelUpInfo.level} unlocked={levelUpInfo.unlocked||[]} pc={pc} onClose={handleCloseLevelUp}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

const SEED_PET_MAP = Object.fromEntries(SEED_PETS.map(p => [p.id, p]));
function seedPetDoc(id, now = Date.now()) {
  const p = SEED_PET_MAP[id];
  if (!p) return null;
  return { type:p.type, name:p.name, desc:p.desc, img:p.img, ownerUid:null, ownerName:null, status:'available', hp:100, lastHpUpdate:now, createdAt:now, updatedAt:now };
}
function seedPetList(now = Date.now()) {
  return SEED_PETS.map(p => ({ id:p.id, ...seedPetDoc(p.id, now), fallback:true }));
}

function normalizePlayerName(name) {
  return String(name || '').trim().replace(/\s+/g, ' ').slice(0, 40) || '匿名玩家';
}
function playerIdFromName(name) {
  const clean = normalizePlayerName(name).toLowerCase();
  try {
    const bytes = new TextEncoder().encode(clean);
    let bin = '';
    for (const b of bytes) bin += String.fromCharCode(b);
    return 'name_' + btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '').slice(0, 120);
  } catch {
    return 'name_' + clean.replace(/[^a-z0-9_-]+/g, '_').replace(/^_+|_+$/g, '').slice(0, 80);
  }
}

const CLASSROOM_ID = 'jp-n4';
const CLASSROOM_DOC_PREFIX = 'jpN4_';
function classroomDocId(id) {
  const raw = String(id || '');
  return raw.startsWith(CLASSROOM_DOC_PREFIX) ? raw : CLASSROOM_DOC_PREFIX + raw;

function classroomLogicalId(id) {
  const raw = String(id || '');
  return raw.startsWith(CLASSROOM_DOC_PREFIX) ? raw.slice(CLASSROOM_DOC_PREFIX.length) : raw;

function isClassroomDoc(docSnap) {

function calcCurrentHp(pet, now = Date.now()) {
  if (!pet) return 0;
  const hp = Math.max(0, Number(pet.hp ?? 100));
  if (pet.status === 'disabled') return 0;
  // Only actively adopted pets lose HP over time.
  // Available pool pets are paused so unselected pets don't all starve while a child plays with one companion.
  if (pet.status !== 'owned' || !pet.ownerUid) return hp;
  const last = pet.lastHpUpdate || now;
  const passed = Math.floor((now - last) / HP_DECAY_MS);
  return Math.max(0, hp - passed);
}

async function ensureUserProfile(uid, defaultName, legacyUid = null) {
  const ref = userDoc(uid);
  const snap = await getDoc(ref);
  if (snap.exists()) {
    const existing = snap.data();
    // Backfill fields for users created before the LV/study-path system shipped.
    const patch = {};
    if (existing.level === undefined || existing.level === null) { patch.level = 1; patch.pendingLevelUp = 0; }
    if (existing.pendingLevelUp === undefined || existing.pendingLevelUp === null) patch.pendingLevelUp = 0;
    if (existing.knownWords === undefined || existing.knownWords === null) patch.knownWords = [];
    if (existing.classroom !== CLASSROOM_ID) patch.classroom = CLASSROOM_ID;
    if (existing.mapStage === undefined || existing.mapStage === null) patch.mapStage = Math.max(1, Number(existing.level || 1));
    if (existing.mapBestStage === undefined || existing.mapBestStage === null) patch.mapBestStage = Math.max(0, Number((patch.mapStage || existing.mapStage || 1) - 1));
    if (existing.mapFoodBonuses === undefined || existing.mapFoodBonuses === null) patch.mapFoodBonuses = [];
    if (existing.mapStars === undefined || existing.mapStars === null) patch.mapStars = {};
    const levelForTotal = patch.level || existing.level || 1;
    const expForTotal = existing.exp || 0;
    if (existing.totalExp === undefined || existing.totalExp === null) patch.totalExp = estimateTotalExpForLevelModule(levelForTotal, expForTotal);
    if (Object.keys(patch).length) {
      patch.updatedAt = Date.now();
      try { await updateDoc(ref, patch); } catch (e) { console.warn('[FB] profile backfill failed', e); }
      return { ref, data: { ...existing, ...patch }, created: false };
    }
    return { ref, data: existing, created: false };
  }
  const now = Date.now();
  let data = null;
  if (legacyUid && legacyUid !== uid) {
    try {
      const legacySnap = await getDoc(userDoc(legacyUid));
      if (legacySnap.exists()) {
        data = { ...legacySnap.data(), classroom: CLASSROOM_ID, name: normalizePlayerName(defaultName), playerId: uid, migratedFromAuthUid: legacyUid, updatedAt: now };
      }
    } catch (e) { console.warn('[FB] legacy profile copy failed', e); }
  }
  if (!data) data = {
    classroom: CLASSROOM_ID,
    name: normalizePlayerName(defaultName),
    playerId: uid,
    currentPetId: null,
    exp: 0, totalExp: 0, combo: 0, foodCount: 0,
    level: 1, pendingLevelUp: 0,
    mapStage: 1, mapBestStage: 0, mapClears: 0, mapFoodBonuses: [], mapStars: {},
    totalCorrect: 0, totalGames: 0,
    streakCur: 0, streakBest: 0, bestScore: 0, avgScore: 0,
    todayQuizCount: 0, todayQuizDate: '',
    knownWords: [],
    weekPlayed: [], lastPlayDate: '',
    createdAt: now, updatedAt: now,
  };
  await setDoc(ref, data);
  return { ref, data, created: true };
}

async function migrateLegacyPetOwner(legacyUid, playerId, currentPetId) {
  if (!legacyUid || legacyUid === playerId || !currentPetId) return false;
  try {
    return await runTransaction(db, async (tx) => {
      const petRef = petDoc(currentPetId);
      const petSnap = await tx.get(petRef);
      if (!petSnap.exists() || petSnap.data().ownerUid !== legacyUid) return false;
      tx.update(petRef, { ownerUid: playerId, updatedAt: Date.now() });
      return true;
    });
  } catch (e) { console.warn('[FB] legacy pet owner migration failed', e); return false; }

async function listPets() {
  const now = Date.now();
  let snap = await getDocs(petsCol());
  let docs = snap.docs.filter(isClassroomDoc);
  if (!docs.length) {
    try {
      await seedPets();
      snap = await getDocs(petsCol());
      docs = snap.docs.filter(isClassroomDoc);
    } catch (e) {
      console.warn('[FB] seed on listPets failed; showing seed fallback', e);
      return seedPetList(now);
    }
    if (!docs.length) return seedPetList(now);
  }
  const out = [];
  const reborn = [];
  const usersToClear = new Set();
  docs.forEach(d => {
    const petId = classroomLogicalId(d.id);
    const pet = d.data();
    const hp = calcCurrentHp(pet, now);
    if (hp <= 0 && (pet.ownerUid || pet.status === 'disabled')) {
      // Starved or legacy-disabled → auto-release and reset to a fresh available pet
      // so abandoned accounts don't lock pets forever.
      reborn.push({ id: petId, ref: d.ref, prevOwner: pet.ownerUid || null });
      if (pet.ownerUid) usersToClear.add(pet.ownerUid);
      out.push({ id: petId, ...pet, hp:100, status:'available', ownerUid:null, ownerName:null });
    } else {
      out.push({ id: petId, ...pet, hp, status: pet.status || 'available' });
    }
  });
  await Promise.all(reborn.map(p => updateDoc(p.ref, { hp:100, status:'available', ownerUid:null, ownerName:null, lastHpUpdate: now, updatedAt: now }).catch(()=>{})));
  // Clear dangling currentPetId on the previous owners so they go through CharSelect again
  await Promise.all([...usersToClear].map(uid => updateDoc(userDoc(uid), { currentPetId: null, updatedAt: now }).catch(()=>{})));
  return out.sort((a,b)=>String(a.id).localeCompare(String(b.id)));
}

async function claimPet(uid, petId) {
  return await runTransaction(db, async (tx) => {
    const userRef = userDoc(uid);
    const petRef = petDoc(petId);
    const userSnap = await tx.get(userRef);
    const petSnap = await tx.get(petRef);
    if (!userSnap.exists()) throw new Error('no-user');
    const now = Date.now();
    const seededPet = petSnap.exists() ? null : seedPetDoc(petId, now);
    if (!petSnap.exists() && !seededPet) throw new Error('pet-not-found');
    const pet = petSnap.exists() ? petSnap.data() : seededPet;
    const user = userSnap.data();

    let releasedHp = null;
    const oldId = user.currentPetId;
    if (oldId && oldId !== petId) {
      const oldRef = petDoc(oldId);
      const oldSnap = await tx.get(oldRef);
      if (oldSnap.exists() && oldSnap.data().ownerUid === uid) {
        const oldPet = oldSnap.data();
        const oldHp = calcCurrentHp(oldPet, now);
        releasedHp = oldHp;
        tx.update(oldRef, {
          ownerUid: null, ownerName: null,
          status: oldHp <= 0 ? 'disabled' : 'available',
          hp: oldHp, lastHpUpdate: now, updatedAt: now,
        });
      }
    }

    const curHp = calcCurrentHp(pet, now);
    const isStarved = curHp <= 0 || pet.status === 'disabled';
    // Pets only block claims when they are alive AND owned by someone else.
    // Starved/disabled pets are reborn (hp=100) and handed to whoever claims next.
    if (!isStarved && pet.ownerUid && pet.ownerUid !== uid) throw new Error('pet-taken');

    // Reborn handoff: clear the previous owner's currentPetId so they go through CharSelect again next login
    if (isStarved && pet.ownerUid && pet.ownerUid !== uid) {
      tx.update(userDoc(pet.ownerUid), { currentPetId: null, updatedAt: now });
    }

    const claimHp = isStarved
      ? 100
      : ((releasedHp != null) ? Math.min(curHp, releasedHp) : curHp);
    const claimPatch = {
      ownerUid: uid, ownerName: user.name || '匿名玩家', status: 'owned',
      hp: claimHp, lastHpUpdate: now, updatedAt: now,
    };
    if (petSnap.exists()) tx.update(petRef, claimPatch);
    else tx.set(petRef, { ...pet, ...claimPatch, classroom: CLASSROOM_ID, createdAt: now });
    tx.update(userRef, { currentPetId: petId, updatedAt: now });
    tx.set(leaderboardDoc(uid), { classroom: CLASSROOM_ID, uid, avatarId: petId, name: user.name || '匿名玩家', updatedAt: new Date(now).toISOString() }, { merge: true });
    return { id: petId, ...pet, hp: claimHp, ownerUid: uid, ownerName: user.name || '匿名玩家', status: 'owned' };
  });
}

async function feedMyPet(uid) {
  return await runTransaction(db, async (tx) => {
    const userRef = userDoc(uid);
    const userSnap = await tx.get(userRef);
    if (!userSnap.exists()) throw new Error('no-user');
    const user = userSnap.data();
    if ((user.foodCount || 0) <= 0) throw new Error('no-food');
    if (!user.currentPetId) throw new Error('no-pet');
    const petRef = petDoc(user.currentPetId);
    const petSnap = await tx.get(petRef);
    if (!petSnap.exists()) throw new Error('pet-missing');
    const pet = petSnap.data();
    if (pet.ownerUid !== uid) throw new Error('not-owner');
    const now = Date.now();
    const curHp = calcCurrentHp(pet, now);
    if (curHp <= 0) {
      tx.update(petRef, { hp:0, status:'disabled', ownerUid:null, ownerName:null, lastHpUpdate: now, updatedAt: now });
      tx.update(userRef, { currentPetId: null, updatedAt: now });
      throw new Error('pet-starved');
    }
    const newHp = Math.min(100, curHp + 50);
    const newFood = (user.foodCount || 0) - 1;
    tx.update(petRef, { hp: newHp, status: 'owned', lastHpUpdate: now, updatedAt: now });
    tx.update(userRef, { foodCount: newFood, updatedAt: now });
    return { newHp, foodCount: newFood, petName: pet.name };
  });
}

function calcExpGain(combo) {
  const base = 10;
  if (combo >= 10) return base + 20;
  if (combo >= 5) return base + 10;
  if (combo >= 3) return base + 5;
  return base;
}

// XP required to advance from level n to n+1.
// N4 training intensity is 1.5x the current classroom curve:
// 300, 390, 528, 738, 1071, 1608, then capped.
const BASE_LEVEL_XP_CAP = 1072;
const MODULE_LEVEL_XP_MULTIPLIER = 1.5;
function baseLevelXpRequirement(level) {
  const lv = Math.max(1, level | 0);
  let req = 100;
  for (let n = 2; n <= lv; n++) {
    if (req >= BASE_LEVEL_XP_CAP / 2) return BASE_LEVEL_XP_CAP;
    const mult = 1.30 + 0.05 * (n - 2);
    req = Math.min(BASE_LEVEL_XP_CAP / 2, Math.round(req * mult));
  }
  return req * 2;
}
function levelXpRequirement(level) {
  return Math.round(baseLevelXpRequirement(level) * MODULE_LEVEL_XP_MULTIPLIER);
}
function estimateTotalExpForLevelModule(level, exp = 0) {
  const lv = Math.max(1, level | 0);
  let total = Number(exp || 0);
  for (let n = 1; n < lv; n++) total += levelXpRequirement(n);
  return Math.max(0, Math.round(total));
}

async function answerCorrect(uid, isVerb = false) {
  return await runTransaction(db, async (tx) => {
    const userRef = userDoc(uid);
    const userSnap = await tx.get(userRef);
    if (!userSnap.exists()) throw new Error('no-user');
    const user = userSnap.data();
    if (!user.currentPetId) return { gainExp:0, addFood:0, newCombo:user.combo||0, guest:true, levelUp:0 };
    const gainExp = calcExpGain(user.combo || 0);
    let curExp = (user.exp || 0) + gainExp;
    let level = user.level || 1;
    const totalExp = Number(user.totalExp ?? estimateTotalExpForLevelModule(level, user.exp || 0)) + gainExp;
    let levelUp = 0;
    // Advance through any thresholds crossed (usually 0 or 1 per question; defensive while-loop in case of huge multi-correct accumulators)
    let safety = 8;
    while (safety-- > 0) {
      const need = levelXpRequirement(level);
      if (curExp < need) break;
      curExp -= need;
      level += 1;
      levelUp += 1;
    }
    const addFood = levelUp; // 1 food per level still
    const newCombo = (user.combo || 0) + 1;
    tx.update(userRef, {
      exp: curExp,
      totalExp,
      combo: newCombo,
      foodCount: (user.foodCount || 0) + addFood,
      totalCorrect: (user.totalCorrect || 0) + 1,
      level,
      pendingLevelUp: (user.pendingLevelUp || 0) + levelUp,
      updatedAt: Date.now(),
    });
    return { gainExp, addFood, newCombo, levelUp, level };
  });
}

function mapStageDocId(stage) {
  return 'stage_' + String(stage | 0).padStart(3, '0');
}
const MAP_FOOD_BONUS_MODULE = 3;
const MAP_FOOD_BONUS_STAGES_MODULE = [4,9,14,19,24,29];
function isMapFoodBonusStageModule(stage) { return MAP_FOOD_BONUS_STAGES_MODULE.includes(Number(stage)); }
function mapStarsForScoreModule(score, total = 15) { const st = Number(score || 0); if (st >= 15) return 3; if (st >= 6) return 2; if (st >= 1) return 1; return 0; }

async function clearMapStage(uid, run = {}) {
  const stage = Math.max(1, Math.min(30, Number(run.stage || 1) | 0));
  const passed = run.passed !== false;
  const now = Date.now();
  return await runTransaction(db, async (tx) => {
    const userRef = userDoc(uid);
    const lbRef = leaderboardDoc(uid);
    const stageRef = mapStageDoc(stage);
    const userSnap = await tx.get(userRef);
    const stageSnap = await tx.get(stageRef);
    if (!userSnap.exists()) throw new Error('no-user');
    const user = userSnap.data();
    const curMap = Math.max(1, Number(user.mapStage || user.level || 1));
    const nextMap = passed ? Math.max(curMap, Math.min(30, stage + 1)) : curMap;
    const cleanName = String(run.name || user.name || '匿名玩家').trim().slice(0, 40);
    const avgSec = Math.max(0, Number(run.avgSec || 0));
    const stars = mapStarsForScoreModule(run.clearScore ?? run.score, run.total || 15);
    const prevStars = (user.mapStars && typeof user.mapStars === 'object') ? user.mapStars : {};
    const userPatch = {
      classroom: CLASSROOM_ID,
      mapStage: nextMap,
      mapBestStage: Math.max(Number(user.mapBestStage || 0), passed ? stage : 0),
      mapLastRun: { stage, passed, score: run.score | 0, clearScore: run.clearScore | 0, total: run.total | 0, pct: Number(run.pct || 0), isBoss: !!run.isBoss, clearWins: run.clearWins | 0, speedWins: run.speedWins | 0, avgSec, bossClearSec: Number(run.bossClearSec || 0), stars, at: now },
      mapStars: { ...prevStars, [stage]: Math.max(Number(prevStars[stage] || 0), stars) },
      updatedAt: now,
    };
    let rewardFood = 0;
    const claimedBonuses = Array.isArray(user.mapFoodBonuses) ? user.mapFoodBonuses.map(Number) : [];
    if (passed && isMapFoodBonusStageModule(stage) && !claimedBonuses.includes(stage)) {
      rewardFood = MAP_FOOD_BONUS_MODULE;
      userPatch.foodCount = (user.foodCount || 0) + rewardFood;
      userPatch.mapFoodBonuses = [...claimedBonuses, stage].sort((a,b)=>a-b);
    }
    if (passed && stage >= curMap) userPatch.mapClears = (user.mapClears || 0) + 1;
    tx.set(userRef, userPatch, { merge: true });
    tx.set(lbRef, { classroom: CLASSROOM_ID, uid, name: cleanName, avatarId: run.avatarId || user.currentPetId || 'pet_001', mapStage: nextMap, mapBestStage: userPatch.mapBestStage, updatedAt: new Date(now).toISOString() }, { merge: true });

    const prev = stageSnap.exists() ? stageSnap.data() : {};
    const stagePatch = { classroom: CLASSROOM_ID, stage, updatedAt: now };
    if (passed && !prev.firstClearerUid) {
      stagePatch.firstClearerUid = uid;
      stagePatch.firstClearerName = cleanName;
      stagePatch.firstClearerAvatarId = run.avatarId || user.currentPetId || 'pet_001';
      stagePatch.firstClearerAvgSec = avgSec || null;
      stagePatch.firstClearerScore = run.score | 0;
      stagePatch.firstClearedAt = now;
      if (run.isBoss) stagePatch.firstClearerAvgSec = avgSec || null;
    }
    if (run.isBoss && passed) {
      const oldBest = Number(prev.bestBossSpeedScore || -1);
      const speedWins = Number(run.speedWins || 0);
      if (speedWins > oldBest || (speedWins === oldBest && avgSec > 0 && (!prev.bestBossAvgSec || avgSec < Number(prev.bestBossAvgSec)))) {
        stagePatch.bestBossUid = uid;
        stagePatch.bestBossName = cleanName;
        stagePatch.bestBossSpeedScore = speedWins;
        stagePatch.bestBossAvgSec = avgSec || null;
      }
    }
    tx.set(stageRef, stagePatch, { merge: true });
    return { mapStage: nextMap, stage, passed, stars, rewardFood, firstClearerName: prev.firstClearerName || stagePatch.firstClearerName || null };
  });
}

function taipeiDateKeyModule(d = new Date()) {
  const utc = d.getTime() + d.getTimezoneOffset() * 60000;
  const t = new Date(utc + 8 * 60 * 60 * 1000);
  const y = t.getFullYear(), m = String(t.getMonth()+1).padStart(2,'0'), dd = String(t.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function nextStreak(base) {
  const today = taipeiDateKeyModule();
  const last = String(base.lastPlayDate || '');
  let streakCur = base.streakCur || 0;
  if (!last) streakCur = 1;
  else {
    const a = Date.UTC(+today.slice(0,4), +today.slice(5,7)-1, +today.slice(8,10));
    const b = /^\d{4}-\d{2}-\d{2}$/.test(last) ? Date.UTC(+last.slice(0,4), +last.slice(5,7)-1, +last.slice(8,10)) : NaN;
    const diff = Number.isFinite(b) ? Math.round((a-b)/86400000) : NaN;
    if (diff === 0) streakCur = Math.max(streakCur, 1);
    else if (diff === 1) streakCur = streakCur + 1;
    else streakCur = 1;
  }
  return { today, streakCur, streakBest: Math.max(base.streakBest || 0, streakCur) };
}

async function upsertLeaderboardScore(uid, name, avatarId, score, total = 20) {
  return await runTransaction(db, async (tx) => {
    const lbRef = leaderboardDoc(uid);
    const userRef = userDoc(uid);
    const lbSnap = await tx.get(lbRef);
    const userSnap = await tx.get(userRef);
    const prev = lbSnap.exists() ? lbSnap.data() : {};
    const user = userSnap.exists() ? userSnap.data() : {};
    const scoreInt = score | 0;
    const totalInt = total | 0;
    const pct = totalInt > 0 ? (scoreInt / totalInt * 100) : 0;
    const plays = (prev.plays || user.totalGames || 0) + 1;
    const prevAvg = Number(user.avgScore || 0);
    const prevGames = user.totalGames || 0;
    const avgScore = prevGames === 0
      ? Math.round(pct * 10) / 10
      : Math.round((prevAvg * prevGames + pct) / (prevGames + 1) * 10) / 10;
    const streak = nextStreak(prev.lastPlayDate ? prev : user);
    const today = streak.today;
    const prevTodayDate = String(user.todayQuizDate || '');
    const todayQuizCount = (prevTodayDate === today ? (user.todayQuizCount || 0) : 0) + totalInt;
    const entry = {
      classroom: CLASSROOM_ID,
      uid,
      name: String(name || user.name || '匿名玩家').trim().slice(0, 40),
      avatarId: user.currentPetId || avatarId || prev.avatarId || 'pet_001',
      plays,
      bestScore: Math.max(prev.bestScore || user.bestScore || 0, scoreInt),
      recentScores: [scoreInt, ...((prev.recentScores || []).slice(0, 9))],
      streakCur: streak.streakCur,
      streakBest: streak.streakBest,
      lastPlayDate: today,
      avgScore,
      todayQuizCount,
      todayQuizDate: today,
      level: user.level || 1,
      mapStage: user.mapStage || user.level || 1,
      mapBestStage: user.mapBestStage || 0,
      updatedAt: new Date().toISOString(),
    };
    tx.set(lbRef, entry, { merge: true });
    tx.set(userRef, {
      classroom: CLASSROOM_ID,
      name: entry.name,
      bestScore: entry.bestScore,
      avgScore,
      totalGames: prevGames + 1,
      streakCur: entry.streakCur,
      streakBest: entry.streakBest,
      lastPlayDate: entry.lastPlayDate,
      todayQuizCount,
      todayQuizDate: today,
      weekPlayed: Array.from(new Set([...(Array.isArray(user.weekPlayed)?user.weekPlayed:[]), entry.lastPlayDate])).slice(-14),
      updatedAt: Date.now(),
    }, { merge: true });
    return entry;
  });
}

// Boot
signInAnonymously(auth).catch(err => console.error('[FB] anon signin failed', err));
onAuthStateChanged(auth, async (user) => {
  if (!user) return;
  try {
    let lpName = '匿名玩家', lpCharIdx = null;
    try {
      const p = JSON.parse(localStorage.getItem('jpN4Profile') || 'null');
      if (p && p.name) lpName = String(p.name).slice(0, 40);
      if (p && typeof p.charIdx === 'number' && !Object.prototype.hasOwnProperty.call(p,'petId')) lpCharIdx = p.charIdx;
    } catch {}

    const initialPlayerId = lpName && lpName !== '匿名玩家' ? playerIdFromName(lpName) : user.uid;
    const { data: profile, created: userCreated } = await ensureUserProfile(initialPlayerId, lpName, user.uid);
    await migrateLegacyPetOwner(user.uid, initialPlayerId, profile.currentPetId);
    if (lpName && lpName !== '匿名玩家') {
      try { await mergePetsByOwnerName(lpName, initialPlayerId); } catch (e) { console.warn('[FB] ownerName merge failed', e); }
    }
    let migrated = false;
    try { migrated = await migrateLocalStats(initialPlayerId, profile); } catch (e) { console.warn('[FB] local stats migration failed', e); }
    try { if (lpName && lpName !== '匿名玩家' && (!profile.name || profile.name === '匿名玩家')) await updateUserName(initialPlayerId, lpName); } catch (e) { console.warn('[FB] update user name failed', e); }

    let finalProfile = await refreshProfile(initialPlayerId);
    window.FB = {
      app, auth, db, authUid: user.uid, uid: initialPlayerId, playerId: initialPlayerId, profile: finalProfile,
      config: { HP_DECAY_MS, SEED_PETS },
      helpers: { calcCurrentHp, normalizePlayerName, playerIdFromName },
      ops: { loadPet, refreshProfile, updateUserName, switchPlayerByName, mergePetsByOwnerName, listPets, claimPet, releasePet, renameMyPet, setPetVoiceGender, feedMyPet, answerCorrect, answerWrong, ackLevelUp, markWordKnown, markWordUnknown, listMapStages, clearMapStage, getLeaderboardEntry, listLeaderboard, upsertLeaderboardScore, ensureUserProfile, seedPets },
      modular: { doc, getDoc, setDoc, updateDoc, getDocs, collection, runTransaction, query, orderBy, limit },
    };
    window.dispatchEvent(new Event('fbready'));

    let seeded = [], bridged = null;
    try { seeded = await seedPets(); }
    catch (e) { console.warn('[FB] seedPets failed; UI remains ready with fallback list', e); }

    // Bridge: first-time users coming from old onboarding → auto-claim corresponding pet
    if (!finalProfile.currentPetId && lpCharIdx !== null && lpCharIdx >= 0 && lpCharIdx < SEED_PETS.length) {
      try {
        await claimPet(initialPlayerId, SEED_PETS[lpCharIdx].id);
        bridged = SEED_PETS[lpCharIdx].id;
        finalProfile = await refreshProfile(initialPlayerId);
        window.FB.profile = finalProfile;
        window.dispatchEvent(new Event('fbready'));
      } catch (e) {
        console.warn('[FB] bridge claim failed', e.message);
      }
    }
    console.log('[FB] phase3 ready', { authUid: user.uid, uid: initialPlayerId, userCreated, migrated, seededPets: seeded, bridgedTo: bridged, profile: finalProfile });
  } catch (e) {
    console.error('[FB] boot failed', e);
  }
});
</script>
